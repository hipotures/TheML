title: Rest-frame landmark alignment with boundary-aware passband context
group_name: rest_frame_filter_landmarks
family: spectral_redshift_geometry
summary: "Construct a compact representation that expresses how each object\u2019\
  s ugriz measurements shift into rest-frame wavelength space and where key spectral\
  \ landmarks fall relative to that shifted coverage, turning raw observed colors\
  \ into physically aligned redshift-aware descriptors."
depends_on: []
strategy: "Use fixed SDSS effective wavelengths \u03BBobs = [3543, 4770, 6231, 7625,\
  \ 9134] \xC5 for u,g,r,i,z. For each row define z_safe = max(redshift, 0), z_neg_flag\
  \ = I(redshift < 0), and compute \u03BBrest_j = \u03BBobs_j / (1 + z_safe) for j=1..5\
  \ (with band order preserved). Compute span_min = min(\u03BBrest), span_max = max(\u03BB\
  rest), and span_width = span_max - span_min. Build ordered occupancy counts over\
  \ deterministic rest-frame bins that partition the domain: n_lt_912, n_912_1216,\
  \ n_1216_2500, n_2500_3646, n_3646_4000, n_4000_7000, n_gt_7000, plus a consistency\
  \ feature total_bands = 5; add a normalized entropy over these bin counts (only\
  \ nonzero bins) to capture how broadly a spectrum probes rest-frame regions. For\
  \ each landmark L in {912, 1216, 2500, 3646, 4000, 7000} compute: in_span = I(span_min\
  \ <= L <= span_max), below_span = I(L < span_min), above_span = I(L > span_max),\
  \ and nearest_band_idx k = argmin_j |\u03BBrest_j - L| (tie resolved to smaller\
  \ j). Define signed_log_dist_L = sign(\u03BBrest_k - L) * log1p(|\u03BBrest_k -\
  \ L|), and abs_log_dist_L = log1p(|\u03BBrest_k - L|). Return nearest_band_mag_L\
  \ = observed magnitude at k and nearest_band_id_L = k. If k is interior and both\
  \ adjacent bands straddle L, return left_right_delta_L = (mag_k - mag_{k-1}) and\
  \ (mag_{k+1} - mag_k); if exactly one neighbor exists inside the sampled set, return\
  \ only the available one. If L is strictly between \u03BBrest_k and \u03BBrest_{k+1},\
  \ compute linear_predict_at_L from mags k and k+1 and return landmark_residual_L\
  \ = mag_k - linear_predict_at_L (same formula with k and k-1 when interpolation\
  \ from below is used), else set landmark_residual_L = 0 when outside span. For outside-span\
  \ landmarks, clamp endpoint_band = 1 or 5 (nearest endpoint), set outside_distance_L\
  \ = log1p(|L - clamp(L, span_min, span_max)|), and expose outside_side_L = I(L <\
  \ span_min) else 1 for above, enabling explicit handling of hard saturation at edges."
expected_signal: "By explicitly encoding whether physically meaningful breaks and\
  \ UV discontinuities are entering, inside, or missed by the observed passbands,\
  \ the model can discriminate classes that share coarse colors but differ by redshifted\
  \ spectral content, especially separating low-redshift stellar continua from galaxies\
  \ with a 4000 \xC5/Balmer region signature and quasars with high-redshift Lyman-region\
  \ behavior."
risk: This family depends on redshift precision and fixed landmark positions, so noisy
  or systematically biased redshifts, wide broad-band photometry, and coarse 5-point
  sampling can produce unstable hard-threshold decisions and duplicate information
  already present in raw colors and redshift, increasing overfitting risk on minority
  classes without strong additional signal.
