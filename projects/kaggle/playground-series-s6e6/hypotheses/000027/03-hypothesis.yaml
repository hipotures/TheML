title: Train-test aware id sequence context
group_name: aide_id_sequence_scan_context
family: aide_sequence_context
summary: Encode each object's identifier as deterministic position, block, periodic,
  and local-neighborhood context so the model can test whether row-id order captures
  acquisition or batching structure related to class prevalence.
depends_on: []
strategy: 'Parse `id` as integer-like numeric values and create `id_valid` and `id_missing`
  flags; invalid or missing ids are assigned the training minimum id before numeric
  transforms while retaining the flags. Fit all scaling, clipping, and normalization
  constants on training ids only, but compute order-dependent ranks and gaps on the
  concatenated unlabeled train+test id list when both tables are available so boundary
  behavior across the contiguous split is represented without using targets. Add monotonic
  position features: raw numeric id, `id_offset = id - train_id_min`, `id_rel_train
  = id_offset / max(1, train_id_max - train_id_min)` clipped to a wide range such
  as [-0.25, 2.0], `id_rank_global`, and `id_rank_global_norm = id_rank_global / max(1,
  N_global - 1)`. Also add within-table rank features computed separately for train
  and test, with a `table_is_test_like` indicator omitted during model training if
  unavailable in validation workflows. Add coarse location features `block_1k = floor(id_offset/1000)`,
  `block_10k = floor(id_offset/10000)`, `block_100k = floor(id_offset/100000)`, plus
  normalized within-block positions for 1k and 10k blocks. Add bounded periodic encodings
  for moduli {2, 11, 97}: both integer residue normalized by modulus and sine/cosine
  transforms of the residue angle; include `id_even` as a separate binary feature.
  In sorted global-id order, compute `prev_gap`, `next_gap`, `min_neighbor_gap`, `max_neighbor_gap`,
  `is_first_global`, and `is_last_global`; fill boundary gaps with 0, cap non-boundary
  gaps at the training 99th percentile of positive adjacent gaps, and add binary continuity
  flags for `prev_gap_eq_1`, `next_gap_eq_1`, and `has_noncontiguous_neighbor`. Add
  `log_id = log1p(max(0,id))` and z-score it using training mean and standard deviation,
  with std floored at 1e-6. All features must be deterministic functions of ids and
  unlabeled row membership only, with no class labels, predictions, target encodings,
  or photometric inputs.'
expected_signal: The train and test ids are contiguous, so identifier order may proxy
  for survey ingestion order, scan chunks, allocation batches, or synthetic row-generation
  structure that can shift class priors independently of photometric measurements;
  balanced accuracy can benefit if this weak context helps minority classes or clarifies
  boundary regions where QSO, STAR, and GALAXY overlap.
risk: The signal may be an artifact of this dataset split rather than astronomy, and
  random cross-validation can overstate its value if nearby ids share labels; raw
  id extrapolation from train to test can also destabilize some models, so clipped
  relative scales, bounded periodic encodings, and validation using id-ordered folds
  are important safeguards.
