title: AIDE id sequence scan context
group_name: aide_id_sequence_scan_context
family: aide_sequence_context
summary: >
  Evaluate the AIDE id-sequence feature path directly in TheML by encoding
  row/order structure through id rank, normalized rank, coarse blocks, modulo
  cycles, parity, log id, and neighboring id gaps.
depends_on: []
strategy: 'If an id column is present, coerce it to numeric and derive deterministic
  sequence features: missing-id indicator, ordinal rank, rank normalized to [0,1],
  coarse blocks at 1k and 100k scales, modulo residues for 2, 11, and 97, even-id
  indicator, log1p clipped id, and previous/next id gaps after sorting by id. If id
  is absent, use the row order as a neutral fallback only so the materialization
  remains valid. Do not use labels or any model outputs.'
expected_signal: Survey or synthetic generation order can leak weak scan, batching,
  or sampling structure. The AIDE code contained this feature path, and evaluating
  it as a separate hypothesis makes the potential id/order signal explicit rather
  than mixing it into other photometric groups.
risk: Id-derived features can be dataset-specific and may not generalize; if ids are
  arbitrary or shuffled, the group may add pure noise or encourage leaderboard-only
  artifacts.
schema_version: 1
hypothesis_id: '000027'
enabled: true
created_at: '2026-06-22T00:00:00+02:00'
