title: Redshift-normalized absolute-luminosity regime features
group_name: redshift_luminosity_plausibility
family: absolute_photometry
summary: Convert observed ugriz magnitudes into redshift-scaled intrinsic-brightness
  proxies and summarize their cross-band behavior to provide physically grounded class
  separation cues between nearby stars, intermediate-luminosity galaxies, and very
  luminous quasars.
depends_on: []
strategy: "For every row, compute a deterministic luminosity-distance proxy from redshift\
  \ under a fixed flat cosmology (H0=70 km/s/Mpc, \u03A9m=0.3, \u03A9\u039B=0.7) with\
  \ c=299792.458 km/s, using z_eff = max(redshift, 1e-4) for distance math. Calculate\
  \ D_L via D_C=(c/H0)*\u222B_0^{z_eff}(1/sqrt(\u03A9m(1+z)^3+\u03A9\u039B))dz and\
  \ D_L=(1+z_eff)*D_C, using the same numerical approximation at train and test; retain\
  \ flags z_nonpos=(redshift<=0), z_low=(redshift<0.01), and z_hi=(redshift>=3). For\
  \ each band b in {u,g,r,i,z}, derive M_b = m_b - 5*log10(D_L_Mpc*1e6) + 5 (equivalently\
  \ m_b - 5*log10(D_L_Mpc) - 25), then clip each M_b to [-35, 10]. Build deterministic\
  \ aggregates: M_mean, M_median, M_iqr, M_sd, M_min, M_max, M_rg = M_r - M_g, M_ri\
  \ = M_r - M_i, and pairwise absolute spread (max-min). Add threshold-margin and\
  \ bin features on M_r: \u0394_star = M_r - (-10), \u0394_midgal = M_r - (-18), \u0394\
  _brightgal = M_r - (-23), \u0394_qso = M_r - (-27), plus binary flags for intervals\
  \ M_r <= -27, -27 < M_r <= -23, -23 < M_r <= -18, -18 < M_r <= -10, and M_r > -10.\
  \ Add scale-preserving cross terms M_r * z_eff and M_ri * z_eff to reduce instability\
  \ where redshift dominates and to keep relative structure visible at high z."
expected_signal: The derived features resolve ambiguity where apparent magnitudes
  alone are class-confounding, because they encode whether an observed brightness
  is physically plausible at the implied distance; stars are expected to occupy low-redshift,
  moderate-faint absolute regimes while galaxies occupy a mid-luminosity band and
  quasars align with extreme-luminosity regime flags, improving balanced-class separability.
risk: The absolute-magnitude transform is an astrophysical approximation that omits
  extinction and k-corrections, and negative/near-zero redshift handling is heuristic,
  so very low-z noise can create artifacts despite clipping and flags; the constructs
  may also be partially redundant with raw redshift and photometric features, which
  can overfit if model capacity is not regularized.
