title: Cosmology-scaled luminosity regime plausibility
group_name: redshift_luminosity_plausibility
family: absolute_photometry
summary: "Convert apparent ugriz photometry into redshift-scaled intrinsic-brightness\
  \ plausibility descriptors that expose whether each object\u2019s observed flux\
  \ is consistent with a stellar, galactic, or quasar-like luminosity regime."
depends_on: []
strategy: 'For each row, use the reported redshift only as an input to a fixed deterministic
  distance transform: set z_eff=max(redshift, 1e-4), retain redshift quality flags
  z_nonpos=(redshift<=0), z_very_low=(redshift<0.01), z_low=(redshift<0.05), and z_high=(redshift>=3),
  and compute luminosity distance under one flat cosmology with H0=70 km/s/Mpc, Omega_m=0.3,
  Omega_lambda=0.7, and c=299792.458 km/s. Approximate D_C=(c/H0)*integral_0^z_eff
  1/sqrt(Omega_m*(1+z)^3+Omega_lambda) dz using the same fixed quadrature or interpolation
  scheme for train and test, then D_L_Mpc=(1+z_eff)*D_C and distance_modulus=5*log10(max(D_L_Mpc,
  1e-6))+25. For each band b in {u,g,r,i,z}, compute pseudo absolute magnitude M_b=m_b-distance_modulus,
  then clip M_b to a broad finite range such as [-35, 15]. Summarize absolute luminosity
  level with M_r, M_i, mean(M_b), median(M_b), min(M_b), max(M_b), and a robust central
  value 0.5*(M_r+M_i). Summarize cross-band plausibility with sd(M_b), max(M_b)-min(M_b),
  iqr(M_b), and deviations M_b-mean(M_b) for each band so the model can distinguish
  globally bright objects from color-driven band outliers. Add regime-margin features
  for M_r and the robust r/i central magnitude against fixed thresholds -10, -18,
  -23, and -27, encoded as signed distances to each threshold. Add ordinal regime
  indicators for M_r and the r/i central magnitude: stellar-like faint (>-10), compact/intermediate
  (-18 to -10), normal-galaxy-like (-23 to -18), bright-galaxy or AGN-like (-27 to
  -23), and extreme-quasar-like (<=-27). Add counts over all five bands falling into
  the same threshold regimes, plus clipped interaction terms distance_modulus*redshift,
  M_r*z_eff, and central_M_ri*z_eff to let tree or linear models learn when high apparent
  brightness at high redshift requires unusually large intrinsic luminosity. All thresholds,
  clipping bounds, cosmology constants, and numerical-distance settings are fixed
  before fitting and applied identically to train and test.'
expected_signal: 'Balanced accuracy may improve because the features turn apparent
  brightness into a class-relevant physical plausibility scale: stars should mostly
  align with very low-redshift and faint intrinsic regimes, galaxies with intermediate
  absolute magnitudes, and QSOs with high-redshift extreme-luminosity regimes, reducing
  confusion among objects with similar observed colors or magnitudes.'
risk: The transform is approximate because it ignores extinction, k-corrections, passband
  evolution, and redshift measurement uncertainty; near-zero or negative redshifts
  require heuristic clipping that can create artificial boundaries. The features are
  also strongly derived from redshift and magnitudes already present, so high-capacity
  models may overfit redundant thresholds unless validation is stratified and regularization
  is adequate.
