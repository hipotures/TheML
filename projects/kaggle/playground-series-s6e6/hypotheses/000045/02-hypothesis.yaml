title: Redshift-Adaptive Pairwise Color Residual Geometry
group_name: pairwise_color_lattice_residuals
family: pairwise_color_geometry
summary: This feature group characterizes every object by robust, redshift-local deviations
  of its full ugriz pairwise color lattice from a reference manifold and by the principal
  orthogonal directions of those deviations, exposing class-distinguishing structure
  that is not visible in only adjacent-color projections.
depends_on: []
strategy: "Build the 5-vector of magnitudes m=[u,g,r,i,z] and compute the 10 pairwise\
  \ color components in fixed order: u-g, u-r, u-i, u-z, g-r, g-i, g-z, r-i, r-z,\
  \ i-z. On training data only, define deterministic redshift bins from quantiles\
  \ with nq=32 cut points over redshift and then post-process bins so each final bin\
  \ has at least m_min=max(1500, ceil(0.001*|train|)) samples by repeatedly absorbing\
  \ neighboring sparse bins into the nearest non-empty side; record final boundaries\
  \ and keep them frozen after fitting. For each final bin, compute component-wise\
  \ median \u03BC_b and MAD \u03C3_b on the 10-color vectors, replace any \u03C3_b<1e-6\
  \ by 1e-6, and center vectors x_b = x-\u03BC_b. Compute covariance C_b of x_b, apply\
  \ shrinkage C_b' = (1-\u03C1)C_b + \u03C1*diag(C_b) with \u03C1=0.05, then add ridge\
  \ \u03BB=1e-6*(trace(C_b')/10) to the diagonal and invert for Mahalanobis math.\
  \ For each row, assign the redshift bin by clipped boundary lookup; if its bin is\
  \ missing, singular, or ill-conditioned (cond(C_b')>1e8), use the nearest populated\
  \ bin by redshift-midpoint distance, else fallback to global statistics at final\
  \ fallback. Emit fixed numeric outputs: 10 clipped standardized residuals r=(x-\u03BC\
  _b)/\u03C3_b, Mahalanobis distance d=sqrt((x-\u03BC_b)^T (C_b'+)^-1 (x-\u03BC_b)),\
  \ and the first 3 projections of the whitened vector w=C_b'^(-1/2)(x-\u03BC_b) onto\
  \ the top-3 eigenvectors of that covariance (computed from training data in each\
  \ bin, with eigenvectors sorted by descending eigenvalue and sign made deterministic\
  \ by forcing the largest-magnitude loading in each axis positive). Use exactly the\
  \ same binning and per-bin parameters learned from each training fold when validating,\
  \ and from full train when generating test-time features."
expected_signal: The pairwise lattice captures non-local color contrasts that encode
  spectral-shape differences between class families, while redshift conditioning aligns
  the local manifold by epoch and prevents a single global center from blurring class-specific
  trends; robust residualization and orthogonal principal directions retain physically
  meaningful deviations and outlier directions where overlapping classes become separable
  in balanced accuracy.
risk: The 10-color residual stack is strongly redundant with raw colors, so gains
  can be offset by multicollinearity and model overfitting if too many correlated
  components are kept; sparse or noisy high-redshift regions can destabilize bin statistics
  even after regularization; fixed quantile boundaries may induce discontinuities
  for objects near bin edges unless fallback logic is carefully controlled.
