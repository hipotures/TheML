title: Fold-safe local principal-color residual manifold
group_name: local_principal_color_residuals
family: locus_geometry
summary: Represent each object by robust standardized departures from a locally centered
  SDSS stellar-locus coordinate system, so the model can use class-specific manifold
  offsets after controlling for redshift, sky position, and catalog tag context.
depends_on: []
strategy: 'Compute SDSS principal-color coordinates from observed ugriz for every
  row: s = -0.249*u + 0.794*g - 0.555*r + 0.234, w = -0.227*g + 0.792*r - 0.567*i
  + 0.050, x = 0.707*g - 0.707*r - 0.983, y = -0.270*r + 0.800*i - 0.534*z + 0.059,
  and l = -0.436*u + 1.129*g - 0.119*r - 0.574*i + 0.1984. The s/w/x/y definitions
  are used for all rows; l is considered valid only when 0.5 < g-r < 0.8, with l_valid=0
  and l-derived residual values masked/imputed to 0 outside that range. Definitions
  match the SDSS principal-color and SEGUE l-color documentation at https://www.astro.princeton.edu/~strauss/DR3/QA.html
  and https://www.sdss3.org/dr8/algorithms/segueii/segue_target_selection.php. Build
  deterministic context keys using redshift bins [-inf, 0.02, 0.2, 0.6, 1.2, 2.4,
  4.0, inf], alpha_bin = floor((alpha mod 360)/30) for 12 RA cells, delta bins split
  by [-inf, -5, 10, 25, 40, 55, inf], and tag_pair = (spectral_type, galaxy_population).
  For each coordinate, fit unsupervised training-only medians m_c, MAD values, and
  valid counts at hierarchical levels: redshift+sky+tag, redshift+sky, redshift+tag,
  redshift only, tag only, and global. For cross-validation, fit these statistics
  inside each training fold and apply to the held-out fold; for final test features,
  refit once on the full training data. For each object and coordinate, choose the
  first hierarchy level with at least 300 valid rows for s/w/x/y or at least 150 l-valid
  rows for l; otherwise use the global coordinate statistics. Define scale_c = max(1.4826*MAD_c,
  0.02) for s/w/x/y and max(1.4826*MAD_l, 0.03) for l. Emit signed residuals r_c =
  c - m_c, clipped robust scores z_c = clip(r_c/scale_c, -10, 10), abs_z_c, coordinate
  missing/reliability flags, and the selected backoff level per coordinate. Aggregate
  over available coordinates with max_abs_z, mean_abs_z, l2_z = sqrt(mean(z_c^2) *
  available_count), tail_count_2 = count(|z_c| > 2), tail_count_35 = count(|z_c| >
  3.5), tail_ratio_2, positive_tail_count, negative_tail_count, available_color_count,
  in_locus = 1 when all available |z_c| < 0.75 and at least four coordinates are available,
  and a 4-bit sign code for z_s, z_w, z_x, z_y.'
expected_signal: Stars should concentrate near the locally normalized stellar locus,
  while quasars and galaxies should create larger and directionally structured departures
  that vary with redshift and catalog context; these residual features can improve
  balanced accuracy by sharpening minority-class recall without relying only on raw
  magnitudes or redshift.
risk: The features may be redundant with raw colors, color ratios, or other locus
  geometry groups; overly fine context cells can create noisy medians if fallback
  thresholds are too permissive; conditioning on spectral_type and galaxy_population
  can reduce incremental signal if those tags already encode most class information;
  and the SDSS-derived coefficients assume comparable photometric calibration, so
  any mismatch in the synthetic dataset could weaken the residual interpretation.
