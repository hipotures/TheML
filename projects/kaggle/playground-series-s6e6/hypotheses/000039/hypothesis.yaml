title: Local principal-color manifold residuals
group_name: local_principal_color_residuals
family: locus_geometry
summary: Measure each object's signed and standardized deviation from local SDSS principal-color
  planes, conditioned on redshift and coarse sky/catalog context, so class distinctions
  are expressed as controlled departures from stellar or contamination-leaning manifolds
  rather than raw color magnitudes.
depends_on: []
strategy: 'Compute orthogonal stellar-manifold coordinates in each source from fixed
  SDSS/SEGUE linear combinations: s = -0.249*u + 0.794*g - 0.555*r + 0.234; w = -0.227*g
  + 0.792*r - 0.567*i + 0.050; x = 0.707*g - 0.707*r - 0.988; y = -0.270*r + 0.800*i
  - 0.534*z + 0.059; l = -0.436*u + 1.129*g - 0.119*r - 0.574*i + 0.1984. Build context
  bins from: (1) redshift bin with fixed edges [-0.01, 0.2, 0.6, 1.2, 2.4, 4.0, 7.0],
  (2) sky cell from alpha/delta using coarse grids (e.g., 12 bins in alpha and 6 bins
  in delta), and (3) the pair (spectral_type, galaxy_population). For each context,
  compute median and MAD of each principal-color value using training data only; derive
  signed residuals c_res = c - median_c and robust scores z_c = (c - median_c)/(1e-6
  + 1.4826*MAD_c). Emit per-object features: z_s, z_w, z_x, z_y, z_l, abs(z_*) values,
  max_abs_z = max(|z_s|,|z_w|,|z_x|,|z_y|,|z_l|), l2_z = sqrt(z_s^2 + z_w^2 + z_x^2
  + z_y^2 + z_l^2), an all_close flag where all |z| < 0.8, and sign-code bits for
  the sign pattern of (z_s, z_w, z_x, z_y). If a context has <300 rows, back off to
  redshift+tag only, then tag only, then global medians to avoid noisy baselines;
  clip all z_c to [-10,10]. References informing coefficients: SDSS QA principal colors
  and SEGUE l-color definitions at https://www.astro.princeton.edu/~strauss/DR3/QA.html
  and https://www.sdss3.org/dr8/algorithms/segueii/segue_target_selection.php.'
expected_signal: Stars remain close to the principal-color loci while quasars and
  galaxies more frequently produce structured perpendicular excursions that vary with
  redshift and tag context, so standardized residual geometry provides a compact,
  class-aware morphology signal that is less sensitive to absolute photometric level
  shifts than raw magnitudes alone.
risk: Feature redundancy is likely with other manifold/locus groups and may offer
  diminishing returns; sky-cell medians can become unstable in sparse angular/redshift
  regions, causing noisy residuals unless fallback is robust, and fixed coefficients
  are tied to SDSS calibration conventions so any photometric-system mismatch could
  attenuate separability.
