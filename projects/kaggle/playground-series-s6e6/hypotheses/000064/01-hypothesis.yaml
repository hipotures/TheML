title: Quasar Small-Bump Bandpass Contrast
group_name: quasar_small_bump_bandpass_contrast
family: quasar_continuum_geometry
summary: Represent whether the redshifted SDSS bands sample the broad quasar Fe II
  and Balmer-continuum small-blue-bump region and whether the observed ugriz flux
  shape shows the expected localized pseudo-continuum excess.
depends_on: []
strategy: 'Use fixed SDSS central wavelengths u=3551, g=4686, r=6166, i=7480, z=8932
  Angstrom and map each band to rest-frame wavelength lambda_rest=lambda_obs/(1+z_safe),
  with z_safe clipped only to keep the denominator positive. Convert ugriz magnitudes
  to relative log fluxes and fit a simple log-flux versus log-wavelength power-law
  continuum using bands outside the bump when available, falling back to all five
  bands with low bump weights otherwise. Define smooth triangular membership weights
  for the quasar small-bump core around 3000 Angstrom, its UV Fe II side from roughly
  2200-3050 Angstrom, its Balmer-continuum side from roughly 3000-4000 Angstrom, and
  blue/red side continua around 1450-1900 and 4200-5500 Angstrom. Emit coverage and
  alignment descriptors for how much of the five-band system samples those rest-frame
  regions, weighted residual contrasts of bump-region log flux against the fitted
  continuum, UV-versus-Balmer asymmetry, side-continuum balance, and the strongest
  aligned observed band encoded ordinally. If a region has negligible total weight,
  set its contrast to 0 and retain the corresponding coverage feature so absence of
  wavelength support is explicit. Clip final log-ratio residuals to a finite mag-equivalent
  range to limit isolated photometric outliers. Motivation sources: https://www.sdss4.org/instruments/camera/
  and https://www.researchgate.net/publication/230932119_Colors_of_2625_Quasars_at_0_ITALCLCzCLCITAL_5_Measured_in_the_Sloan_Digital_Survey_Photometric_System'
expected_signal: SDSS quasar-color studies note that quasar broadband colors follow
  a redshift-structured relation and are materially affected by the lambda-3000 small
  blue bump and strong spectral features, so isolating this rest-frame pseudo-continuum
  excess may add QSO-specific evidence in color regions where stars and compact galaxies
  are otherwise similar.
risk: The five broad bands give only coarse wavelength sampling, so the signal may
  be redundant with existing rest-frame SED, emission-line, and quasar-selection groups,
  and it can become misleading when the supplied redshift is noisy or when synthetic
  photometry does not preserve real quasar small-bump behavior.
