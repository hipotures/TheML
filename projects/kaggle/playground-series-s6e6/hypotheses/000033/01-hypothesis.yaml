title: Rest-frame SED family fit residuals
group_name: restframe_sed_family_fit
family: spectral_family
summary: Compare each object's rest-frame ugriz continuum against competing power-law
  and curved continuum family signatures to encode whether its broadband shape is
  quasar-like, star-like, or galaxy-like, using physically motivated rest-frame shape
  diagnostics that are orthogonal to absolute brightness.
depends_on: []
strategy: "For each object, convert magnitudes to flux proxies f_b=10^{-0.4 m_b} for\
  \ b in {u,g,r,i,z}, then compute x_b=log10(\\lambda_b/(1+z_plus)) and y_b=log10(f_b),\
  \ where \\lambda=[3551,4686,6165,7481,8931] \xC5 and z_plus=max(redshift,0). Fit\
  \ two deterministic models to (x_b,y_b): linear model y=a+b\\,x (power-law surrogate),\
  \ and quadratic model y=c+d\\,x+e\\,x^2 (curved/thermal surrogate). Derive SSE_linear\
  \ and SSE_quad from least-squares residuals, R2_linear and R2_quad, curvature gain\
  \ g=(SSE_linear-SSE_quad)/SSE_linear, and signed curvature coefficient e. Add an\
  \ endpoint slope-contrast feature s=(y_u-y_g)/(x_u-x_g)-(y_i-y_z)/(x_i-x_z). To\
  \ reduce Lyman-forest/absorbed-band distortion at high redshift, compute a second\
  \ weighted variant with weights w_b=1 if x_b_rest>1216 \xC5, 0.5 if 912 \xC5<\\\
  lambda_rest<=1216 \xC5, 0.2 if \\lambda_rest<=912 \xC5, where \\lambda_rest=\\lambda_b/(1+z_plus);\
  \ compute the same model statistics on weighted data and keep a binary fallback\
  \ flag for the weighted fit when all weights are 1 (low-z regime), otherwise both\
  \ sets are returned."
expected_signal: Quasars are expected to be better explained by linear continua in
  log-log space (small curvature gain) while stars and many galaxies show stronger
  smooth curvature or break-driven slope asymmetry, so family-residual features should
  sharpen class boundaries near stellar and quasar overlaps and improve balanced discrimination.
risk: Rest-frame warping amplifies redshift noise and any photometric-system calibration
  mismatch, especially for negative or noisy redshifts and very high-redshift objects
  with heavily absorbed blue bands; this can inject unstable curvature estimates and
  creates overlap with existing break/continuum groups, so feature utility may weaken
  if redshift quality is poor.
