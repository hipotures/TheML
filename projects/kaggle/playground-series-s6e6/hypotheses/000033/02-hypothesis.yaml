title: Lyman-aware rest-frame SED family fit with stability-aware dual residual diagnostics
group_name: restframe_sed_family_fit
family: spectral_family
summary: This feature family characterizes each object by how well its rest-frame
  ugriz continuum is represented by a low-order power-law-like shape versus a curved
  continuum family, using redshift-normalized wavelength geometry and absorption-aware
  weighting to separate quasar-like, stellar, and galaxy-like spectral morphology.
depends_on: []
strategy: "For each object define zc = max(redshift, 0), and use rest-frame effective\
  \ wavelengths x_b = log10(lambda_b/(1 + zc)) with lambda=[3551, 4686, 6165, 7481,\
  \ 8931] \xC5 for b in {u,g,r,i,z}. Convert magnitudes to relative log-flux y_b =\
  \ -0.4 * m_b (equivalent to log10 of flux up to a constant) and center y by subtracting\
  \ its object-wise mean so absolute scale is removed. Fit weighted linear model y\
  \ = a + b*x' and weighted quadratic model y = a + b*x' + c*x'^2 where x' is x centered\
  \ per object to reduce conditioning issues, using weighted normal equations with\
  \ explicit weights. Produce one feature block with weights w=1 for all bands (base\
  \ model), and one block with Lyman-aware weights v: v=1 if lambda_b/(1+zc) > 1216,\
  \ v=0.5 if 912 < lambda_b/(1+zc) <= 1216, and v=0 otherwise, to de-emphasize IGM-absorbed\
  \ regions. For each block compute RSS, R2, slope b, curvature c, curvature magnitude\
  \ |c|, and curvature gain g = (RSS_linear - RSS_quadratic) / RSS_linear (only when\
  \ both fits are estimable); add a signed asymmetry slope feature s = (y_u - y_g)/(x_u\
  \ - x_g) - (y_i - y_z)/(x_i - x_z) with a deterministic fallback pair (g-r) minus\
  \ (r-i) if either endpoint is ineligible due heavy masking. Define fit-feasibility\
  \ flags by point support: require at least 2 non-negligible bands for linear and\
  \ 3 for quadratic; if a band is downweighted to zero and a fit is infeasible, set\
  \ its statistics to NaN and use linear/unweighted estimates for that branch with\
  \ a binary instability flag. Add branch-difference features: \u0394R2 = R2_weighted\
  \ - R2_unweighted, \u0394b = b_weighted - b_unweighted, \u0394c = c_weighted - c_unweighted,\
  \ plus a flag for no_uv_downweight (all v=1). If redshift is clamped to 0 (negative\
  \ inputs), set z_low_flag to indicate observer-frame fallback is used for this object."
expected_signal: The quasar-like class should retain near-power-law behaviour once
  shifted toward rest-frame and after suppressing UV-absorbed points, while many stars
  and galaxies should show stronger curvature and slope asymmetry from stellar/galaxy
  continua and breaks, so the contrast between linear and quadratic fit quality plus
  asymmetry under masked versus unmasked regimes should improve class boundary separation
  where colors alone are ambiguous.
risk: At very high redshift or noisy redshift values, rest-frame compression and band
  suppression can leave too few informative points, causing unstable curvature estimates
  and increased missing-flag rate; the weighted masking can also overlap with intrinsic
  class-correlated redshift distribution, creating potential overfitting to the redshift-induced
  regime unless stability flags and branch-differences are treated with care.
