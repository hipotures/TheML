title: Restframe anchored SED slope and curvature profiles
group_name: restframe_anchor_sed_shape
family: restframe_shape
summary: Transform each object into a redshift-normalized five-point SED traced at
  fixed rest-frame wavelength anchors and expose explicit UV-to-optical slope and
  curvature signals so class-specific continuum behavior is compared on a shared physical
  wavelength basis rather than fixed observed filters.
depends_on: []
strategy: "For each row, convert ugriz magnitudes to linear fluxes F_b = 10^{-0.4\
  \ m_b}. Use rest-frame effective wavelengths \u03BB'_b = \u03BB_b / (1 + redshift)\
  \ with \u03BB_u=3551, \u03BB_g=4686, \u03BB_r=6165, \u03BB_i=7481, \u03BB_z=8931\
  \ \xC5 (use 1+redshift clipped at a small positive floor, e.g. 0.1, only if redshift\
  \ < -0.9). Sort the five (log10 \u03BB', log10 F) pairs by wavelength and build\
  \ a monotonic piecewise-linear continuum in log-space. Evaluate interpolated rest-frame\
  \ flux values at fixed anchors A=[1500,2200,2900,3650,4500,6200,7600] \xC5; if an\
  \ anchor is outside the interpolated range, set the anchor value to missing and\
  \ emit a valid-mask feature for each anchor plus a count of usable anchors. From\
  \ available anchors, compute adjacent segment slopes s1=\u0394logF/\u0394log\u03BB\
  \ in 1500\u20132200, 2200\u20132900, 2900\u20133650, 3650\u20134500, 4500\u2013\
  6200, 6200\u20137600 \xC5, and derive curvature deltas d1=s2-s3 (UV bend around\
  \ metal-line regime), d2=s4-s5 (optical curvature), and a 3650-\xC5 break residual\
  \ b4000 = logF(3650) - linear prediction from anchors at 2900 and 4500. Add mismatch\
  \ terms as RMS residuals of (a) global 1-slope power-law fit over all available\
  \ anchors and (b) a constrained 2-slope piecewise fit with an enforced break at\
  \ 3650 \xC5 to quantify break sharpness; replace undefined fits with NaN and carry\
  \ coverage-count masks."
expected_signal: "Stars are expected to show smooth blackbody-like rest-frame slopes\
  \ with modest curvature, galaxies should exhibit stronger positive/negative curvature\
  \ near the 3650\u20134500 \xC5 region from stellar population breaks, and quasars\
  \ should remain closer to a broken/power-law continuum with weaker broad-band stellar-break\
  \ structure; anchoring to physical wavelengths removes redshift-induced feature\
  \ drift and makes these class differences directly comparable across the full z\
  \ range."
risk: Interpolation is unstable when a redshift places most anchors outside observed
  bands, causing many missing values at extremes, and the method inherits redshift
  noise; if redshift errors or selection artifacts correlate with class, piecewise
  fit scores could overfit those artifacts, and the extra non-linear features can
  become correlated with other redshift-based geometry groups.
