title: Rest-frame anchored SED slope and break profile
group_name: restframe_anchor_sed_shape
family: restframe_shape
summary: Create rest-frame descriptors of broadband spectral shape on fixed physical
  wavelength anchors so continuum slope, curvature, and stellar-break structure are
  compared consistently across redshift rather than through drifting observed-frame
  filters.
depends_on: []
strategy: "For each object, use ugriz magnitudes and effective wavelengths \u03BB\
  u=3551, \u03BBg=4686, \u03BBr=6165, \u03BBi=7481, \u03BBz=8931 \xC5. Convert magnitudes\
  \ to log-flux surrogates y_b=-0.4*m_b and compute rest wavelengths \u03BB'_b=\u03BB\
  _b/max(1+redshift, 1.0e-3), with x_b=log10(\u03BB'_b). Sort the five (x_b,y_b) pairs\
  \ and linearly interpolate y as a function of x in log-wavelength space. Evaluate\
  \ anchors A=[1500,2200,2900,3650,4500,6200,7600] \xC5 only when log10(A) lies within\
  \ the observed rest-frame wavelength span; otherwise set the anchor value to NaN.\
  \ Emit one binary coverage mask per anchor, n_anchor, frac_anchor, and min/max covered\
  \ anchor wavelength. For defined anchors, create relative anchor levels yrel_a=y_a\u2212\
  median(y_defined) to remove absolute brightness scale while preserving SED shape.\
  \ Compute adjacent slopes s_1500_2200 through s_6200_7600 as \u0394y/\u0394log\u03BB\
  \ when both anchors exist, with segment masks. Derive curvature terms from consecutive\
  \ available slopes, especially uv_curv=s_2200_2900\u2212s_1500_2200, near_break_curv=s_3650_4500\u2212\
  s_2900_3650, red_curv=s_6200_7600\u2212s_4500_6200, and aggregate mean, standard\
  \ deviation, and maximum absolute adjacent-slope change over all valid neighboring\
  \ segments. Compute a 3650 \xC5 break residual b3650=y_3650\u2212linear_prediction(y_3650\
  \ from anchors 2900 and 4500), plus a broader break contrast (mean yrel over anchors\
  \ >=4500)\u2212(mean yrel over anchors <=2900) when both sides are present. Fit\
  \ a centered global OLS line y=a*x+c over all defined anchors when n_anchor>=2 and\
  \ output only shape terms: global slope a, RMSE, mean absolute residual, max absolute\
  \ residual, and residual at 3650 if available. Fit separate centered blue and red\
  \ lines for anchors <=3650 and >=3650 when each side has at least two points; output\
  \ blue_slope, red_slope, slope_jump=red_slope\u2212blue_slope, side RMSEs, and break_sharpness\
  \ as the difference between the two side-line predictions at 3650. All undefined\
  \ quantities remain NaN and are accompanied by prerequisite/coverage masks rather\
  \ than imputed constants."
expected_signal: Balanced accuracy may improve because galaxies should show stronger
  rest-frame optical break and curvature structure, quasars should often resemble
  smoother broad power-law continua, and stars should have smoother stellar-continuum
  slopes; using physical wavelength anchors makes these patterns comparable across
  redshift while masks let the model learn when the estimate is reliable.
risk: At high redshift or very low redshift many anchors may be outside the ugriz
  rest-frame span, making the feature group sparse and sensitive to interpolation
  endpoints. Because redshift strongly affects anchor coverage, the masks and break
  features can learn redshift-selection artifacts as well as intrinsic spectral shape.
  The features are also correlated with color and redshift-derived groups, so overly
  flexible downstream models may overfit unless validation preserves the train-test
  distribution.
