title: Fold-aware hierarchical Bayesian color posteriors with support-gated fallback
group_name: class_conditional_color_density_posteriors
family: bayesian_density_scoring
summary: "This feature group converts raw photometric measurements into class evidence\
  \ by comparing each object\u2019s local color pattern against class-specific empirical\
  \ color distributions conditioned on redshift and brightness, then progressively\
  \ smoothing and backing off to broader distributions when local support is weak\
  \ to yield robust, calibrated multiclass compatibility scores."
depends_on: []
strategy: "For each training fold, fit all statistics only on that fold and apply\
  \ identical fitted bins/edges to validation and test rows. Build colors c1=u-g,\
  \ c2=g-r, c3=r-i. Clip redshift to [-0.01, 7.01] and assign redshift bins k using\
  \ fixed breaks z_break=[-0.01,0.20,0.60,1.05,1.70,2.45,3.60,5.00,7.01] with boundary\
  \ clipping for out-of-range values. Build i-band bins m with fixed width 0.50 over\
  \ fold i min/max and hard-clip to first/last bins. For each color component, compute\
  \ fold-specific 16 quantile edges on the 0.5% to 99.5% interval, then append two\
  \ overflow bins at both tails; B=18 bins per color, so 18^3=5832 color cells, with\
  \ cell index b=(b1,b2,b3). Compute sparse counts n[c,k,m,b]=#rows of class c in\
  \ cell b within (k,m), plus marginals n[c,k,m], n[c,k], n[c,m], n[c,b], and global\
  \ n[c], with totals N[k,m],N[k],N[m],N. Use \u03B1=1 Dirichlet smoothing for likelihood\
  \ tables and \u03B2=0.5 Laplace smoothing for priors: pi_ckm=(n[c,k,m]+\u03B2)/(N[k,m]+3\u03B2\
  ), pi_ck=(n[c,k]+\u03B2)/(N[k]+3\u03B2), pi_cm=(n[c,m]+\u03B2)/(N[m]+3\u03B2), pi_c=(n[c]+\u03B2\
  )/(N+3\u03B2). Define p_ckm(b)=(n[c,k,m,b]+\u03B1)/(n[c,k,m]+\u03B1*B^3), p_ck(b)=((\u03A3\
  _m n[c,k,m,b])+\u03B1)/(n[c,k]+\u03B1*B^3), p_cm(b)=((\u03A3_k n[c,k,m,b])+\u03B1\
  )/(n[c,m]+\u03B1*B^3), p_c(b)=((\u03A3_k,m n[c,k,m,b])+\u03B1)/(n[c]+\u03B1*B^3).\
  \ For each cell also build weighted Chebyshev-neighborhood averages from p_ckm with\
  \ radii 1 and 2 using weights w(d)=2^-d by distance, renormalized over available\
  \ neighbors and denoted p_ckm^1, p_ckm^2. For each class c and row (k,m,b), choose\
  \ support level strictly in this order: A) use p_ckm and pi_ckm if N[k,m]>=300 and\
  \ n[c,k,m,b]>=6 and class-support mass M[c,k,m,b,1]>=6; B) else use p_ckm^1 and\
  \ pi_ckm if neighborhood mass at r=1 >=30; C) else use p_ckm^2 and pi_ckm if neighborhood\
  \ mass at r=2 >=80; D) else use p_ck and pi_ck if N[k]>=250; E) else use p_cm and\
  \ pi_cm if N[m]>=250; F) else use p_c and pi_c if n[c]>=400; G) else fallback to\
  \ pi_c. Compute class scores s_c=log(max(p_support,1e-12))+log(max(pi_support,1e-12)).\
  \ Output s_GALAXY, s_QSO, s_STAR, the margins s_QSO-s_STAR and s_STAR-s_GALAXY,\
  \ and softmax entropy over the three scores."
expected_signal: By anchoring color likelihoods to redshift and i-band regimes, this
  group preserves known astrophysical evolution of class manifolds while injecting
  class prevalence at the matching support level, and the explicit, data-driven fallback
  ladder should reduce noisy overfitting in sparse bins and improve balanced separation
  of overlapping classes, especially underrepresented high-redshift quasars.
risk: Fixed bin boundaries and quantile clipping can induce boundary effects near
  breakpoints, and support thresholds may bias decisions toward priors in genuinely
  rare local structures if tuned too aggressively, while fold-wise 3D sparse-count
  tensors plus repeated neighbor aggregation add implementation complexity and memory
  overhead that must be carefully managed.
