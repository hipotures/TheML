title: Hierarchical Redshift-Brightness Bayesian Color Posteriors
group_name: class_conditional_color_density_posteriors
family: bayesian_density_scoring
summary: "The group builds class-conditional posterior-like compatibility scores by\
  \ comparing each object\u2019s colors against empirical class manifolds estimated\
  \ in redshift and i-band brightness slices, with staged fallback to broader distributions\
  \ when local support is weak."
depends_on: []
strategy: "For each fold, build color coordinates c=[u\u2212g, g\u2212r, r\u2212i]\
  \ from the available training fold only. Use this same mapping for train and test\
  \ rows. Define redshift strata with explicit bounds [-0.01, 0.2, 0.7, 1.3, 2.0,\
  \ 3.2, 4.8, 7.01] (inclusive of the upper edge in the last bin). Define i-band bins\
  \ as fixed 0.50-mag intervals over the fold i-range, with hard clipping of any value\
  \ outside range to endpoint bins. For each color component, compute fold quantile\
  \ cut edges using 16 equiprobable bins after clipping at the 0.5 and 99.5 percentiles,\
  \ then append two overflow bins to guarantee bounded indexing for all rows. Let\
  \ n^c_{k,m,b} be class-c counts in redshift bin k, i bin m, and 3D color cell b;\
  \ let N^c_{k,m}=\u03A3_b n^c_{k,m,b}, N_{k,m}=\u03A3_c N^c_{k,m}, and B be total\
  \ color cells. Apply Dirichlet smoothing with \u03B1=1 and class-prior smoothing\
  \ \u03B2=0.5: \u03C0^c_{k,m}=(N^c_{k,m}+\u03B2)/(N_{k,m}+3\u03B2), P^c_{k,m}(b)=(n^c_{k,m,b}+\u03B1\
  )/(N^c_{k,m}+\u03B1B). Define a support floor n_min (e.g., 200). For each sample\
  \ at cell b in stratum (k,m), score class c as s_c=log(\u03C0+\u03B5)+log(p+\u03B5\
  ), where \u03B5=1e-12 for numerical safety, but before using p run a deterministic\
  \ backoff chain: if N_{k,m}<n_min or the target cell is empty/unstable, use Chebyshev-radius-1\
  \ neighborhood averaging with weights 1, 1/2, 1/4, then radius-2 if needed; if still\
  \ unsupported, use redshift-marginal P^c_k(b), then global P^c(b), and if all else\
  \ fails use global \u03C0^c only. After final backoff, emit s_GALAXY, s_QSO, s_STAR,\
  \ margins s_QSO\u2212s_STAR and s_STAR\u2212s_GALAXY, and normalized softmax entropy\
  \ of s_c."
expected_signal: Conditioning on redshift and brightness directly encodes expected
  astrophysical evolution in color distributions while preserving class-level prevalence,
  so ambiguous colors are resolved using local class manifold density instead of global
  similarity, improving discrimination of minority structures such as high-z quasars
  and reducing balanced-accuracy loss from overlap between classes.
risk: Sparsity in fine strata can still produce noisy estimates if thresholds are
  set too low, bin boundaries may bias nearby points near transitions, and the additional
  3D histogram tables increase memory/time unless built sparsely and cached, while
  any hyperparameter tuning of binning/backoff done outside cross-validation risks
  optimistic bias.
