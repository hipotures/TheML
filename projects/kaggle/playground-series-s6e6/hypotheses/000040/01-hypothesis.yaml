title: Bayesian class posterior from redshift- and brightness-conditioned color density
  bins
group_name: class_conditional_color_density_posteriors
family: bayesian_density_scoring
summary: Builds class-compatible score surfaces for galaxy, quasar, and star classes
  by estimating class-conditional color-density and class priors in coarse redshift
  and apparent-magnitude strata, then emitting posterior-style margins as features
  so ambiguous color overlaps are resolved through class prevalence and local manifold
  support.
depends_on: []
strategy: "Compute the color vector x=[u-g, g-r, r-i] and keep redshift and i as conditioning\
  \ coordinates only. Bin redshift into fixed astrophysical intervals (for example\
  \ 0\u20130.3, 0.3\u20131.2, 1.2\u20132.6, 2.6\u20134.0, 4.0\u20137.0) and i into\
  \ fixed 0.5-mag bins across the training range. For each class c in {GALAXY, QSO,\
  \ STAR}, each redshift bin z_k and i-bin i_m, estimate a smoothed 3D color histogram\
  \ H_{c,k,m}(bin_u-g, bin_g-r, bin_r-i) using global color edges from training (e.g.,\
  \ 14 equiprobable bins per color, clipped at training min/max). Use additive count\
  \ smoothing \u03B1: P_c(x|k,m) = (H_{c,k,m}+\u03B1)/(sum_all_bins H_{c,k,m}+\u03B1\
  *Bcells), with Bcells the total 3D bins. Class prior in each stratum is \u03C0_c(k,m)=(N_{c,k,m}+\u03B2\
  )/(N_{k,m}+3\u03B2). Score each row as s_c = log \u03C0_c(k,m)+log P_c(x|k,m). If\
  \ a stratum-cell combination is under-supported, back off: first to neighboring\
  \ color cells (Chebyshev radius 1), then to the stratum-aggregated density for (k,m),\
  \ then to global class prior-only baseline. Emit three raw scores s_galaxy, s_qso,\
  \ s_star, two margins s_qso-s_star and s_star-s_galaxy, plus softmax entropy over\
  \ s_c as additional features."
expected_signal: This group adds calibrated, class-aware compatibility estimates that
  directly encode where each object sits relative to empirical class manifolds under
  each redshift/brightness regime, reducing confusion where raw colors overlap and
  improving balanced performance by down-weighting dense-star regions and rewarding
  high-probability quasar and galaxy color-redshift pockets.
risk: Histogram binning is lossy and can introduce boundary artifacts, especially
  for sparse high-redshift QSO cells, so nearest-neighbor-backed smoothing is required;
  because priors are class- and stratum-dependent, fit-time leakage can occur if class
  statistics are computed from test-visible targets, so the model must be fit only
  on training folds.
