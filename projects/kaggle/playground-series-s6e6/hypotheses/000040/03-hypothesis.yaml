title: Fold-wise Bayesian color posteriors with hierarchical stratum backoff
group_name: class_conditional_color_density_posteriors
family: bayesian_density_scoring
summary: "This group generates class-aware posterior-like compatibility features by\
  \ estimating how likely each object\u2019s colors are under galaxy, quasar, and\
  \ stellar color distributions conditioned on redshift and i-band brightness, then\
  \ emitting calibrated class score and margin signals."
depends_on: []
strategy: "For each model-training fold, build all statistics from the training partition\
  \ only and reuse the same transforms for validation and test rows. Construct colors\
  \ c=[u\u2212g, g\u2212r, r\u2212i]. Clip redshift to [\u22120.01, 7.01] and clip\
  \ each color to foldwise 0.5th/99.5th percentile bounds, keeping two overflow bins\
  \ so binning is always valid. Use fixed redshift intervals z_breaks=[\u22120.01,\
  \ 0.20, 0.60, 1.05, 1.70, 2.45, 3.60, 5.00, 7.01] and fixed 0.50-mag i-band intervals\
  \ with hard clipping to edge bins. For each color component, use 16 equiprobable\
  \ bins within the clipped range plus two overflow bins; combine into 3D cells b=(b1,b2,b3)\
  \ and keep sparse counts n_{c,k,m,b} for class c\u2208{GALAXY,QSO,STAR}, redshift\
  \ bin k and i-bin m. Apply Dirichlet smoothing \u03B1=1 and class-prior smoothing\
  \ \u03B2=0.5: \u03C0_{c,k,m}=(N^c_{k,m}+\u03B2)/(N_{k,m}+3\u03B2), P_{c,k,m}(b)=(n_{c,k,m,b}+\u03B1\
  )/(N^c_{k,m}+\u03B1\xB7B^3), where B is number of 1D color bins including overflow\
  \ bins and N^c_{k,m}=\u2211_b n_{c,k,m,b}. Precompute marginals P_{c,k}(b) (sum\
  \ over m), P_c(b) (sum over k,m), and global \u03C0_c from the same fold. Score\
  \ each sample deterministically with a strict backoff chain: if N_{k,m} and the\
  \ target cell support are above n_min=180, use P_{c,k,m}(b); else smooth within\
  \ the same stratum with Chebyshev-neighborhood averaging first radius 1 then radius\
  \ 2 using weights [1, 1/2, 1/4, ...], renormalized; if still sparse use P_{c,k}(b),\
  \ then P_c(b), and finally \u03C0_c. Use s_c=log(p_support+1e-12)+log(\u03C0_support+1e-12),\
  \ where p_support is the chosen likelihood level and \u03C0_support is corresponding\
  \ prior at that level. Output dense features s_GALAXY, s_QSO, s_STAR, margins s_QSO\u2212\
  s_STAR and s_STAR\u2212s_GALAXY, and softmax entropy of [s_GALAXY,s_QSO,s_STAR]."
expected_signal: Conditioning color distributions on both redshift and i-band brightness
  aligns with known astrophysical shifts in object loci, so score contrasts resolve
  overlap regions with lower ambiguity and preserve class prevalence in each physical
  regime, which should improve balanced recall of minority structures such as high-redshift
  QSOs without forcing a rigid global decision boundary.
risk: Although staged backoff reduces brittle sparsity effects, the fixed stratum
  and bin edges can still induce boundary sensitivity and noisy estimates in poorly
  populated regions if tuned on full data, and maintaining many 3D sparse cubes can
  increase memory/time unless explicitly implemented with sparse structures and strict
  fold-based fitting.
