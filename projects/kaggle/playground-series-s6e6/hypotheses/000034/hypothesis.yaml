title: Blackbody-Like Continuum Compatibility
group_name: blackbody_continuum_distance
family: physically_informed_shape_model
summary: "Project each source\u2019s five-band photometric SED onto a low-dimensional\
  \ physical blackbody-manifold, then encode how closely its normalized continuum\
  \ shape matches a stellar-like thermal spectrum and where it fails in a way that\
  \ is distinct from simple color differences."
depends_on: []
strategy: "For each row, convert ugriz magnitudes to positive linear flux proxies\
  \ using f_b = 10^(-0.4*m_b) and normalize to shape-only flux fractions p_b = f_b\
  \ / (f_u + f_g + f_r + f_i + f_z). Let effective wavelengths be \u03BB = [3551,\
  \ 4686, 6165, 7481, 8931] \xC5. Build a rest-frame variant by dividing \u03BB by\
  \ (1 + z_clip), where z_clip = max(redshift, 0.0). For a fixed log-spaced temperature\
  \ grid T \u2208 [1500 K, 50000 K] (e.g., 140 points), compute normalized Planck\
  \ templates B_b(T) \u221D (1/\u03BB'^5)/(exp(14387.7/(\u03BB' * T)) \u2212 1) for\
  \ each band b, then for each T solve the least-squares scale a_T = (\u03A3_b p_b\
  \ B_b)/(\u03A3_b B_b^2) and residual SSR_T = \u03A3_b (p_b \u2212 a_T B_b)^2. Select\
  \ T* with minimum SSR_T, and compute features: bb_logT = log10(T*), bb_ssr = SSR_T*,\
  \ bb_gap = sqrt(SSR_T*) , bb_second_margin = log(1 + SSR_2nd_best - SSR_min), and\
  \ per-band signed residual contrasts r_b = p_b \u2212 a_{T*}B_b(T*) for b\u2208\
  {u,g,r,i,z}; clip any non-finite redshift inputs and clamp fluxes with eps = 1e-12\
  \ before log/normalization to avoid division-by-zero instabilities."
expected_signal: "This group gives a direct physical proxy for photospheric thermal\
  \ shape: stars are expected to sit near the blackbody manifold with low residuals\
  \ and interpretable temperature estimates, while quasars\u2019 power-law/line-enhanced\
  \ continua and galaxies\u2019 composite spectra with breaks should systematically\
  \ increase mismatch, improving separation especially in color-overlap regions that\
  \ hurt linear color features."
risk: The fixed blackbody prior can over-constrain intrinsically nonthermal objects
  and may underperform where dust reddening, calibration offsets, or strong line contributions
  dominate broad-band shape, and the per-row template search is heavier than simple
  arithmetic transforms (so it increases feature-generation cost and should be implemented
  with vectorized grid evaluation).
