title: UV Blanketing Stellar Plausibility
group_name: uv_blanketing_metallicity_plausibility
family: stellar_photometric_parameters
summary: Represent whether an object's ugr colors are physically plausible as an F/G
  main-sequence star by translating u-band line blanketing at fixed optical color
  into stellar temperature and metallicity support, so quasar or galaxy impostors
  with impossible stellar parameters become explicit.
depends_on: []
strategy: Compute u-g and g-r, then form an F/G calibration support gate that is 1
  inside 0.2 <= g-r <= 0.6, tapers linearly to 0 over 0.0-0.2 and 0.6-0.8, and is
  0 outside; estimate stellar temperature with log10(Teff/K)=3.872-0.264*(g-r) inside
  the core and a broad fallback log10(Teff/K)=3.882-0.316*(g-r)+0.0488*(g-r)^2+0.0283*(g-r)^3
  clipped to the documented -0.3 < g-r < 1.3 range; estimate UV-blanketing metallicity
  in the hotter high-confidence window 0.2 < g-r < 0.4 and 0.8 < u-g < 1.4 using [Fe/H]=-21.88+47.39*(u-g)-35.50*(u-g)^2+9.018*(u-g)^3,
  and also compute the simpler low-metallicity proxy [Fe/H]=5.14*(u-g)-6.10 when 0.8
  < u-g < 1.0; derive clipped margins to plausible stellar metallicity bands such
  as [-2.5,0.3], halo-like [-2.2,-1.0], and disk-like [-1.0,0.3], plus validity distances
  from the u-g and g-r calibration windows, UV-excess conflict margins for u-g < 0.6,
  and support-weighted versions of the temperature and metallicity scores; invalid
  or out-of-domain estimates are retained as finite clipped boundary values with separate
  support indicators rather than missing values. This uses published SDSS F/G photometric
  metallicity and temperature relations from Ivezic et al. 2008 (https://www.aoc.nrao.edu/~akimball/Publications/ivezic_et_al_2008.pdf)
  and SDSS UV-excess quasar-selection context (https://classic.sdss.org/dr7/products/spectra/special.php).
expected_signal: Real STAR objects, especially F/G-like sources, should occupy physically
  plausible UV-blanketing and temperature ranges, while QSOs and some compact galaxies
  can share broad ugr colors but imply extreme or invalid stellar metallicities, improving
  separation in the known star-quasar overlap region without using labels.
risk: The signal is narrow because the metallicity calibration is intended for dereddened
  main-sequence F/G stars, so it may be redundant with existing u-band anomaly or
  stellar-locus features and can become noisy for faint objects or non-stellar sources
  whose u-band colors violate the calibration assumptions.
