title: Wavelength-aware ugriz shape diagnostics
group_name: broadband_color_shape
family: photometric_sed
summary: "Encode each object\u2019s optical spectral shape with deterministic slope-\
  \ and curvature-derived descriptors from the ugriz bands so class separation depends\
  \ on continuum geometry rather than absolute brightness."
depends_on: []
strategy: "Use only raw u, g, r, i, z magnitudes and treat the SDSS-like band pivot\
  \ wavelengths as fixed constants in \xC5: \u03BBu=3562, \u03BBg=4686, \u03BBr=6165,\
  \ \u03BBi=7481, \u03BBz=8931. For each row compute first-order color descriptors\
  \ on the fixed ordering and selected longer baselines: u\u2212g, g\u2212r, r\u2212\
  i, i\u2212z, u\u2212r, g\u2212i, g\u2212z, and u\u2212z. Convert adjacent pair colors\
  \ to wavelength-normalized slopes to remove non-uniform band spacing effects: s_ug=(u\u2212\
  g)/(ln \u03BBg\u2212ln \u03BBu), s_gr=(g\u2212r)/(ln \u03BBr\u2212ln \u03BBg), s_ri=(r\u2212\
  i)/(ln \u03BBi\u2212ln \u03BBr), s_iz=(i\u2212z)/(ln \u03BBz\u2212ln \u03BBi). Compute\
  \ curvature on magnitudes to capture bends in the SED over successive triples: c_ugr=u\u2212\
  2g+r, c_gri=g\u22122r+i, c_riz=r\u22122i+z, and a broader c_uz=u\u22122r+z. Add\
  \ corresponding slope-scale curvature terms to avoid aliasing from uneven wavelength\
  \ spacing: k_ugr=(s_gr\u2212s_ug)/(0.5*(ln \u03BBr\u2212ln \u03BBu)), k_gri=(s_ri\u2212\
  s_gr)/(0.5*(ln \u03BBi\u2212ln \u03BBg)), k_riz=(s_iz\u2212s_ri)/(0.5*(ln \u03BB\
  z\u2212ln \u03BBr)). Keep values deterministic, per-row, and untransformed (including\
  \ negative and large values); do not bin, rank, target-encode, or combine with labels.\
  \ If any operand used in a specific derived column is non-finite, emit null for\
  \ that column only and keep all other derived columns available."
expected_signal: Color differences remove most overall flux-level effects and are
  known to separate stellar, galactic, and quasar populations better than raw magnitudes,
  while explicit slope and curvature terms summarize continuum slope changes and breaks
  that map to stellar temperature sequences, galaxy populations, and quasar outlier
  structure, which should help improve balanced multiclass discrimination.
risk: The engineered descriptors are intentionally redundant with raw bands and with
  existing categorical context, so marginal gain may be limited; some quasar redshift
  regions have near-overlap in color space with stars; and formulas relying on u-band
  and endpoint combinations can amplify photometric noise for faint/high-error objects.
