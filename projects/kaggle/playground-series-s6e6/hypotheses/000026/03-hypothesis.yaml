title: Boundary-safe smooth spline SED interactions
group_name: aide_smooth_spline_sed_interactions
family: aide_smooth_basis
summary: Represent smooth nonlinear structure across sky position, photometric SED
  shape, redshift, and a small set of color-redshift manifolds using robust spline
  bases plus compact tensor interactions.
depends_on: []
strategy: Compute all transformation statistics on the training predictors only and
  reuse them unchanged for validation/test. Derive color indices c_ug=u-g, c_gr=g-r,
  c_ri=r-i, c_iz=i-z, c_ur=u-r, c_gi=g-i, c_rz=r-z, and c_uz=u-z. For alpha, wrap
  values with alpha % 360 and build a cyclic cubic spline basis over the fixed [0,
  360) domain with 7 degrees of freedom, dropping any constant or linearly redundant
  column so continuity is preserved at the 0/360 boundary. For delta, u, g, r, i,
  z, redshift, and all derived colors, impute unexpected missing values with the corresponding
  training median, then clip to robust training bounds before expansion. Use [q0.001,
  q0.999] bounds for magnitudes and colors to retain rare but plausible photometric
  extremes, [q0.001, q0.999] for delta, and for redshift use lower_bound=max(0, q0.001(redshift))
  and upper_bound=q0.999(redshift) so tiny negative measurement noise is removed without
  discarding the high-redshift QSO tail too aggressively. Fit non-cyclic cubic B-spline
  bases with 5 degrees of freedom per clipped non-periodic variable using training
  quantile knots, then retain the non-constant basis columns after centering each
  emitted column by its training mean. To keep the group compact, create tensor-product
  interactions only from the first two retained basis columns of redshift crossed
  with c_ug, c_gr, and c_ri, plus c_gr crossed with c_ri; name and order these deterministically.
  Do not use target labels, class frequencies, predictions, fold-specific outcomes,
  or model artifacts when constructing the features.
expected_signal: Spline bases expose smooth curved class boundaries in magnitude,
  color, sky-position, and redshift space, while the targeted tensor terms make redshift-dependent
  color separation easier for downstream learners, which can help balanced accuracy
  especially for QSO and STAR regions that are not well represented by raw threshold
  splits alone.
risk: The expansion introduces correlated columns that may be redundant for strong
  tree models and can increase variance for linear or distance-based learners; quantile
  clipping and fixed low-order interactions may also underrepresent rare extreme-redshift
  or unusual-color objects if those tails contain class-specific signal.
