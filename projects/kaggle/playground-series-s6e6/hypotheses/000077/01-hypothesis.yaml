title: Galaxy Mass-to-Light Plausibility
group_name: galaxy_mass_to_light_sequence
family: galaxy_evolution_physics
summary: Represent each object under a galaxy interpretation by converting optical
  color and redshift-scaled luminosity into stellar-mass and red/blue sequence plausibility
  signals.
depends_on: []
strategy: Use fixed astronomy-inspired color-mass logic from color-based mass-to-light
  and SDSS color-bimodality references (https://ned.ipac.caltech.edu/level5/Sept14/Conroy/Conroy3.html,
  https://academic.oup.com/mnras/article/481/1/1183/5078380, https://faculty.washington.edu/ivezic/Publications/Strateva.pdf).
  Clip redshift to z_eff=max(redshift,1e-4) and add validity flags for redshift<=0,
  redshift<0.003, and redshift>1.2 where ordinary galaxy mass proxies become extrapolative.
  Compute a fixed flat-cosmology luminosity distance and distance modulus, then derive
  pseudo absolute r and i magnitudes. Use clipped colors such as g-r, g-i, and u-r
  to estimate log mass-to-light ratios with fixed linear color relations, combine
  them with r/i luminosities into pseudo stellar-mass estimates, and summarize their
  central value, r-vs-i disagreement, low-mass deficit below about logM=7, high-mass
  excess above about logM=12.5, and distance from the SDSS u-r=2.22 red/blue separator.
  Encode whether the implied red/blue side agrees with galaxy_population, with all
  divisions protected by clipping and finite fallbacks for extreme magnitudes or redshifts.
expected_signal: True galaxies should often occupy plausible color-mass and red/blue
  population regimes, stars with near-zero redshift should become implausibly low-mass
  under a galaxy assumption, and high-redshift QSOs should often produce overmassive
  or color-inconsistent galaxy proxies, improving balanced separation without using
  labels.
risk: This partly overlaps with redshift-luminosity and catalog-tag consistency signals,
  and the fixed mass-to-light formulas are approximate because observed colors are
  not fully k-corrected; very high-redshift quasars and unusual compact galaxies may
  create unstable extrapolated values unless validity flags and clipping are retained.
