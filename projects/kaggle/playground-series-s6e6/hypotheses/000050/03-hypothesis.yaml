title: Fold-Safe Main-Sequence Distance Plausibility
group_name: main_sequence_parallax_plausibility
family: photometric_parallax
summary: Represent each object by how physically plausible its ugriz photometry is
  under a main-sequence stellar distance interpretation, using deviations from a stellar
  absolute-magnitude manifold as evidence against or for the STAR class.
depends_on: []
strategy: For each row compute x = g - i, flags x_below = 1[x < 0.20], x_above = 1[x
  > 4.00], x_blue_turnoff = 1[x < 0.45], and x_c = clip(x, 0.20, 4.00). Evaluate M_r_ms
  = -5.06 + 14.32*x_c - 12.97*x_c^2 + 6.127*x_c^3 - 1.267*x_c^4 + 0.0967*x_c^5. Define
  mu_ms = r - M_r_ms, log_d_pc = clip((mu_ms + 5) / 5, 0, 10), and d_pc_clipped =
  10^log_d_pc if a tree model can use raw-scale distances safely. Compute implied
  absolute magnitudes M_u = u - mu_ms, M_g = g - mu_ms, M_i = i - mu_ms, M_z = z -
  mu_ms, plus residual colors abs_ug = M_u - M_g, abs_gr = M_g - M_r_ms, abs_ri =
  M_r_ms - M_i, abs_iz = M_i - M_z. Also emit raw consistency deltas between observed
  color and the main-sequence-implied color, especially delta_gr = abs_gr - (g - r),
  delta_ri = abs_ri - (r - i), and delta_iz = abs_iz - (i - z), even though some are
  algebraically simple, because they expose the distance-model residuals to models
  that do not discover interactions easily. During fitting only, create 80 equal-frequency
  bins on x_c from the fold's training rows. For each bin, estimate robust class-agnostic
  medians and scaled MADs for mu_ms, log_d_pc, M_u, M_g, M_r_ms, M_i, M_z, abs_ug,
  abs_gr, abs_ri, abs_iz, and the listed deltas; use MAD_scaled = max(1.4826 * median_abs_deviation,
  1e-4). Require min_bin_n = 500; if a bin is smaller, merge symmetrically with adjacent
  bins until the threshold is reached, otherwise fall back to global fold-training
  statistics. At transform time, reuse the stored bin edges and statistics without
  refitting on validation or test data, then output clipped standardized residuals
  z_feature = clip((feature - bin_median) / bin_MAD_scaled, -10, 10), plus the within-bin
  percentile rank of mu_ms computed from stored fold-training empirical quantiles.
  Keep all clipping thresholds, bin edges, fallback rules, and feature ordering fixed
  between training and inference.
expected_signal: True main-sequence stars should produce coherent implied distances,
  absolute magnitudes, and residual colors within their g-i color neighborhood, while
  galaxies and quasars often need implausible distances or inconsistent absolute-color
  structures to satisfy the same stellar model, giving the classifier a physically
  meaningful separation signal that can help balanced accuracy on minority or overlapping
  classes.
risk: The relation is only a main-sequence approximation, so giants, turnoff stars,
  unresolved binaries, extinction effects, metallicity differences, saturated or noisy
  photometry, and very blue or red edge cases can appear falsely implausible; the
  residuals are partly redundant with raw colors and magnitudes, and any bin statistics
  or percentiles computed outside the training fold would leak distribution information
  into validation.
