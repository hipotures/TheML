title: AIDE broadband flux-ratio photometric expansion
group_name: aide_broadband_flux_ratios
family: aide_photometry
summary: Add deterministic nonlinear photometric transforms that recast ugriz magnitudes
  and redshift into broadband ratio, gap, flux-proxy, curvature, and compact redshift-interaction
  views while preserving the original AIDE-style feature idea.
depends_on: []
strategy: 'Use only u, g, r, i, z, and redshift, with no target labels, fitted statistics,
  row-order information, or model predictions. Let eps=1e-6 and k=-0.4*ln(10). For
  each magnitude band m in {u,g,r,i,z}, compute log_flux_proxy=k*m and flux_proxy=exp(clip(log_flux_proxy,-30,10));
  emit both, allowing downstream duplicate removal to discard affine-equivalent copies
  if desired. For ordered band pairs P={(u,g),(g,r),(r,i),(i,z),(u,r),(u,i),(u,z),(g,z),(r,z)},
  emit abs_gap=abs(ma-mb), signed_norm_gap=(ma-mb)/(abs(mb)+eps), safe_mag_ratio=ma/(sign(mb)*max(abs(mb),eps)),
  and flux_ratio=flux_proxy_a/(flux_proxy_b+eps). Add curvature terms u-2*r+i, g-2*i+z,
  and the adjacent color-curvature contrasts (u-g)-(g-r), (g-r)-(r-i), and (r-i)-(i-z).
  For redshift, set zr=max(redshift,0), emit zr, log1p(zr), zr^2, and zr^3 after clipping
  zr to [0,8], then add a small fixed set of interactions: log1p(zr) times each band
  flux_proxy, zr*(u-g), zr*(g-r), zr^2*(r-i), and zr^2*(g-z). Replace any non-finite
  result with a bounded sentinel derived from the same clipping rule, and keep all
  feature names deterministic and identical for train and test.'
expected_signal: Balanced accuracy may improve because the added features expose class-relevant
  broadband spectral slope, flux-scale, color-curvature, and redshift-dependent separation
  patterns that are only implicit in raw magnitudes and simple colors, helping minority
  classes such as QSO and STAR without using label-derived information.
risk: Many outputs are correlated with raw magnitudes or existing color features,
  so they can add noise and training cost; ratio and exponential terms may also exaggerate
  measurement artifacts or rare high-redshift tails if clipping, denominator protection,
  and downstream regularization are not handled consistently.
