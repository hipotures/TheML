title: Train-fitted redshift-color K-correction residual manifold
group_name: k_correction_residual_manifold
family: k_correction_consistency
summary: Learn a deterministic redshift- and color-conditioned photometric correction
  manifold from the predictors and encode how each object departs from locally expected
  pseudo-rest-frame SED geometry.
depends_on: []
strategy: 'Treat the correction as a training-fitted unsupervised transformer: within
  validation, fit all surfaces, bin edges, medians, and MADs on the training fold
  only; for final submission, refit on the full labeled training set and apply unchanged
  to test. Compute adjacent colors c_u=u-g, c_g=g-r, c_r=r-i, c_i=i-z, and c_z=g-r,
  plus clipped redshift z_c in the train-supported range. Use strata h=(spectral_type,
  galaxy_population), but require minimum support before fitting. Define redshift
  regimes [0,0.05), [0.05,0.3), [0.3,0.8), [0.8,1.8), [1.8,7.1]; merge adjacent regimes
  within h until each h x regime slice has at least 4000 rows, then fall back to spectral_type-only,
  then global regime fits if needed. For each band q, estimate a robust expected redshift
  correction Delta_q(z,c_q) rather than an absolute magnitude: set the response as
  m_q minus the h-specific low-redshift reference median for that band, where the
  reference is computed from rows with z<0.03 when available and otherwise from the
  lowest 2 percent of z in that h. Fit Huber or quantile-robust polynomial surfaces
  Delta_hat_q=beta1*z+beta2*z^2+beta3*c_q+beta4*c_q^2+beta5*z*c_q, with no intercept
  after centering so the correction is neutral at the reference redshift. Winsorize
  c_q and z to fold-training 0.5/99.5 percentiles for fitting and prediction, and
  emit clipping flags per band. Around regime boundaries, blend neighboring regime
  predictions with a linear weight over width 0.04*(1+z) when both fits exist; otherwise
  use the available fallback fit and mark a fallback-level feature. Compute pseudo-rest
  magnitudes M_q=m_q-Delta_hat_q. Within each effective stratum/regime, create quantile
  bins on (z_c,c_q) using up to 25 z bins and 10 color bins, reducing bin counts if
  needed so expected support is at least 150 rows per cell. For each q, store fold-training
  median and MAD for M_q, adjacent corrected colors D1=M_u-M_g, D2=M_g-M_r, D3=M_r-M_i,
  D4=M_i-M_z, and curvature terms C1=D1-D2, C2=D2-D3, C3=D3-D4. Produce residuals
  value-minus-median and scaled residuals residual/(MAD+1e-6). If a cell has fewer
  than 100 rows, borrow a distance-weighted median/MAD from neighboring quantile cells
  within radius 2; if still unsupported, fall back to the effective stratum/regime
  baseline and set low-support flags. Keep only deterministic correction residuals,
  scaled residuals, corrected-color and curvature residuals, plus compact support,
  clipping, blend, and fallback indicators.'
expected_signal: GALAXY, QSO, and STAR objects can share raw magnitude ranges but
  should differ in how consistently their colors and bandwise magnitudes follow a
  redshift-conditioned SED manifold, so residual geometry should improve balanced
  accuracy especially for minority or boundary cases whose raw photometry is ambiguous.
risk: The correction is only a proxy because distance modulus and true rest-frame
  SEDs are not observed, so fitted residuals may partly encode survey selection effects
  or redundant magnitude information; sparse high-redshift strata, aggressive fallback
  pooling, and fold-inconsistent preprocessing can also create unstable features or
  optimistic validation if statistics are not fit strictly inside each training fold.
