title: Redshift-Local SED PCA Residuals
group_name: redshift_partitioned_sed_pca_residuals
family: manifold_projection
summary: Represent each object's normalized ugriz spectral-energy shape by how well
  it lies on a redshift-local low-dimensional photometric manifold, exposing class-specific
  continuum mismatches and band-profile anomalies.
depends_on: []
strategy: Convert ugriz magnitudes to linear positive fluxes in double precision with
  f_b = 10^(-0.4 * m_b), optionally clipping magnitudes only to broad train-derived
  percentiles before exponentiation to avoid numerical domination by extreme values.
  Form the scale-free shape vector p_b = f_b / (sum_b f_b + 1e-12). Build label-blind
  redshift bins from training rows using quantile edges, starting with about 20 bins,
  then merge adjacent sparse bins until each fitted bin has at least max(3000, 0.25%
  of N_train) rows; keep a global fallback PCA fit over all training rows. For each
  populated bin, compute train-only mean and standard deviation of the five p components
  with a small std floor, standardize x = (p - mu) / sigma, fit PCA on x, retain K
  = min(3, rank) leading components, and keep the remaining orthogonal components
  when available. At transform time, clip redshift only for bin assignment to the
  train redshift range, assign to the matching populated interval or nearest populated
  bin midpoint, standardize with that bin's stored statistics, project onto retained
  PCs, reconstruct x_hat, and compute residual e = x - x_hat plus original-scale residual
  r = sigma * e. Emit retained PC scores, reconstruction error L2 in standardized
  space, relative standardized error, residual energy fraction sum(e^2)/(sum(x^2)+eps),
  omitted-PC signed coordinates for PC4 and PC5 when present, per-band original-scale
  signed residuals r_u..r_z, absolute per-band residuals, max absolute residual band
  index/value, and the empirical train-bin percentile rank of standardized reconstruction
  error. Winsorize emitted residual magnitudes using train-only per-feature caps and
  use fixed epsilons for all divisions.
expected_signal: Balanced accuracy may improve because redshift-local normalization
  separates ordinary smooth color evolution from unusual SED shape departures, giving
  the classifier explicit distance and direction information for quasars and ambiguous
  stars or galaxies that raw magnitudes, colors, and redshift alone may blur together.
risk: The features can be redundant with existing color and curvature descriptors,
  sparse redshift tails may produce unstable local bases despite merging, faint-band
  photometric noise can inflate residuals, and train-bin percentile features must
  be computed strictly from training folds during validation to avoid optimistic leakage.
