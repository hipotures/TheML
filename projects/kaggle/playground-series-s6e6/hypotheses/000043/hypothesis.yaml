title: Adaptive redshift-stratified SED manifold residuals
group_name: redshift_partitioned_sed_pca_residuals
family: manifold_projection
summary: "Model each object\u2019s normalized ugriz flux pattern against a redshift-local\
  \ low-dimensional spectral manifold so that quasar-like departures from the dominant\
  \ smooth spectral envelope and band-profile anomalies become explicit, class-discriminative\
  \ signals."
depends_on: []
strategy: "Convert each band to linear flux with a stable log-scale form f_b = 10^{-0.4\
  \ m_b}, then form scale-free per-object shape coordinates p_b = f_b / (\u03A3 f_b\
  \ + eps) for b in {u,g,r,i,z}. Partition training rows into fixed redshift strata\
  \ (e.g., equal-mass quantile bins over redshift or fixed-width bins with minimum-size\
  \ fallback); for each populated stratum, fit PCA on the 5-D vector p and keep the\
  \ first three components. For each row, using its assigned stratum\u2019s mean and\
  \ eigenvectors, compute the first-three projection scores c1..c3, reconstruct p\u0302\
  \ from those scores, and emit residual-based features: ||p - p\u0302||_2, ||p -\
  \ p\u0302||_2 / ||p||_2, residual energy fraction (sum residual^2 / sum p^2), and\
  \ signed residual coordinates (p - p\u0302)\xB7e_b for selected band basis directions\
  \ to preserve where mismatch occurs in color profile. If a row falls into an under-supported\
  \ bin (or boundary edge), back off to the nearest sufficiently populated bin or\
  \ a global PCA fit, and cap/clip redshift to training min/max only for binning."
expected_signal: A small number of PCA coordinates captures dominant smooth continuum
  geometry, while residual magnitude and direction expose high-frequency spectral
  irregularity and redshift-driven profile twists that are expected for quasars and
  some AGN-like galaxies but less for ordinary stars, especially improving separation
  in ambiguous redshift regions.
risk: Component estimates can be noisy when bin support is low, residual features
  may correlate strongly with existing curvature/locus-based groups, and extreme faint/noisy
  points (notably in u and z) can inflate residual metrics unless clipping and robust
  scaling are handled carefully.
