title: Redshift-Partioned SED Residual Manifold
group_name: redshift_partitioned_sed_pca_residuals
family: manifold_projection
summary: "Model the typical local shape of galaxy SEDs in redshift-sliced color space\
  \ and use each object\u2019s orthogonal departure from that manifold to expose class-specific\
  \ spectral irregularities that are not captured by raw magnitudes alone."
depends_on: []
strategy: "Convert ugriz magnitudes to flux using f_b = 10^{-0.4 m_b}, then build\
  \ a scale-free 5-band shape vector p=(f_u,f_g,f_r,f_i,f_z)/(\u03A3f + 1e-12) in\
  \ double precision. Build redshift bins from training data via fixed quantile edges\
  \ at 0,0.1,...,1.0 of train redshift and merge neighboring bins until every bin\
  \ has at least m samples where m=max(4000, floor(0.004 * N_train / nbins)); if any\
  \ bins remain sparse, remove them from local fitting and mark for fallback reassignment.\
  \ For each surviving bin, z-score p within-bin (mean/std from train rows in that\
  \ bin, with std floor) and fit PCA on the standardized vectors; retain the first\
  \ three components (or full rank if lower) and store mean, std, loadings, explained-variance\
  \ profile, and optional whitening scale. At inference, clip object redshift to [min_train,\
  \ max_train], assign to nearest populated bin by midpoint distance; if no direct\
  \ bin match, use nearest surviving bin; if still unavailable, fall back to a global\
  \ PCA fit on all training rows using the same preprocessing. Compute scores c =\
  \ W^T (p-z) and reconstruction p\u0302 = W c + \u03BC, then residual r = p - p\u0302\
  . Emit deterministic features: residual L2 norm ||r||_2, relative residual ||r||_2\
  \ / ||p||_2, residual energy fraction \u03A3r^2 / \u03A3p^2, orthogonal residual\
  \ component energy (variance outside retained PCs), signed directional residuals\
  \ r\xB7w_1..r\xB7w_3, per-band signed residual components r_b, and bin-local reconstruction-error\
  \ quantile (rank of ||r||_2 inside the fitted bin). Apply a global cap on residual\
  \ magnitudes per band to avoid u/z noise spikes from dominating and set a fixed\
  \ epsilon for all divisions."
expected_signal: Within narrow redshift windows, galaxies and many stars occupy a
  low-dimensional smooth spectral manifold, so residual-based distance and residual-direction
  descriptors provide a stable view of continuum mismatch; quasars, with shifted line
  features and other narrow-band anomalies, should produce more structured and larger
  out-of-manifold deficits, improving separability where plain color summaries are
  blurred.
risk: Local PCA quality depends on bin support and can become unstable near sparsely
  populated redshift tails, fallback reassignment can smooth over subtle local class
  structure, residuals in faint/noisy bands can still dominate despite clipping, and
  these features may overlap strongly with existing color-curvature features, increasing
  correlation and overfitting risk without regularization.
