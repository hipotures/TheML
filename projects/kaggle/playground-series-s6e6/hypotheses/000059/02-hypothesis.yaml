title: Redshift-binned tag compatibility residual margins
group_name: tag_redshift_compatibility_residuals
family: tag_manifold_consistency
summary: Generate features that quantify how well an object's broadband color pattern
  aligns with the color manifold implied by its provided catalog tags at similar redshift,
  and how strongly it is contradicted by competing tag regimes.
depends_on: []
strategy: "Compute the 4-vector color response C=[u-g, g-r, r-i, i-z] for every row.\
  \ Transform redshift with t=log1p(max(redshift,0)) and form initial redshift bins\
  \ from global training quantiles (e.g., 200 quantiles), then greedily merge adjacent\
  \ bins so each final bin has at least Bmin_train=3000 rows, capping the number of\
  \ bins at a small stable value. Define the eight catalog tag states s = spectral_type\
  \ \xD7 galaxy_population. For each state-bined cell (s,b) in training, estimate\
  \ a robust center \u03BC_s,b by median(C), residuals r=C-\u03BC, componentwise scales\
  \ \u03C3_s,b=1.4826\xD7MAD(r) with lower floor \u03C3_floor = 1e-3, and a robust\
  \ covariance \u03A3_s,b from winsorized residuals (componentwise clipping to [P1,\
  \ P99] within cell, then empirical covariance). Stabilize \u03A3_s,b by adding \u03BB\
  \xB7diag(median \u03C3_train^2) with \u03BB=0.1 and 1e-6 on the diagonal before\
  \ inversion. At score time, for a given object and candidate state j, select profile\
  \ (j,b*) by first trying the target redshift bin, then nearest neighboring bins\
  \ b\xB11, b\xB12, b\xB13, b\xB14 until count(s,b*) \u2265 150, then fallback to\
  \ all-redshift profile for that state, and finally to the global all-state profile\
  \ if still unavailable. Compute Mahalanobis distance d_ij^2=(C-\u03BC_j,b*)^T \u03A3\
  ^{-1}_{j,b*}(C-\u03BC_j,b*) and clip d_ij^2 to training P1-P99 for all such distances.\
  \ Let own state be the object\u2019s catalog tags; denote d_self for own state and\
  \ d_1,d_2 as nearest and second-nearest distances among the three alternative states.\
  \ Emit bounded margin features m_1=d_1-d_self and m_2=d_2-d_self, raw scores d_self,d_1,d_2,\
  \ z-score residual vectors r_self=(C-\u03BC_self)/\u03C3_self and for argmin alternative\
  \ r_alt1, and a fallback-level indicator (direct/neighbor/state/global) plus a short\
  \ compatibility prior feature p_self_class = count_class(state-bin, class=self_state?)/count(state-bin)\
  \ using training-class frequencies inside (s,b) with the same fallback chain."
expected_signal: Objects whose visible colors are internally consistent with their
  provided tags at a given redshift should have small d_self and large positive mismatch
  margins, while quasar-like or mis-tagged sources will show inflated self-distance
  and small or negative margins, giving a class-discriminative signal in overlaps
  where raw colors alone are ambiguous.
risk: This group can be brittle when tag assignments in train and test are noisy or
  distribution-shifted, so profile mismatch features may become systematic error rather
  than signal; sparse or highly uneven bins can force fallback and reduce granularity;
  covariance inversion and clipping choices may introduce hyperparameter sensitivity;
  and the engineered residuals can be partially redundant with direct color and redshift
  features, increasing model complexity without guarantee of generalization.
