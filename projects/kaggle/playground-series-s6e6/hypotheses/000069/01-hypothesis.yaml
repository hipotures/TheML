title: Scan-order photometric incoherence
group_name: sdss_scan_order_incoherence
family: temporal_photometry
summary: Represent whether an object's five-band photometry is smoother in physical
  wavelength order than in the SDSS camera scan-time order, exposing non-simultaneous,
  moving-source, variability, or band-quality effects that ordinary color features
  can miss.
depends_on: []
strategy: Use the documented SDSS imaging order r,i,u,z,g with 71.7 second filter
  spacing and 54 second exposures (https://www.sdss3.org/dr9/imaging/imaging_basics.php,
  https://www.sdss4.org/instruments/camera/). Convert u,g,r,i,z magnitudes to relative
  log-flux after subtracting the per-row median magnitude, fit a robust low-order
  continuum versus log central wavelength using the five SDSS effective wavelengths,
  and compute residuals. Reorder those residuals into scan order r,i,u,z,g and derive
  scan-order first differences, second differences, maximum absolute temporal jump,
  signed early-minus-late residual contrast, temporal roughness divided by wavelength-order
  roughness, scan-order residual autocorrelation, and the largest residual jump across
  the non-wavelength-adjacent scan steps i-to-u and z-to-g. Normalize all roughness
  and jump quantities by the row's total residual absolute deviation plus a small
  epsilon; clip extreme magnitudes and residual ratios at robust finite bounds; if
  the continuum fit is degenerate, fall back to median-centered residuals.
expected_signal: Stars, galaxies, and quasars can share similar broad colors, but
  point-source variability and SDSS non-simultaneous imaging are known to help quasar-related
  selection in multi-epoch settings (https://arxiv.org/abs/1508.04121, https://www.sdss4.org/dr17/algorithms/ancillary/boss/variable225/),
  while scan-order residual structure may also flag moving-source or band-specific
  measurement artifacts that affect stellar-like objects differently from extended
  galaxy-like objects.
risk: The 71.7 second SDSS inter-filter spacing is much shorter than most quasar variability
  timescales, so the signal may be weak and partly redundant with single-band anomaly
  or SED-roughness features; scan-order artifacts may also be survey-processing-specific
  and unstable if the synthetic data do not preserve the original SDSS acquisition
  geometry.
