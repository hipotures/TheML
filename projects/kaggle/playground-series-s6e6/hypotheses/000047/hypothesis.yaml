title: Flux-Allocation Entropy and Concentration in ugriz
group_name: flux_allocation_entropy
family: spectral_energy_allocation
summary: Represent each object as a normalized five-band flux-allocation profile and
  model its information concentration and wavelength spread to separate sources by
  how their intrinsic energy is distributed across the ugriz SED instead of using
  raw magnitudes or pairwise colors alone.
depends_on: []
strategy: "For each row, convert magnitudes to linear flux proxies f_u, f_g, f_r,\
  \ f_i, f_z = 10^(-0.4*m). Add a tiny floor eps = 1e-12 * max(1, median(f_u..f_z))\
  \ to each flux, then normalize p_k = f_k / sum(f_k) so p lies on a simplex. Create\
  \ deterministic shape descriptors: Shannon entropy H = -sum(p_k*ln p_k), normalized\
  \ entropy Hn = H / ln(5), Gini-style concentration G = 1 - sum(p_k^2), Simpson concentration\
  \ S = sum(p_k^2), and top-bucket ratio p_max / (p_second + eps). Add wavelength-location\
  \ descriptors using fixed effective SDSS central wavelengths \u03BB = [3551,4686,6165,7481,8931]\
  \ \xC5: \u03BC = sum(p_k*ln \u03BB_k), v = sum(p_k*(ln \u03BB_k-\u03BC)^2), and\
  \ 3rd/4th centered moments m3 = sum(p_k*(ln \u03BB_k-\u03BC)^3), m4 = sum(p_k*(ln\
  \ \u03BB_k-\u03BC)^4). Compute the same set once more using rest-frame-adjusted\
  \ axis values ln(\u03BB_k/(1+z+1e-6)) to capture coarse redshift-aware redistribution.\
  \ Add robust contrast proxies using cumulative shares: blue_flux = p_u+p_g, red_flux\
  \ = p_i+p_z, center_flux = p_r, and differences blue_flux-red_flux, p_u-p_i, p_g-p_r,\
  \ p_z-p_g. For numerical safety, clip each moment to finite range by replacing NaN/inf\
  \ with training-stable neutral values before downstream use."
expected_signal: The feature group captures global SED allocation patterns that are
  invariant to distance and overall brightness and can reveal class-specific energy
  concentration behavior (e.g., red-dominated, peaked profiles versus flatter, broader
  profiles), adding orthogonal information to color-slope/curvature features and improving
  separation where quasar/galaxy/star colors partially overlap.
risk: These descriptors can be highly correlated with existing shape and color-transformed
  groups, and concentration metrics may become noisy for low-SNR points, so gains
  may be modest or unstable in the faintest or photometrically problematic regions.
