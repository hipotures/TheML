title: Surrogate photometry flag margins
group_name: surrogate_photometry_flag_margins
family: measurement_quality
summary: Approximate missing SDSS-style photometric quality and support-boundary flags
  from the available predictors so likely corrupted, saturated, edge-case, or single-band-anomalous
  measurements become explicit classification context.
depends_on: []
strategy: 'Use only training-predictor fit constants and apply them unchanged to test
  rows: for alpha, delta, u, g, r, i, z, redshift, adjacent colors, and all pairwise
  colors, store robust quantiles q0.001, q0.01, q0.99, q0.999 and MAD-scaled centers;
  create lower_tail=max(0,(q0.001-x)/(q0.01-q0.001+eps)), upper_tail=max(0,(x-q0.999)/(q0.999-q0.99+eps)),
  two_sided_tail=max(lower_tail,upper_tail), and clipped empirical support percentile
  min(rank_pct,1-rank_pct). For ugriz only, fit a robust straight continuum per row
  against log effective wavelength anchors 3543, 4770, 6231, 7625, and 9134 Angstrom,
  compute leave-one-band residuals standardized by training MAD, then summarize maximum
  isolated residual, residual dispersion, count of bands above 2 and 4 robust sigma,
  signed residuals at the most extreme blue and red bands, and one-hot indicators
  for which band is most pathological. Add aggregate support features such as maximum
  numeric tail, count of numeric values beyond q0.001/q0.999, maximum color tail,
  count of extreme colors, alpha wrap-edge distance min(alpha,360-alpha), delta survey-edge
  distance from training min/max, and redshift cap proximity to -0.01 and 7.01; replace
  zero scale denominators with eps and clip all margin magnitudes to [0,10]. External
  basis used: SDSS quasar-selection documentation notes rejection of BLENDED, BRIGHT,
  SATURATED, EDGE, deblending, interpolation, and other photometry-error flags, and
  SDSS target-selection documentation discusses bright/faint magnitude limits and
  imaging-pipeline effects (https://classic.sdss.org/dr7/products/general/edr_html/node54.php,
  https://classic.sdss.org/dr7/products/general/target_quality.php).'
expected_signal: Objects with bad or boundary photometry can be scattered away from
  normal color loci, especially causing stars to mimic quasars or compact galaxies,
  so explicit quality-surrogate margins may help balanced accuracy by separating true
  astrophysical outliers from measurement or survey-support artifacts.
risk: The group may be redundant with existing depth, censoring, and continuum-shape
  features, and because it uses empirical support edges it can overfit synthetic generation
  or survey-release-specific artifacts rather than stable astrophysical class structure.
