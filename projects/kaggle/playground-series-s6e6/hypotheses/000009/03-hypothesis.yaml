title: SDSS Locus Residuals with Active-Axis Aggregates
group_name: canonical_locus_coordinates
family: locus_projection
summary: Represent each object by its signed and normalized displacement from canonical
  SDSS stellar and red-galaxy color manifolds, with validity-aware summaries that
  distinguish tight stellar-locus membership from galaxy-track behavior and broad
  photometric outliers.
depends_on: []
strategy: 'Compute ug = u - g, gr = g - r, ri = r - i, and iz = i - z for internal
  use. Compute fixed SDSS principal-color residuals s = -0.249*u + 0.794*g - 0.555*r
  + 0.234, w = -0.227*g + 0.792*r - 0.567*i + 0.050, x = 0.707*g - 0.707*r - 0.988,
  and y = -0.270*r + 0.800*i - 0.534*z + 0.054. Compute corresponding along-locus
  support coordinates p1_s = 0.910*u - 0.495*g - 0.415*r - 1.280, p1_w = 0.928*g -
  0.556*r - 0.372*i - 0.425, p1_x = ri, and p1_y = 0.895*r - 0.448*i - 0.447*z - 0.600.
  Convert residuals to clipped intrinsic-width units: ns = clip(s/0.031, -12, 12),
  nw = clip(w/0.025, -12, 12), nx = clip(x/0.042, -12, 12), and ny = clip(y/0.023,
  -12, 12). Define binary validity masks ms = (r <= 19.0) and (-0.2 <= p1_s <= 0.8),
  mw = (r <= 20.0) and (-0.2 <= p1_w <= 0.6), mx = (r <= 19.0) and (0.8 <= p1_x <=
  1.6), and my = (r <= 19.5) and (0.1 <= p1_y <= 1.2). Output the raw residuals, clipped
  normalized residuals, along-locus coordinates, and masks. Let active_count = ms
  + mw + mx + my and active_ratio = active_count/4. For masked aggregate features,
  use only active normalized residuals when active_count > 0; otherwise aggregate
  over all four normalized residuals while keeping active_count = 0 and active_ratio
  = 0. On the effective residual set compute min_abs, mean_abs, median_abs, max_abs,
  std_abs, rms_abs, signed_sum, signed_mean, count_abs_le_1, count_abs_le_2, count_abs_between_2_4,
  count_abs_gt_4, and the corresponding fractions using the effective axis count as
  denominator. Also compute all-axis versions of mean_abs, max_abs, rms_abs, signed_sum,
  count_abs_le_2, and count_abs_gt_4 so objects outside the formal validity windows
  still retain a comparable global outlier score. For the red-galaxy track, compute
  c_perp = ri - gr/4 - 0.18 and c_par = 0.7*gr + 1.2*(ri - 0.18), then output c_perp,
  abs(c_perp), c_perp squared after clipping c_perp to [-2, 2], c_par, and sign(c_perp)
  with sign(0) = 0. All outputs are deterministic functions of the test-available
  predictors only, with no fitted calibration or target-dependent thresholds.'
expected_signal: Stars should occupy a narrow tube in the validated stellar-locus
  coordinates, quasars should more often produce large signed perpendicular residuals
  or multi-axis outlier scores, and galaxies should be partly separated by weaker
  stellar-locus affinity plus coherent position relative to the red-galaxy color track;
  these signals can improve balanced accuracy by making STAR recall and QSO/GALAXY
  confusion boundaries easier for the classifier to model.
risk: The constants, widths, and support windows assume SDSS-like photometric calibration
  and may become biased if the magnitudes are not dereddened or have different zero-points,
  noise behavior, or depth; the features are linear or low-order transforms of existing
  magnitudes and colors, so they add redundancy and can encourage overreliance on
  an astrophysical prior that may fit normal stars and red galaxies better than blue
  galaxies, dust-reddened AGN, or other unusual spectral-energy distributions.
