title: Redshift-tracked absorption trough residuals
group_name: redshifted_absorption_trough_residuals
family: absorption_line_geometry
summary: Model physically motivated, redshift-aligned deficits and excesses around
  major optical absorption complexes in ugriz by comparing observed band flux to an
  in-band continuum estimate, so subtle line-blanketing geometry complements global
  color information for class separation.
depends_on: []
strategy: "For each object, convert magnitudes to linear flux proxies f_u..f_z = 10^{-0.4m}.\
  \ Use SDSS-like band spans e=[3000,4100,5500,7000,8200,9200] \xC5 and centers c=[3551,4686,6165,7481,8931]\
  \ \xC5. Use rest-frame lines L={CaII K 3933.7, CaII H 3968.5, G-band 4304, H\u03B4\
  \ 4102, H\u03B3 4341, H\u03B2 4861, Mg b proxy 5175, Na I D 5893}. For each \u03BB\
  0 in L compute \u03BBobs=\u03BB0(1+z). Define visibility mask v\u03BB=1 when 3000\u2264\
  \u03BBobs\u22649200 else 0, and if z<0 set v\u03BB=0. For visible lines, find containing\
  \ band j with e_j\u2264\u03BBobs\u2264e_{j+1}, and estimate continuum f_cont(\u03BB\
  obs) in log-flux/log-wavelength space using nearest available neighboring bands:\
  \ if both neighbors of j exist, perform log-linear interpolation between (log c_{j-1},log\
  \ f_{j-1}) and (log c_{j+1},log f_{j+1}); if at edge, use a robust linear fit on\
  \ the four closest available (band,log-flux) points, then predict at \u03BBobs.\
  \ Let q\u03BB = 1-0.5*min(1, |\u03BBobs-c_j|/((e_{j+1}-e_j)/2)), clipped to [0.5,1],\
  \ to down-weight edge uncertainty. Let fb = flux of containing band and compute\
  \ signed residual r=(f_cont-fb)/(f_cont+1e-12), deficit d=max(r,0), excess a=max(-r,0),\
  \ then clip d,a to [0,3]. Create grouped features: D_blue = \u03A3(v\u03BB*q\u03BB\
  *d) over {CaII K, CaII H, G-band, H\u03B4, H\u03B3}; D_red = \u03A3(v\u03BB*q\u03BB\
  *d) over {H\u03B2, Mg b, Na I D}; A_tot = \u03A3(v\u03BB*q\u03BB*a) over all lines.\
  \ Use contrasts: absorption_excess_ratio = A_tot/(D_blue + D_red + 1e-6); metal_blanketing_skew\
  \ = (D_blue-D_red)/(D_blue+D_red+1e-6); and CaK_CaH_vs_Balmer = (d_CaIIK+d_CaIIH)/(d_H\u03B4\
  +d_H\u03B3+1e-6). Add per-regime versions by multiplying these aggregates by redshift\
  \ masks z\u2208[0,0.45), [0.45,1.1), [1.1,2.0), [2.0,7.0), and include a total visible_line_count\
  \ = \u03A3(v\u03BB*q\u03BB) and per-line visibility indicators for fallback safety."
expected_signal: The constructed residual geometry captures redshift-dependent line-blanketing
  signatures that are not fully represented by raw colors, which is useful for balanced
  accuracy because it adds class-discriminative structure where QSO, STAR, and GALAXY
  overlap in broad-band colors, especially when classes have unequal prevalence and
  decision boundaries depend on subtle spectral-shape perturbations.
risk: Residuals are derived from broad filters, so weak and high-redshift lines can
  be dominated by noise and continuum-fit bias, z-shifted feature drift may induce
  non-stationarity across bins, and many of these statistics are correlated with existing
  continuum-slope and break descriptors, creating overfitting risk unless model regularization/selection
  is applied.
