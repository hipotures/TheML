title: Redshift-tracked absorption trough residuals in ugriz
group_name: redshifted_absorption_trough_residuals
family: absorption_line_geometry
summary: Model the broadband imprint of age/metallicity-sensitive stellar and galaxy
  absorption complexes by measuring how much flux is locally suppressed when known
  absorption-line rest-frame wavelengths are shifted into the observed ugriz bands,
  so class separation uses spectroscopic-style line-blanketing patterns in addition
  to global colors.
depends_on: []
strategy: "Convert ugriz magnitudes to linear flux proxies f_u..f_z = 10^-0.4*m. Define\
  \ band effective wavelengths \u03BB = [3551, 4686, 6165, 7481, 8931] \xC5 and their\
  \ contiguous passband spans (u 3000-4100, g 4100-5500, r 5500-6900, i 6900-8200,\
  \ z 8200-9200 \xC5 approximations). For each object compute observed line centers\
  \ \u03BB_obs = \u03BB_rest*(1+z) for a fixed set of absorption-sensitive features:\
  \ Ca II K (3933.7), Ca II H (3968.5), G-band (4304), H\u03B4 (4102), H\u03B3 (4341),\
  \ H\u03B2 (4861), Mg b triplet proxy 5175, and Na I D 5893. If \u03BB_obs lies inside\
  \ any ugriz span, estimate smooth local continuum at \u03BB_obs by log-flux interpolation\
  \ between the two neighboring filters straddling \u03BB_obs; if at an edge, use\
  \ a 5-point robust linear fit in log f vs log \u03BB to predict f_cont. Compute\
  \ signed residual r = (f_cont - f_band)/(f_band + eps), with eps small (e.g. 1e-12),\
  \ then split into deficit d = max(r,0) and excess e = max(-r,0). Build grouped columns:\
  \ total_blue_abs_deficit = mean(d for blue lines), total_red_abs_deficit = mean(d\
  \ for H\u03B2/Mg b/Na D), absorption_excess_ratio = (sum(e))/ (sum(d)+1e-6), metal_trough_balance\
  \ = total_blue_abs_deficit - total_red_abs_deficit, and line_family_contrast = CaK+CaH\
  \ combined deficit vs H\u03B4+H\u03B3+G-band deficit. Add visibility masks per line\
  \ (1 if in-band, 0 else) and per-redshift-regime masks (z<0.4, 0.4-1.2, 1.2-2.0,\
  \ 2.0-7.0) so regime-limited aggregates are zeroed when no line is visible."
expected_signal: Quasar continua are comparatively smooth and line-deficit patterns
  in broad bands are weaker or irregular, while stars and galaxies more often show
  redshift-dependent absorption-blanketing structure; tracking these signed deviations
  at physically meaningful rest-frame line positions should help disentangle ambiguous
  QSO-vs-galaxy and STAR-vs-QSO regions that are often separable only by subtle spectral-shape
  perturbations.
risk: Broadband integration strongly dilutes narrow-line effects, so signal can be
  weak or noisy in faint objects and at high redshift where key lines redshift out
  of ugriz; approximate band pass boundaries or single-value continuum proxies may
  inject systematic bias, and the features are partially redundant with other continuum/break
  geometry groups, increasing overfit risk unless regularized.
