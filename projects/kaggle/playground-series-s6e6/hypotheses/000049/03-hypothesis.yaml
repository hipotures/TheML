title: Asinh Censoring Topology and Dropout Geometry
group_name: asinh_censoring_regime_geometry
family: detection_regime_geometry
summary: Describe each source by the wavelength-ordered pattern of reliable, low-signal,
  and effectively censored asinh-photometric bands, then summarize how that censoring
  pattern changes the observable SED shape.
depends_on: []
strategy: 'For each band in wavelength order u,g,r,i,z, convert the asinh magnitude
  m_b to relative linear flux x_b=f_b/f0 using the SDSS softening constants beta={u:1.4e-10,g:0.9e-10,r:1.2e-10,i:1.8e-10,z:7.4e-10}:
  x_b=2*beta_b*sinh(-(ln(10)/2.5)*m_b-ln(beta_b)). Use q_b=x_b/(2*beta_b) as the dimensionless
  asinh argument. Derive regime anchors from the same constants rather than hard-coding
  them: m0_b=-(2.5/ln(10))*ln(beta_b), where x_b=0, and m10_b=-(2.5/ln(10))*(asinh(5)+ln(beta_b)),
  where x_b=10*beta_b. Assign a three-state regime R_b=2 for q_b>=5 reliable/Pogson-like
  detection, R_b=1 for 0<=q_b<5 low-signal positive asinh flux, and R_b=0 for q_b<0
  negative or below-zero flux. Keep regime assignment un-winsorized, but winsorize
  x_b to train-only per-band quantiles, for example [0.001,0.999], before continuous
  shape calculations. Add per-band features R_b one-hot, signed margins m10_b-m_b
  and m0_b-m_b, boundary softness sigmoid((m10_b-m_b)/0.10), and censor-depth ratio
  clip((m_b-m10_b)/(m0_b-m10_b),0,1). Build topology features from the five R_b values:
  counts of each state, base-3 full-pattern code, one-hot flags for common blue-side
  dropouts such as u low while redder bands are detected and u+g low while r/i/z are
  detected, analogous red-side censoring flags, first and last reliable band index,
  leading and trailing censored run lengths, longest contiguous run with R_b<=1, longest
  contiguous run with R_b==0, number of regime transitions, and pairwise counts of
  bluer-censored/redder-detected and bluer-detected/redder-censored inversions. For
  SED shape, use only positive observed bands with R_b>0 and winsorized x_b: compute
  adjacent log-flux slopes log10((x_{b2}+1e-12)/(x_{b1}+1e-12)) when both adjacent
  bands are valid, adjacent slope curvatures when both neighboring slopes are valid,
  and set invalid terms to 0 with matching validity indicators. Also compute positive-flux
  allocation summaries after zeroing R_b==0 bands: p_b=x_b/sum_valid(x_b), normalized
  entropy, wavelength-index centroid, and concentration max(p_b). All fitted cutoffs
  or quantiles must be estimated on the training fold only and reused unchanged for
  validation or test rows.'
expected_signal: Balanced accuracy should benefit because faint-end class errors often
  occur where raw ugriz magnitudes blur together reliable colors, low-SNR colors,
  and non-detections; this feature block makes blue dropouts, red-side censoring,
  and censored SED shape explicit so the classifier can separate quasars, galaxies,
  and stars in boundary regions without relying only on raw magnitudes.
risk: The thresholds assume the provided magnitudes follow the same SDSS asinh convention
  and softening constants, so any preprocessing mismatch can make the regimes miscalibrated.
  Hard regime boundaries can be noisy near m10 and m0, full-pattern indicators may
  duplicate raw flux/color information, and rare topology patterns can overfit unless
  regularized or validated with fold-local preprocessing.
