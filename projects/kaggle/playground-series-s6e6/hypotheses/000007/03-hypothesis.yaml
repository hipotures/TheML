title: Tie-Aware Ordinal Band Topology
group_name: band_order_topology
family: ordinal_sed
summary: Encode the shape of each object's ugriz brightness ordering and slope topology
  so the model can use relative spectral-continuum structure without depending on
  absolute apparent brightness.
depends_on: []
strategy: "Let m=[u,g,r,i,z] in wavelength order and use a tolerance \u03C4=0.02 mag,\
  \ with smaller magnitude meaning brighter. Compute \u0394=max(m)-min(m). If \u0394\
  <=2\u03C4, set flat_topology=1 and set topology-derived counts and positions to\
  \ neutral values: extrema positions=0, inversion counts=0, tie_fraction=1, monotone=1,\
  \ sign_changes=0, first_change=0, second_change=0, topology_bucket=flat. Otherwise\
  \ set flat_topology=0. For every band pair (a,b), define it as tied if |m_a-m_b|<=\u03C4\
  , otherwise order it by brightness. Build tolerance-aware ranks by sorting bands\
  \ by ascending magnitude while placing tied bands in the same rank block and breaking\
  \ only the within-block display order by wavelength u<g<r<i<z. Derive the rank block\
  \ of each band, brightest block position, faintest block position, brightest_is_edge,\
  \ faintest_is_edge, brightest_is_interior, faintest_is_interior, number of rank\
  \ blocks, maximum tie-block size, and tie_fraction=tied_pairs/10. Count pairwise\
  \ inversions among non-tied pairs relative to the wavelength template [u,g,r,i,z]\
  \ and relative to the reverse template [z,i,r,g,u], and normalize each by the number\
  \ of non-tied pairs, using 0 when all pairs are tied. Compute adjacent color slopes\
  \ d=[g-u,r-g,i-r,z-i] and assign raw signs s_k=+1 if d_k>\u03C4, -1 if d_k< -\u03C4\
  , else 0. Replace zero runs only when both nearest non-zero signs on the left and\
  \ right exist and agree; if a zero run touches one edge, fill from the single nearest\
  \ non-zero side; if the bracketing signs disagree, keep the run as 0 to preserve\
  \ an ambiguous local extremum. From the filled signs derive monotone=1 when all\
  \ non-zero signs are identical and no ambiguous zero remains, sign_changes as the\
  \ count of adjacent non-zero sign flips, one_turn=1 when exactly one flip occurs,\
  \ first_change and second_change as 1-based boundaries between adjacent colors with\
  \ 0 for absent changes, ambiguous_slope_count as the remaining zeros, and topology_bucket\
  \ in {strict_monotone, single_turn, multi_turn, ambiguous, flat}. Also record whether\
  \ the inferred single turn, when present, is peak-like or valley-like based on the\
  \ sign direction around the first change."
expected_signal: 'Balanced accuracy can improve because these features give the classifier
  class-relevant SED shape cues that raw magnitudes may dilute: stars often have smooth
  monotone broadband orderings, galaxies often show one dominant turnover or break-like
  shape, and QSOs are more likely to produce irregular or multi-turn band orderings
  as emission features move through filters.'
risk: "The features intentionally discard amplitude information and may overlap with\
  \ color features, while the discrete rank and turn states can still flip for low\
  \ signal-to-noise objects near the \u03C4 thresholds; tolerance choices that are\
  \ too small add noise, and choices that are too large can erase informative class-specific\
  \ color structure."
