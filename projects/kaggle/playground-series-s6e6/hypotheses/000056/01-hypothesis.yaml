title: Field-calibrated reddening-free locus offsets
group_name: local_reddening_free_locus_offsets
family: sky_photometry_normalization
summary: Estimate local sky-cell photometric zero-point/locus drift in reddening-free
  SDSS color space and represent each object by its field-normalized deviation from
  nearby-field stellar color behavior so class boundaries are set on corrected shapes
  rather than raw calibrated magnitudes.
depends_on: []
strategy: "For every object compute reddening-free coordinates Qgri=(g-r)\u22121.582(r\u2212\
  i) and Qriz=(r\u2212i)\u22120.987(i\u2212z). Tessellate sky into HEALPix cells at\
  \ nside=32; for robustness, define a context as the cell plus its 8 adjacent cells.\
  \ Within each context, and within coarse redshift strata [<0.01, 0.01\u20130.1,\
  \ 0.1\u20130.5, 0.5\u20131, 1\u20132, >2], compute robust medians and MADs for Qgri,\
  \ Qriz, and supporting colors (u\u2212g, g\u2212r, r\u2212i, i\u2212z). Emit standardized\
  \ offsets: (Qgri\u2212median)/MAD and (Qriz\u2212median)/MAD, the paired whitened\
  \ locus distance sqrt(z1^2+z2^2), and color residuals of the object versus local\
  \ median in u\u2212r and g\u2212i similarly standardized; also emit local context\
  \ density log1p(n/(area of context)) and its z-score against global context density.\
  \ If context count in a redshift stratum is below threshold (e.g., <40), shrink\
  \ to context without stratification, then to global medians; clip all standardized\
  \ values to a safe range such as [\u22128,8]."
expected_signal: This group removes field-level photometric shifts caused by calibration,
  crowding, and local extinction-systematics before class separation, so stars remain
  aligned to a stable local locus while galaxies and quasars stay as outliers in a
  normalized basis, improving class separability under balanced accuracy.
risk: Sparse high-redshift or very small sky contexts can make local medians noisy
  and inject unstable features, the same correction can attenuate real astrophysical
  sky gradients if the context is too aggressive, and the approach adds implementation
  complexity because robust map-based statistics must be fit once on the available
  rows and then applied consistently.
