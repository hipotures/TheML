title: Sky-context standardized reddening-free locus residuals
group_name: local_reddening_free_locus_offsets
family: sky_photometry_normalization
summary: Create per-object descriptors that compare each source to the local reddening-insensitive
  color locus at its sky and redshift context, converting raw colors into field-calibrated
  residuals and density-normalized offsets that are more stable for class separation.
depends_on: []
strategy: 'Compute base colors c_ug=u-g, c_gr=g-r, c_ri=r-i, and c_iz=i-z, then derive
  reddening-free axes q1=c_gr-1.582*c_ri and q2=c_ri-0.987*c_iz. Assign each object
  to a HEALPix context using nside=32 and expand the context to its 8 neighbors (total
  of up to 9 cells). Assign redshift strata with fixed edges [-inf,0.01,0.1,0.3,0.5,1.0,2.0,inf]
  and build robust statistics on the training rows only for every context+stratum:
  median and MAD of q1,q2,c_ug,c_gr,c_ri,c_iz and robust counts n_ctx. If n_ctx<60
  at context+stratum, fallback to the same context aggregated across all redshift
  strata; if still <60, use global statistics for that feature set; if still <60,
  use full-train global statistics. Use a MAD floor of 1e-6 and compute z-values z_f=(f-median_f)/MAD_f
  then clip each to [-8,8]. Emit z-scores for q1, q2, c_ug, c_gr, c_ri, and c_iz,
  emit locus deviation d=sqrt(z_q1^2+z_q2^2), and emit log-density features z_logdens=(log1p(n_ctx)-global_median_logdens_stratum)/MAD_logdens_stratum
  using the same chosen fallback layer as the medians; additionally emit binary indicators
  whether the feature layer came from stratified context, unstratified context, or
  global fallback.'
expected_signal: By removing local field-dependent photometric and extinction drift
  before classification, the same object classes are expressed in a common relative
  color space across sky regions, which should reduce intra-class scatter of GALAXY/STAR/QSO
  signatures while preserving class-outlier structure in a way that is more aligned
  with balanced accuracy.
risk: Sparse high-redshift or masked regions can force global fallbacks that weaken
  the correction, the context smoothing can remove real astrophysical sky variation
  tied to class prevalence, and several emitted residuals may be highly correlated
  with raw colors, increasing redundancy and potential overfitting if the downstream
  model is insufficiently regularized.
