title: Galactic and SDSS Sky Geometry
group_name: sky_frame_position_geometry
family: spatial_geometry
summary: Represent sky location in physically aligned Galactic and survey-coordinate
  frames so the classifier can use continuous celestial geometry, Milky Way structure,
  and SDSS footprint context instead of discontinuous raw equatorial angles.
depends_on: []
strategy: 'Use only alpha and delta. Wrap alpha_deg = alpha modulo 360 into [0,360),
  clip delta_deg to [-90,90], convert both to radians, and form the column unit vector
  p = [cos(delta)*cos(alpha), cos(delta)*sin(alpha), sin(delta)], renormalized by
  max(norm(p), 1e-12). Add wrap-safe equatorial geometry features sin(alpha), cos(alpha),
  sin(delta), cos(delta), and the three components of p. Convert p to Galactic coordinates
  with the standard J2000 equatorial-to-Galactic rotation for column vectors: [[-0.0548755604,-0.8734370902,-0.4838350155],[0.4941094279,-0.4448296300,0.7469822445],[-0.8676661490,-0.1980763734,0.4559837762]].
  From g = M p, compute l = atan2(g_y,g_x) wrapped to [0,2*pi) and b = asin(clamp(g_z,-1,1));
  add sin(l), cos(l), sin(b), cos(b), abs(b), pi/2 - abs(b), acos(clamp(cos(b)*cos(l),-1,1))
  for distance to the Galactic center, and acos(clamp(-cos(b)*cos(l),-1,1)) for distance
  to the anticenter. For SDSS survey coordinates, use the documented anchors from
  https://www.sdss4.org/dr16/algorithms/surveycoords/: X = unit_vector(RA=185, Dec=32.5),
  Y = unit_vector(RA=275, Dec=0), Z = normalize(cross(X,Y)); compute eta = asin(clamp(dot(p,Z),-1,1))
  and lambda = atan2(dot(p,Y), dot(p,X)) in [-pi,pi]. Add sin(lambda), cos(lambda),
  sin(eta), cos(eta), abs(eta), distances to the two SDSS node directions at RA 95
  and 275 degrees on Dec 0, and stripe-phase terms based on the 2.5 degree eta width:
  phase = (((eta_deg + 90) modulo 2.5) / 2.5), then sin(2*pi*phase), cos(2*pi*phase),
  and a scaled stripe index floor((eta_deg + 90)/2.5) clipped to [0,71] and centered
  by subtracting 35.5. Clip all inverse-trig inputs to [-1,1], keep angular outputs
  in radians except the stripe-width calculation, and replace any numerical NaN or
  Inf with deterministic finite defaults.'
expected_signal: Stars are local Milky Way objects whose density varies strongly with
  Galactic latitude and direction, while galaxies and QSOs are extragalactic but still
  inherit SDSS footprint and targeting anisotropy; these continuous frame-aware features
  can improve balanced accuracy by giving the model positional priors that are less
  discontinuous and easier to learn than raw RA/Dec.
risk: The group can overfit survey footprint, targeting, or synthetic split artifacts
  rather than astrophysical class structure, especially through stripe-phase and node-distance
  features; it is partly redundant with raw alpha and delta, and any mismatch between
  the assumed SDSS/J2000 coordinate conventions and the data generation process could
  introduce misleading high-confidence spatial priors.
