title: Fold-safe SEGUE atmosphere residuals
group_name: segue_stellar_atmospheric_indices
family: atmospheric_color_diagnostics
summary: Construct SDSS principal-color residual features that measure how tightly
  each object's broadband photometry follows a robust stellar-atmosphere color locus
  after accounting for redshift, spectral type, and population context.
depends_on: []
strategy: 'Fit the feature transformer only on the current training fold during validation
  and on full train for final submission; do not use test rows or target labels when
  estimating preprocessing statistics. From u,g,r,i,z compute ug=u-g, gr=g-r, ri=r-i,
  iz=i-z, then p1=0.91*ug+0.415*gr-1.280, v=0.283*ug-0.354*gr+0.455*ri+0.766*iz, and
  l=-0.436*u+1.129*g-0.119*r-0.574*i+0.1984. Build redshift decile edges from the
  fitting data, collapse duplicate edges, set outer edges to -inf and +inf, and assign
  zbin with out-of-range clipping. For each x in {p1,v,l}, estimate robust center
  and scale at four context levels: global, spectral_type, zbin+spectral_type, and
  zbin+spectral_type+galaxy_population. A cell statistic is usable only when n>=500;
  otherwise use the next coarser level. Center is median_x; scale is max(1.4826*median(abs(x-median_x)),
  (q75_x-q25_x)/1.349 when available, global_scale_x, 1e-6). Emit the raw indices,
  contextual z_x values from the deepest usable level, coarser global/spectral z_x
  values, abs(z_x), and context deltas z_x_global-z_x_contextual. Let z_p1,z_v,z_l
  denote the deepest contextual z-scores for composite features. Add p1_low=max(0,-0.70-p1),
  p1_high=max(0,p1+0.25), p1_band_violation=p1_low+p1_high, l_low=max(0,0.07-l), l_high=max(0,l-0.135),
  l_band_violation=l_low+l_high, v_abs=abs(v), abs_z_mean=(abs(z_p1)+abs(z_v)+abs(z_l))/3,
  abs_z_max=max(abs(z_p1),abs(z_v),abs(z_l)), locus_dist=sqrt(z_p1^2+z_v^2+z_l^2),
  signed_sum=z_p1+z_v+z_l, tail_count=I(abs(z_p1)>3)+I(abs(z_v)>3)+I(abs(z_l)>3),
  cross_vp=v_abs*z_p1, and cross_vl=v_abs*z_l. Clamp z-scores to [-8,8] before composites,
  winsorize raw indices, violations, v_abs, and interaction terms to fitting-data
  0.1/99.9 percentile limits, and replace unseen categorical cells, NaN, or inf with
  the defined coarser/global fallbacks, using 0 for unavailable standardized residuals.'
expected_signal: The canonical projections encode stellar continuum curvature and
  line-blanketing behavior, while multi-scale robust residuals distinguish objects
  that look normal only after contextual normalization from objects that are globally
  or locally off the stellar locus; this should improve STAR recall and reduce QSO/GALAXY
  confusion in overlapping color regions, directly supporting balanced_accuracy.
risk: The hard-coded stellar-locus bands and redshift/category bins may be brittle
  under distribution shift, robust statistics estimated from all classes can partially
  center dense non-stellar modes and weaken separation, and the added residual scales
  may be redundant with raw color or redshift features if the downstream model already
  captures the same geometry.
