title: SEGUE stellar atmospheric manifold residual stack
group_name: segue_stellar_atmospheric_indices
family: atmospheric_color_diagnostics
summary: Construct a context-aware set of SDSS color-space residual features that
  quantify how far each object departs from a robust stellar-atmosphere manifold,
  so STAR-like continua cluster near the manifold while GALAXY and QSO objects exhibit
  larger structured offsets.
depends_on: []
strategy: 'Using only train/test columns u,g,r,i,z,redshift,spectral_type,galaxy_population
  and target-free preprocessing, compute colors ug=u-g, gr=g-r, ri=r-i, iz=i-z. Compute
  the canonical indices p1=0.91*ug+0.415*gr-1.280, v=0.283*ug-0.354*gr+0.455*ri+0.766*iz,
  and l=-0.436*u+1.129*g-0.119*r-0.574*i+0.1984 (all in magnitudes). Build redshift
  bins from train-only deciles (q0..q100 at 10 equal-mass cuts, including clipped
  edges), assign each row to zbin, then estimate robust center/scale for each x in
  {p1,v,l} with hierarchical binning: (zbin,spectral_type,galaxy_population) if n>=800,
  else (zbin,spectral_type) if n>=800, else spectral_type if n>=800, else global.
  For each bin use median_x and mad_x, where mad_x = 1.4826*median(abs(x-median_x));
  define z_x=(x-median_x)/max(mad_x,1e-6). Clamp mad_x-derived divisors to epsilon
  and clamp all standardized outputs to [-8,8]. Derive bounded tail and manifold-residual
  features: p1_violation_left=max(0,-0.70-p1), p1_violation_right=max(0,p1+0.25),
  p1_violation=p1_violation_left+p1_violation_right; l_tail_low=max(0,0.07-l), l_tail_high=max(0,l-0.135),
  l_tail=l_tail_low+l_tail_high; v_abs=abs(v); abs_z_mean=(abs(z_p1)+abs(z_v)+abs(z_l))/3;
  locus_dist=sqrt(z_p1*z_p1+z_v*z_v+z_l*z_l); cross_vp=v_abs*z_p1; cross_vl=v_abs*z_l;
  residual_sign_balance=sign(z_p1)*sign(z_v)*sign(z_l). Replace missing feature values
  with cell medians, replace NaN/inf with finite defaults (0 for z-scores, median
  for raw indices), and keep global fallback statistics fixed from train-derived bins
  only.'
expected_signal: The hierarchical robust standardization removes global scale shifts
  from redshift and population context while preserving manifold shape, so STAR objects
  should yield near-zero residual geometry and lower composite distances, whereas
  QSO and many GALAXY SEDs should show larger tail and orthogonal departures; this
  reduces overlap in blue-color regions and is well aligned with improving balanced_accuracy
  across minority classes.
risk: Bin boundaries and hard thresholds are piecewise and can overfit if train and
  future test distributions differ (especially redshift extremes or spectral mix changes),
  some engineered residuals may be redundant with other color-geometry features, and
  sparse bin fallback can still collapse signals for rare subtype combinations.
