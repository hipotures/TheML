title: Empirical color-redshift consistency
group_name: photoz_color_consistency
family: photometric_redshift
summary: Encode whether an object's observed redshift is consistent with the redshift
  normally implied by its broadband color location, treating disagreement and local
  color-redshift ambiguity as class-separating signals.
depends_on: []
strategy: 'From the original ugriz magnitudes compute adjacent colors u-g, g-r, r-i,
  and i-z, clipping only non-finite intermediate values to training-column finite
  bounds if ever encountered. Using training predictors only, build deterministic
  lookup tables that summarize redshift behavior in color space: a primary grid over
  quantile-binned g-r, r-i, and r magnitude, plus fallback grids over g-r/r-i, u-g/g-r,
  and r-i/i-z. Use fixed bin edges learned from the training data, require a minimum
  cell count such as 30 for the primary grid and 50 for pairwise fallback grids, and
  store each valid cell''s median redshift, interquartile redshift spread, and row
  count. For each row, retrieve the most specific valid cell available; if no cell
  is valid, fall back to the global training median redshift and global interquartile
  spread. Derive features for signed redshift residual, absolute residual, residual
  divided by max(local IQR, 1e-3), local log count, local IQR, and an indicator for
  whether the value came from the primary grid, pairwise fallback, or global fallback.'
expected_signal: Stars should cluster near zero redshift even when their colors mimic
  parts of the galaxy or quasar locus, galaxies should follow smoother low-to-moderate
  color-redshift relations, and quasars often occupy color regions with multimodal
  or high-redshift behavior, so redshift residual size and local ambiguity can improve
  balanced separation of minority classes.
risk: The lookup can become sparse in rare color regions and may duplicate information
  already captured by raw redshift-color interactions; if computed with self-inclusion
  on the same rows being scored it can make training diagnostics look cleaner than
  test behavior, so the transform should avoid row self-reference when estimating
  development performance.
