title: Robust local color-redshift residuals
group_name: photoz_color_consistency
family: photometric_redshift
summary: Measure how unusual an object's observed redshift is relative to the redshift
  distribution expected for nearby objects in broadband color-magnitude space, using
  local disagreement and ambiguity as class-separating evidence.
depends_on: []
strategy: 'From ugriz magnitudes compute adjacent colors c_ug=u-g, c_gr=g-r, c_ri=r-i,
  and c_iz=i-z. Learn all clipping limits and bin edges from training predictors only:
  clamp colors to their 0.1/99.9 percentile training limits for stable bin assignment,
  but keep the original redshift for residual calculation after only replacing non-finite
  values with the training median if ever encountered. Build deterministic quantile-binned
  redshift reference tables using training rows only and no target labels. The primary
  table uses (c_gr, c_ri, r) with 9, 9, and 10 equal-frequency bins; valid cells require
  n>=40. Fallback tables use (c_gr, c_ri), (c_ug, c_gr), and (c_ri, c_iz), each with
  10x10 equal-frequency bins and n>=60. For every valid cell store median redshift,
  q10, q25, q75, q90, IQR=max(q75-q25, 1e-3), MAD, n, and robust skew proxy (q90+q10-2*median)/IQR.
  When transforming a row, first use its exact primary cell; if invalid, aggregate
  valid neighboring primary cells within Chebyshev radius 1 then 2 by n-weighted medians/quantiles;
  if still invalid, try the exact fallback tables in the listed order, then radius-1
  and radius-2 fallback neighborhoods, then global training redshift statistics. Emit
  features from the selected reference distribution: signed residual z-redshift_median,
  absolute residual, residual/IQR, absolute residual/IQR, indicators for below-q10
  and above-q90, local_log_count=log1p(n), local_IQR, local_MAD, local_skew_proxy,
  ambiguity=local_IQR/global_IQR, and an ordinal source_code for exact primary, expanded
  primary, exact fallback, expanded fallback, or global. For model validation, fit
  these tables separately inside each training fold and transform only the held-out
  fold; for final test scoring, refit tables on all training rows.'
expected_signal: Balanced accuracy can improve because stars should have redshifts
  near zero even when their colors overlap non-stellar regions, galaxies should usually
  follow smoother low-to-moderate color-redshift structure, and quasars often appear
  as high-redshift or locally ambiguous outliers, so calibrated residuals and local
  spread expose differences not captured by raw magnitudes alone.
risk: Fine bins and neighbor aggregation may still be noisy in rare color tails, and
  the features can be redundant with raw redshift and color interactions in strong
  nonlinear models. Training features are especially leakage-prone if rows contribute
  to their own lookup statistics, so out-of-fold construction is required for honest
  validation; the added lookup logic also increases preprocessing cost and must keep
  train/test binning strictly fixed.
