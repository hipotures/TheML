title: Dust-vector decomposition with extinction-invariant colors
group_name: foreground_reddening_geometry
family: reddening_invariant
summary: This feature family makes classifying stars, galaxies, and quasars more robust
  by separating foreground dust-driven color shifts from intrinsic broadband color
  structure so model boundaries reflect intrinsic SED and redshift information rather
  than line-of-sight extinction.
depends_on: []
strategy: "For each object, convert (alpha, delta) in degrees to Galactic longitude/latitude\
  \ (l, b) using a fixed sky-coordinate transform, then estimate E(B-V) from a preloaded\
  \ SFD98 dust map rescaled by the Schlafly\u2013Finkbeiner correction (multiply by\
  \ 0.86). If no map value is available, impute from the median E(B-V) in the same\
  \ 5\xB0\xD75\xB0 (l,b) bin built on train-only rows; if still empty, use the nearest\
  \ non-empty bin within 10\xB0 great-circle distance, else backfill with the global\
  \ train median. Clamp E(B-V) to [0, 1.2], output ebv_clipped and a binary is_ebv_imputed\
  \ flag. Compute A_u=5.155E, A_g=3.793E, A_r=2.751E, A_i=2.086E, A_z=1.479E and dereddened\
  \ magnitudes u0..z0 by subtracting each extinction from the observed band. Form\
  \ observed colors C=[u\u2212g, g\u2212r, r\u2212i, i\u2212z] and dereddened colors\
  \ C0=[u0\u2212g0, g0\u2212r0, r0\u2212i0, i0\u2212z0]. Define reddening direction\
  \ d=(A_u\u2212A_g, A_g\u2212A_r, A_r\u2212A_i, A_i\u2212A_z)/||\xB7||2 and compute\
  \ projections t=C\xB7d, t0=C0\xB7d, and dust displacement \u0394t=t\u2212t0. Compute\
  \ orthogonal residual R0=C0\u2212(t0d), keep R0[0],R0[1],R0[2], and ||R0||2. Add\
  \ context features |b|, latitude bin (train-fit quantile/decile bins), \u0394t\xD7\
  |b|, redshift\xD7E(B-V), and E(B-V)\xD7|b|. Clip all newly created continuous features\
  \ to train-derived 0.5th and 99.5th percentiles."
expected_signal: Foreground extinction moves objects along a nearly fixed direction
  in color space, so removing this axis and using orthogonal residuals should reduce
  class confusion in dusty regions while preserving discriminative structure from
  intrinsic SED differences and redshifted continua that are expected to be more informative
  for GALAXY/STAR/QSO separation.
risk: The approach can misfire where the external dust map is biased or inconsistent
  with this photometric campaign, and fixed SDSS coefficients may not perfectly match
  all object depths/regions; additional projected features may be redundant with base
  colors and sky-position signals, so net benefit can be small when the underlying
  model already internalizes those correlations.
