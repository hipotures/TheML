title: LRG DR2/DR3 Cut-Margin Geometry
group_name: lrg_target_cut_margins
family: target_selection_geometry
summary: This group converts SDSS LRG target-selection geometry into continuous margin
  features by projecting color information into the classic rotated LRG basis and
  measuring how strongly each object satisfies or violates each cut-family boundary.
depends_on: []
strategy: 'For every row, compute gmr = g - r and rmi = r - i. Derive DR2/DR3 rotated
  LRG coordinates c_perp = rmi - gmr / 4 - 0.177 and c_par = 0.7 * gmr + 1.2 * (rmi
  - 0.177). Use r as a proxy for r_Petro (because Petrosian magnitudes are not available).
  Build signed cut margins where negative means pass and positive means violation.
  Cut I margins: vI1 = r - (13.116 + c_par / 0.3), vI2 = r - 19.2, vI3 = abs(c_perp)
  - 0.2; score_cutI = max(vI1, vI2, vI3), which is <= 0 when Cut I is passed. Cut
  II margins: vII1 = (0.449 - gmr / 6) - c_perp, vII2 = (1.296 + 0.25 * rmi) - gmr,
  vII3 = r - 19.5; score_cutII = max(vII1, vII2, vII3), which is <= 0 when Cut II
  is passed. Emit score_cutI, score_cutII, and score_lrg_any = clip(min(score_cutI,
  score_cutII), -20, 20) so negative indicates membership in at least one LRG region
  and larger positive values indicate stronger rejection distance; optionally emit
  cut-pass indicators iI = 1 if score_cutI <= 0 else 0 and iII = 1 if score_cutII
  <= 0 else 0. No imputation is required because the provided columns have zero missing
  values; only final signed margins are clipped to [-20, 20] to suppress outlier leverage.'
expected_signal: Objects passing either LRG cut are strongly associated with red,
  extended galaxies, so these geometry margins provide a calibrated, physics-motivated
  separation signal that can outperform raw colors by explicitly encoding whether
  the object sits on, inside, or outside known LRG boundaries that also screen out
  many compact blue contaminants, helping GALAXY vs STAR/QSO discrimination.
risk: The implementation is a proxy of the true SDSS target logic because r_Petro,
  extinction-corrected model magnitudes, PSF/model morphology, and surface-brightness
  filters are not in the table, so margins can be biased and may overfit if the dataset
  is not SDSS-distributed; fixed numeric boundaries may also be brittle under synthetic
  color shifts and are partly redundant with base u,g,r,i,z color features.
