title: Observed SED Continuum Moments with Robust Residual Diagnostics
group_name: observed_sed_continuum_moments
family: spectral_shape
summary: Create a compact shape descriptor of the five-band observed spectral energy
  distribution that captures large-scale continuum slope and curvature together with
  localized deviations from a smooth trend while removing object-by-object brightness
  scaling.
depends_on: []
strategy: "For each object, first enforce deterministic validity checks on u,g,r,i,z\
  \ by replacing any non-finite value with the training-set per-band median and clamping\
  \ each remaining magnitude to train-derived bandwise 0.1%/99.9% quantiles (with\
  \ an explicit fallback physical cap of [-1,35] if quantiles are unavailable). Convert\
  \ to relative log-flux as l_b=-0.4*m_b, then remove absolute level by centering:\
  \ l'_b=l_b-mean_b(l_b). Use fixed SDSS pivot wavelengths \u03BB=[3543,4770,6231,7625,9134]\
  \ \xC5, define t_b=log10(\u03BB_b)-mean_b(log10 \u03BB_b), and fit a quadratic y(t)=\u03B2\
  0+\u03B21 t+\u03B22 t^2 to {t_b,l'_b} by closed-form OLS over the five bands. Compute\
  \ residuals e_b=l'_b-y(t_b), and emit deterministic residual descriptors: \u03B2\
  1, \u03B22, sqrt(mean(e_b^2)), mean(|e_b|), max(|e_b|), signed residuals at the\
  \ edge bands e_u,e_z, and a signed break index \u0394blue\u2212red=((l'_u-l'_g)/(t_u-t_g))-(l'_r-l'_i)/(t_r-t_i).\
  \ If X'X is singular/ill-conditioned or any intermediate becomes non-finite, emit\
  \ zeros for \u03B21,\u03B22 and residual features for that row to ensure stable\
  \ behavior."
expected_signal: 'The class priors differ primarily in broadband continuum morphology:
  stellar loci are usually smoothly varying and temperature-driven, galaxies often
  show stronger curvature from broad stellar-population breaks, and quasars are closer
  to power-law-like continua with characteristic local departures; fitting a normalized
  quadratic trajectory plus residual structure should isolate these class-separating
  traits more directly than raw magnitudes alone and can improve balanced-accuracy
  by reducing dependence on absolute flux scale.'
risk: The shape descriptors are strongly correlated with simple colors and can still
  learn survey-specific photometric systematics (extinction, calibration stripes,
  saturated/edge cases), and a quadratic model over five points may miss fine line-driven
  features that matter for some quasars, so aggressive clipping or ill-conditioned
  fallback can suppress real signal on outlier objects while reducing instability.
