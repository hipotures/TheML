title: Observed SED Continuum Moments with Fold-Safe Normalization
group_name: observed_sed_continuum_moments
family: spectral_shape
summary: Represent the five observed ugriz magnitudes as a brightness-normalized broadband
  continuum shape that captures smooth spectral tilt, broad curvature, and localized
  band departures from a low-order spectral trend.
depends_on: []
strategy: "For each training fold, learn only from that fold the per-band median and\
  \ 0.1%/99.9% clipping limits for u,g,r,i,z, and reuse those fitted values for validation\
  \ or test rows; when fitting on all training data for final prediction, learn the\
  \ same limits from the full train set. Replace non-finite magnitudes with the learned\
  \ band median, then clamp to the learned limits, with fallback limits [-1,35] if\
  \ a learned value is unavailable. Convert each cleaned magnitude to log relative\
  \ flux f_b=-0.4*m_b, subtract the row mean across the five bands to remove absolute\
  \ brightness, and use fixed SDSS effective wavelengths \u03BB=[3543,4770,6231,7625,9134]\
  \ Angstrom with t_b=log10(\u03BB_b)-mean(log10(\u03BB)). Fit an equal-weight quadratic\
  \ continuum f'_b=\u03B20+\u03B21*t_b+\u03B22*q_b+e_b, where q_b=t_b^2-mean(t^2),\
  \ using a precomputed pseudoinverse for the fixed five-band design. Emit \u03B2\
  1 as continuum tilt, \u03B22 as broad curvature, residual RMS sqrt(mean(e_b^2)),\
  \ mean absolute residual, max absolute residual, signed residuals e_u,e_g,e_r,e_i,e_z,\
  \ blue slope (f'_g-f'_u)/(t_g-t_u), red slope (f'_z-f'_r)/(t_z-t_r), and red-minus-blue\
  \ slope contrast. If any emitted value is non-finite after preprocessing and fitting,\
  \ replace only that value with zero."
expected_signal: 'Balanced accuracy may improve because class separation is strongly
  encoded in broadband SED morphology: stars tend to follow smooth temperature-driven
  color continua, galaxies often introduce broader curvature from population breaks,
  and QSOs can have power-law-like continua with distinctive band residuals, so normalized
  shape moments can expose class structure without relying on absolute flux scale.'
risk: These features are correlated with ordinary colors and raw magnitudes, so gains
  may be small for strong tree models; residuals may also capture survey calibration
  artifacts or extinction patterns rather than astrophysical class signal, and fold-unsafe
  preprocessing would leak validation distribution information if clipping statistics
  are not fit strictly inside each training split.
