title: Leakage-safe hierarchical metadata class-prior encoding
group_name: metadata_redshift_magnitude_class_priors
family: conditional_target_prior
summary: Learn smoothed class-prevalence signals conditioned on spectral metadata,
  galaxy-population tag, redshift regime, and apparent brightness so ambiguous photometric
  regions receive empirical context about which stellar class is most plausible.
depends_on: []
strategy: "Fit the encoder from training labels only, using out-of-fold computation\
  \ for train-side features during validation or model fitting and a refit on all\
  \ training data only for test inference. Estimate global class priors \u03C0_k for\
  \ k in {GALAXY, QSO, STAR}. Assign redshift_bin with fixed edges [-inf, 0.0, 0.1,\
  \ 0.4, 1.0, 1.4, 2.0, 2.8, 3.5, 4.5, inf] and i_bin with fixed edges [-inf, 17,\
  \ 18, 19, 20, 21, 22, 23, 24, 25, inf], so every observed or future numeric value\
  \ maps to a bin. For each row define hierarchical keys L4=(spectral_type, galaxy_population,\
  \ redshift_bin, i_bin), L3=(spectral_type, galaxy_population, redshift_bin), L2=(spectral_type,\
  \ galaxy_population), and L1=global. At every observed key and level, compute class\
  \ counts n_l(k), total n_l, and Dirichlet-smoothed posteriors p_l(k)=(n_l(k)+\u03B1\
  \xB7\u03C0_k)/(n_l+\u03B1), with \u03B1=30. Blend from specific to general using\
  \ count reliability \u03BB_l=n_l/(n_l+\u03B2_l), with \u03B2_4=150, \u03B2_3=250,\
  \ and \u03B2_2=400, producing p*=\u03BB_4 p_4+(1-\u03BB_4)[\u03BB_3 p_3+(1-\u03BB\
  _3)(\u03BB_2 p_2+(1-\u03BB_2)\u03C0)]. If a key is unseen or contains an unexpected\
  \ categorical value, set that level's \u03BB to 0 and continue backing off; if all\
  \ levels are unavailable, use \u03C0. Clamp p*_k to [1e-6, 1-1e-6] and renormalize\
  \ to sum to 1. Emit p*_GALAXY, p*_QSO, p*_STAR, class entropy -\u03A3p*log(p*),\
  \ max probability, top-two probability gap, one-vs-rest margins log((p*_k+\u03B5\
  )/(1-p*_k+\u03B5)) for each class, and prior-lift features log((p*_k+\u03B5)/(\u03C0\
  _k+\u03B5)) to express how much the local context differs from the global class\
  \ mix."
expected_signal: The features summarize stable empirical class-rate shifts across
  metadata, redshift, and brightness regimes, giving the downstream classifier useful
  context when ugriz colors overlap while the lift and margin forms help balanced_accuracy
  by exposing minority-class-enriched regions rather than only raw majority prevalence.
risk: This is a target-derived encoding, so leakage is likely unless train features
  are generated out-of-fold; sparse cells, hard bin boundaries, or shifted class prevalence
  between train and test can produce miscalibrated priors, and the features may be
  redundant with redshift and magnitude splits already learned by strong tree models,
  making shrinkage, backoff, and validation discipline essential.
