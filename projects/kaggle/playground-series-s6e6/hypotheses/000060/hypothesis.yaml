title: Context-anchored class prior encoding
group_name: metadata_redshift_magnitude_class_priors
family: conditional_target_prior
summary: Create class-priority features by learning how class prevalence changes with
  catalog tags, redshift regime, and brightness regime, so color-overlap regions are
  resolved using empirically supported astrophysical context rather than raw photometry
  alone.
depends_on: []
strategy: "For each training row, build deterministic stratification cells on `(spectral_type,\
  \ galaxy_population, redshift_bin, i_bin)`, where redshift_bin uses fixed astrophysically\
  \ interpretable breaks such as [-0.01, 0.1, 0.4, 1.0, 2.0, 2.8, 3.5, 4.5, 7.02]\
  \ and i_bin uses fixed magnitude bands over the observed range, e.g. [-inf,17,18,19,20,21,22,23,24,inf].\
  \ For every cell c, compute class counts n_c(GALAXY), n_c(QSO), n_c(STAR) and n_c(nonstratified)\
  \ from training labels only. Emit smoothed class posteriors with shrinkage to the\
  \ global priors \u03C0 via n\u0302_c(k) = (n_c(k)+\u03B1\xB7\u03C0_k)/(n_c+\u03B1\
  ), where k \u2208 {GALAXY,QSO,STAR} and \u03B1 is a fixed constant (e.g., 20\u2013\
  40). Generate derived columns: three class posteriors, three centered-logit margins\
  \ against the non-k mass (log((n\u0302_c(k)+\u03B5)/(1-n\u0302_c(k)+3\u03B5))),\
  \ class-entropy, and top-two gap. For empty or very sparse cells, back off hierarchically\
  \ to `(spectral_type, galaxy_population, redshift_bin)` then `(spectral_type, galaxy_population)`\
  \ then global priors; implement backoff by weighted interpolation with cell-count-dependent\
  \ weights, so no divide-by-zero and no undefined outputs. Any unexpected categorical\
  \ level in deployment is mapped to global priors."
expected_signal: This group adds calibrated, context-dependent prevalence signals
  where photometric features are ambiguous, especially in regions where quasar, galaxy,
  and star colors overlap, improving balanced recall by separating instances that
  share similar ugriz patterns but occur in very different known metadata regimes.
risk: "It is a target-derived encoding and can overfit if class proportions drift\
  \ between training and test contexts; sparse strata may produce unstable priors,\
  \ and overly sharp \u03B1 or hard bins can amplify sampling noise, so shrinkage\
  \ and backoff are essential."
