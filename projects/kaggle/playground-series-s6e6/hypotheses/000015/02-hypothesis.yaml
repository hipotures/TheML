title: Redshift Feasibility Margins Across SDSS Template Domains
group_name: redshift_template_domain_margins
family: redshift_geometry
summary: Model redshift as a compact class-geometry signal by encoding how closely
  each object sits to the operational STAR, GALAXY, and QSO redshift feasibility ranges
  used by SDSS-style spectral fitting.
depends_on: []
strategy: "From raw redshift z, construct deterministic domain-feasibility features\
  \ for three class templates: STAR domain S=[-v_max/c, +v_max/c] where v_max=1200\
  \ km/s and c=299792.458 km/s, GALAXY domain G=[-0.01, 1.00], QSO domain Q=[0.0333,\
  \ 7.00]. For each domain d in {S,G,Q}, compute signed margin m_d(z)= (z-low_d) if\
  \ z<low_d else (z-high_d) if z>high_d else 0, and absolute gap g_d=|m_d| (for in-domain\
  \ values g_d=0). Add domain flags f_d=1 if low_d<=z<=high_d else 0, preserving exact\
  \ in-domain equality. Add global sign feature s=sign(z) and star_velocity_proxy\
  \ = z / (1200/299792.458) to expose star-like Doppler scaling. Add ordered regime-distance\
  \ features for sorted breakpoints T=[-0.01, 0, 0.0333, 1.0, 2.2, 3.0, 3.5, 4.5,\
  \ 5.0, 7.0]: for each t in T, d_t_low=z-t, d_t_high=next_t-z, then replace missing\
  \ from end segments with a large finite constant and take clipped values log1p(|d|)\
  \ and also raw signed distances where useful; clip all distance/margin features\
  \ to a finite symmetric cap (e.g., \xB110 after log1p transform space) to avoid\
  \ leverage. For impossible-probability control, create hard penalties p_G = max(0,\
  \ -m_G) and p_Q = max(0, -(z-0.0333)) for z<0.0333 and p_S = max(0, |m_S|-0.00401)\
  \ to reinforce the near-zero star domain. All operations are deterministic and vectorizable,\
  \ with no target leakage and no floating point inf/NaN outputs."
expected_signal: "Converting z into class-domain geometry and explicit boundary-gap\
  \ features should increase separability under balanced accuracy because STAR cases\
  \ are tightly concentrated around |z|\u22481200 km/s, galaxies concentrate in a\
  \ low-to-moderate positive band, and quasars occupy a broader high-z regime with\
  \ characteristic low-z and intermediate-z ambiguity windows; this gives tree and\
  \ linear models a prior-compatible, interpretable structure that softens boundary\
  \ flips and reduces reliance on raw redshift alone."
risk: The feature group is highly correlated with raw redshift, so gains may be small
  for high-capacity models and can overfit if domain boundaries are treated as hard
  physics in a distribution-shifted synthetic test set; fixed breakpoints can become
  brittle under dataset or simulator redshift drift, and clipped margin transforms
  can hide but not remove edge-case miscalibration near overlap regions.
