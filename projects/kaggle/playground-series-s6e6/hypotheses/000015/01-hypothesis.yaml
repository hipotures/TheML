title: Spectroscopic Redshift Domain Margins
group_name: redshift_template_domain_margins
family: redshift_geometry
summary: Encode where each object falls relative to the physically and procedurally
  distinct redshift domains used for stellar, galaxy, and quasar spectral interpretation,
  so the classifier sees redshift as class-feasibility geometry rather than only as
  a raw scalar.
depends_on: []
strategy: 'Using only the observed redshift, create deterministic signed margins and
  clipped distances to SDSS-inspired class domains: stellar near-zero radial-velocity
  domain with |redshift|, sign(redshift), and distance outside an approximate +/-1200
  km/s interval converted by z ~= v/c; galaxy trial domain [-0.01, 1.00] with lower
  and upper signed margins plus an in-domain flag; quasar trial domain [0.0333, 7.00]
  with lower and upper signed margins plus an in-domain flag; ordered regime indicators
  and distances around astrophysically meaningful quasar/galaxy boundaries at z=0,
  0.0333, 1.0, 2.2, 3.0, 3.5, 4.5, and 5.0; replace impossible arithmetic results
  with finite clipped values and preserve exact boundary equality as in-domain. Reference
  basis: https://www.sdss3.org/dr10/algorithms/redshifts.php and https://www.sdss4.org/dr17/algorithms/legacy_target_selection/.'
expected_signal: Balanced accuracy may improve because STAR objects should concentrate
  tightly around zero redshift, GALAXY objects should mostly occupy low-to-moderate
  positive redshift, and QSO objects can occupy the broad high-redshift range where
  SDSS quasar selection and fitting behavior differs sharply from galaxy and stellar
  templates.
risk: This group is highly correlated with the raw redshift column and may be redundant
  for flexible learners; hard SDSS-derived boundaries can also be unstable if the
  synthetic train/test generator perturbs redshift distributions away from the documented
  survey/template regimes.
