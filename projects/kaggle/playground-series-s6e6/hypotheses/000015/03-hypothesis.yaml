title: Redshift Template Feasibility Margins
group_name: redshift_template_domain_margins
family: redshift_geometry
summary: Encode redshift as class-feasibility geometry by measuring each object against
  near-zero stellar, low-redshift galaxy, and broad quasar template domains rather
  than relying on redshift only as an unconstrained scalar.
depends_on: []
strategy: 'Using only raw redshift z, define fixed inclusive template domains: STAR
  S=[-1200/299792.458, 1200/299792.458], GALAXY G=[-0.01, 1.00], and QSO Q=[0.0333,
  7.00]. For each domain D=[lo, hi], compute an in_domain flag 1[lo <= z <= hi], lower
  signed margin z-lo, upper signed margin hi-z, outside signed distance where values
  below lo are z-lo, values above hi are z-hi, and zero otherwise, plus outside absolute
  gap max(lo-z, 0) + max(z-hi, 0). Add redshift sign, absolute redshift, and a star_velocity_scaled
  feature z / (1200/299792.458) to make the narrow stellar Doppler-scale region explicit.
  Add ordered breakpoint geometry for T=[-0.01, 0.0, 0.0333, 1.0, 2.2, 3.0, 3.5, 4.5,
  5.0, 7.0]: interval_id indicating which adjacent interval contains z, inclusive
  lower-edge distances z-t for each t, upper-edge distances t-z for each t, nearest_breakpoint_distance=min_t
  abs(z-t), and nearest_breakpoint_index. For all continuous margin and distance features,
  provide both raw clipped values using a symmetric finite cap such as [-10, 10] and
  compressed log_abs_signed=sign(x)*log1p(abs(x)); preserve exact boundary equality
  as in-domain, avoid divisions except the fixed stellar scale, and replace any non-finite
  result with the corresponding finite clipped value.'
expected_signal: 'Balanced accuracy may improve because the classes have strongly
  different redshift feasibility profiles: stars should cluster close to zero redshift,
  galaxies are mostly plausible in a low-to-moderate positive range, and quasars occupy
  a much broader positive range with important ambiguity near low-redshift boundaries;
  explicit margins can help both tree models and linear models learn these asymmetric
  class regions.'
risk: These features are largely deterministic transforms of raw redshift and may
  be redundant for high-capacity learners; fixed SDSS-inspired cutoffs can overfit
  survey-specific or synthetic-generator artifacts, and hard boundary features may
  miscalibrate examples near overlap regions where spectral_type, colors, or population
  features should dominate.
