title: asinh-Jacobian weighted SED shape
group_name: asinh_jacobian_weighted_shape
family: flux_uncertainty_geometry
summary: Model the five-band photometry in the SDSS asinh flux domain and encode continuum-shape
  features after down-weighting each band by its SDSS asinh low-signal confidence,
  so color relations from noisy bands do not dominate class boundaries.
depends_on: []
strategy: "For each band b in {u,g,r,i,z}, recover normalized flux from the SDSS asinh\
  \ relation using published softening parameters (b_u=1.4e-10, b_g=0.9e-10, b_r=1.2e-10,\
  \ b_i=1.8e-10, b_z=7.4e-10): q_b = 2*b_b*sinh(-(ln 10/2.5)*m_b - ln b_b), where\
  \ m_b is the provided magnitude and q_b = f/f0. Compute low-signal index x_b = q_b/(2b_b)\
  \ and a continuous reliability score w_b = |x_b|/(1+|x_b|), clipped to [0,1]. Use\
  \ these as weights to build one-band and cross-band shape features: (1) weighted\
  \ mean flux mu = \u03A3(w_b*q_b)/\u03A3w_b, (2) weighted orthogonal polynomial coefficients\
  \ (slope and curvature) from least-squares fitting q_b-mu against band order index\
  \ t\u2208{0,1,2,3,4}, (3) reliability-weighted flux contrasts c_ug, c_gr, c_ri,\
  \ c_iz where each contrast is scaled by sqrt((w_a w_b)/(w_a+w_b)) to suppress uncertain\
  \ endpoints, and (4) regime descriptors n_eff=\u03A3w_b, frac_reliable = count(w_b>0.6)/5,\
  \ weak_band=min(w_b), and reliable_band_count=count(w_b>0.2). If n_eff is near zero,\
  \ fall back to robustly imputed values from the corresponding global redshift-bin\
  \ medians and emit a binary low-confidence flag so the model can separate extrapolated\
  \ values."
expected_signal: Because SDSS magnitudes are asinh-based and u/z become progressively
  noisy at survey limits, this group should better preserve physically meaningful
  continuum differences for faint quasars and galaxies while suppressing spurious
  color excursions from low-SNR bands that blur class boundaries in raw magnitude-space
  differences.
risk: High overlap with existing asinh/flux-domain transforms is possible, so gains
  may be incremental; the method depends on fixed b coefficients from SDSS documentation
  and can become unstable for extreme magnitudes, requiring clipping/fallback handling
  to avoid numerical outliers and risking residual leakage of noise patterns as signal.
