title: Catalog Template Photometry Residuals
group_name: catalog_template_residuals
family: template_mismatch
summary: Quantify how far each object's observed ugriz photometric pattern departs
  from the typical broadband locus implied by its own catalog tags, so that agreement
  or disagreement with the stated object template becomes a direct class signal.
depends_on: []
strategy: 'Work in adjacent-color space rather than raw magnitudes: define c1=u-g,
  c2=g-r, c3=r-i, and c4=i-z. For each joint tag cell (spectral_type, galaxy_population),
  compute the training-set median and MAD for each of c1..c4; if a cell has fewer
  than 1000 rows, back off to spectral_type-only statistics, and if that is still
  too small, back off to global statistics. For every object, standardize each color
  against its matched template with rk=(ck-median_k)/max(MAD_k, 0.02), clipping rk
  to [-10, 10] to limit extreme leverage. From this residual vector create one coherent
  set of mismatch descriptors: the signed residuals r1..r4, the mean absolute residual
  across bands, the maximum absolute residual, the residual sum of squares, and a
  count of how many |rk| exceed 2.0. If an unseen category combination appears at
  inference, use the same backoff order; if any MAD is zero, replace it with 0.02
  before division.'
expected_signal: Balanced accuracy may improve because these features capture whether
  an object behaves like a clean member of its stated stellar-population template
  or is an outlier to that template, which can especially help separate STAR from
  QSO and edge-case GALAXY examples when raw colors alone look ambiguous.
risk: This group can be partly redundant with existing broadband color features, and
  if the catalog tags themselves are noisy or train/test template distributions drift,
  the learned mismatch thresholds may overfit stable tag-conditioned color centroids
  rather than true astrophysical boundaries.
