title: SDSS Depth-Regime Margin Features
group_name: survey_depth_limit_margins
family: selection_depth_geometry
summary: Encode apparent brightness as proximity to canonical SDSS-style galaxy and
  quasar spectroscopic depth boundaries so the model can learn class changes at bright
  galaxy limits, quasar targeting depths, and faint survey edges.
depends_on: []
strategy: 'Create deterministic features from the observed g, r, and i magnitudes
  only. For every threshold L, compute signed_margin_{band}_{L} = mag_band - L, where
  negative means brighter than the limit and positive means fainter. Use galaxy-oriented
  r thresholds L = 17.77, 19.2, 19.5, and quasar-oriented thresholds i = 15.0, 19.1,
  20.2, 20.4, 21.3, 22.45 plus g = 22.0 and r = 21.85. For each ordered interval [a,b],
  add inside_{band}_{a}_{b} = 1 if a <= mag_band <= b else 0, signed_interval_margin_{band}_{a}_{b}
  = 0 inside the interval, mag_band - a when brighter than the lower bound, and mag_band
  - b when fainter than the upper bound, plus abs_interval_margin as its absolute
  value. Use intervals i:[15.0,19.1], i:[15.0,20.2], i:[20.2,21.3], i:[21.3,22.45],
  r:[17.77,19.2], r:[19.2,19.5], and r:[17.77,19.5]. Add aggregate descriptors: nearest_qso_abs_margin
  = minimum absolute margin across all quasar thresholds, nearest_gal_abs_margin =
  minimum absolute margin across the galaxy r thresholds, nearest_qso_signed_margin
  and nearest_gal_signed_margin from the same nearest thresholds, qso_minus_gal_boundary_distance
  = nearest_qso_abs_margin - nearest_gal_abs_margin, and one-hot indicators for which
  quasar threshold and which galaxy threshold is nearest. Keep all transforms row-local
  and deterministic; if any future magnitude is missing or non-finite, set features
  derived from that band to 0 and set that band''s interval indicators and nearest-threshold
  indicators to 0.'
expected_signal: 'Balanced accuracy may improve because class prevalence is unlikely
  to vary smoothly only with raw brightness: nearby galaxies cluster around bright
  r-selected regimes, quasars extend into deeper i/g/r-selected regimes, and stars
  often overlap quasar colors but can differ in how they occupy these selection-depth
  neighborhoods.'
risk: These are historical survey-selection proxy features rather than intrinsic labels,
  so they may be redundant with raw magnitudes and colors or overfit if the dataset
  was simulated with different depth rules, extinction handling, morphology assumptions,
  or train/test-specific magnitude artifacts.
