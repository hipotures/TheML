title: SDSS Selection-Depth Boundary Margins
group_name: survey_depth_limit_margins
family: selection_depth_geometry
summary: Represent each object by its signed distance to canonical SDSS galaxy and
  quasar targeting depth landmarks in ugriz space so the learner can capture how class
  likelihood shifts when an object sits near historical spectroscopic magnitude boundaries.
depends_on: []
strategy: 'Compute deterministic signed margin features from available magnitudes:
  for each threshold L in each relevant band, use margin_b_L = mag_b - L (negative
  means brighter than the cutoff, positive means fainter). Use galaxy-relevant r-band
  limits L = 17.77, 19.2, 19.5, and use quasar-relevant i-band limits L = 15.0, 19.1,
  20.2, 20.4, 21.3, 22.45 plus g=22.0 and r=21.85. Build interval-structure features
  with inclusive bounds by computing both membership and distance-to-interval-boundary:
  in_[a,b] = 1{a <= mag_b <= b}; dist_to_interval_[a,b] = 0 if inside interval, else
  -(a-mag_b) if mag_b < a, else +(mag_b-b) if mag_b > b. Recommended intervals: i
  in [15.0,19.1], i in [15.0,20.2], i in [20.2,21.3], i in [21.3,22.45], r in [17.77,19.2],
  and r in [19.2,19.5]. Add compact regime descriptors: d_qso = min absolute margin
  over all quasar thresholds (per object), d_gal = min absolute margin over {17.77,19.2,19.5}
  in r, nearest_qso_band = argmin threshold distance among {i-15.0, i-19.1, i-20.2,
  i-20.4, i-21.3, i-22.45, g-22.0, r-21.85}, nearest_gal_band = analogous over galaxy
  r thresholds, and boundary_gap = d_gal - d_qso. Optionally include signs of the
  nearest qso and nearest gal margins to distinguish brighter-side versus fainter-side
  excursions. All features are pure deterministic transforms; if a magnitude is missing/non-finite,
  set all derived features from that band to 0 and associated interval flags for that
  band to 0.'
expected_signal: 'These features inject prior structure from known survey selection
  geometry that is often reflected in class composition: bright flux-limited cuts
  align strongly with nearby galaxies, very faint point-like objects align with quasar-style
  targeting depth, and star/qso separators are most ambiguous near shared color regimes;
  explicit boundary-aware features can therefore improve balanced accuracy at the
  difficult QSO versus STAR and bright/faint GALAXY transition regions.'
risk: The margins are proxy features tied to historical SDSS targeting rules, so if
  the train/test generation does not follow those specific boundaries (different tile
  geometry, photometric calibration, or newer selection logic), they can become noisy,
  redundant with raw magnitudes and color features, and may overfit to release- or
  chunk-specific artifacts rather than intrinsic class structure.
