title: Dual Rest-frame Break Alignment Signal
group_name: dual_restframe_break_alignment
family: break_competition_geometry
summary: "Model the rest-frame placement and strength of both the Lyman and 4000 \xC5\
  \ continuum breaks against each object's observed ugriz trend so the class signal\
  \ comes from whether high-z blueward dropout dominates (quasar-like) or a Balmer/4000\
  \ \xC5 jump dominates (galaxy-like) versus weak break structure (star-like)."
depends_on: []
strategy: "For each object, work from magnitudes m_u,m_g,m_r,m_i,m_z and redshift\
  \ z (clipped to [0, 7]). Convert to flux space f_b=10^{-0.4 m_b} only if needed\
  \ for slope checks, but keep jump calculations in magnitudes. Use SDSS effective\
  \ wavelengths \u03BB=[3551, 4670, 6170, 7480, 8930] \xC5. For each target break\
  \ \u03BB_break in {1216, 4000} \xC5, compute \u03BB_rest=\u03BB_break\xB7(1+z) and\
  \ identify the adjacent observed band pair (j, j+1) with \u03BB_j < \u03BB_rest\
  \ \u2264 \u03BB_{j+1}; if no such pair (object too low or too high z), emit 0 and\
  \ a regime-missing flag for that break. For a valid pair, define observed local\
  \ break jump J_obs = m_j - m_{j+1}. Estimate the expected smooth-continuum jump\
  \ J_exp by local slope extrapolation from the two redder neighbouring points: if\
  \ j+2 exists, use k=((m_{j+2}-m_{j+1})/(log \u03BB_{j+2}-log \u03BB_{j+1})) and\
  \ m\u0302_j = m_{j+1} - k( log \u03BB_j - log \u03BB_{j+1}); else, if j==0 use the\
  \ pair (j+1,j+2) not available fallback and set J_exp = mean(m_{j+1},m_{j+2})-m_{j+1};\
  \ if neither exists, fallback to 0. Define normalized residual R=(J_obs-J_exp)/(\
  \ |m_{j+1}-m_{j+2}| + 1e-6 ) (with j+2 fallback as above). Create six deterministic\
  \ features: (1) Lya_raw = J_obs(1216), (2) Lya_norm = R_1216, (3) Balmer_raw = J_obs(4000),\
  \ (4) Balmer_norm = R_4000, (5) Break_balance = sign-safe ratio R_1216/(|R_4000|+1),\
  \ and (6) Break_regime_flags for valid/invalid break placement and whether redshift\
  \ falls in the expected Lya-visible regime (1.9<z<6.5) and 4000-visible regime (\u2212\
  0.1<z<1.3). Clip residual-derived features to a robust range, e.g. [-8, 8], with\
  \ missing variants set to 0 and flags capturing missingness."
expected_signal: "High-redshift quasars should align with strong positive Lyman-break\
  \ residuals while remaining relatively weak in the 4000 \xC5 jump, whereas normal\
  \ galaxies tend to show stronger 4000 \xC5 structure in the low-z regime; this relative-break\
  \ contrast gives a compact geometric cue that separates the class manifolds beyond\
  \ raw colors alone."
risk: The regime assignment is sensitive near break-transition redshifts, so redshift
  noise or systematic offsets can flip the selected band pair; coarse band spacing
  means jumps can be emission-line contaminated or degenerate in low-SNR objects,
  and using only one pair extrapolation may be unstable when nearby magnitudes are
  noisy or nearly flat.
