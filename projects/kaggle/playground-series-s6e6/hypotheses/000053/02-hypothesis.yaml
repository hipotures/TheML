title: Regime-Weighted Dual Rest-Frame Break Residuals
group_name: dual_restframe_break_alignment
family: break_competition_geometry
summary: "This feature family encodes how strongly each object exhibits a 1216 \xC5\
  \ and 4000 \xC5 rest-frame discontinuity when mapped into ugriz, by measuring break\
  \ jump residuals against a local smooth-continuum expectation so class differences\
  \ from Lyman-dropout-like quasars versus 4000 \xC5-dominated galaxies versus weak-break\
  \ stellar SEDs are expressed in a single geometric signal."
depends_on: []
strategy: "Let ugriz magnitudes be m=[m_u,m_g,m_r,m_i,m_z] with effective wavelengths\
  \ \u03BB=[3551,4670,6170,7480,8930] \xC5 and z\u0303=clip(redshift, 0, 7). For each\
  \ target rest-frame break \u03BB_b in {1216,4000}, compute \u03BB_b^obs=\u03BB_b*(1+z\u0303\
  ) and locate the unique interval j \u2208 {0,1,2,3} where \u03BB_j \u2264 \u03BB\
  _b^obs < \u03BB_{j+1}; if none exists (below u band or above z band), emit all break-related\
  \ features as 0 and set miss_b=1 and skip residual computation for that break. For\
  \ valid intervals, define fractional position \u0394t_b=(ln \u03BB_b^obs\u2212ln\
  \ \u03BB_j)/(ln \u03BB_{j+1}\u2212ln \u03BB_j), observed jump J_obs,b = m_j\u2212\
  m_{j+1}, and observed slope S_obs,b=(m_j\u2212m_{j+1})/(ln \u03BB_j\u2212ln \u03BB\
  _{j+1}). Estimate local smooth continuum slope S_cont,b via linear fit in ln \u03BB\
  : if j=1 or 2, fit through points (ln \u03BB_{j-1},m_{j-1}) and (ln \u03BB_{j+2},m_{j+2});\
  \ if j=0, fit through (ln \u03BB_1,m_1) and (ln \u03BB_2,m_2); if j=3, fit through\
  \ (ln \u03BB_2,m_2) and (ln \u03BB_4,m_4). Then J_exp,b = S_cont,b\xB7(ln \u03BB\
  _j\u2212ln \u03BB_{j+1}) and residual R_b=(J_obs,b\u2212J_exp,b)/S_loc,b, where\
  \ S_loc,b is the median absolute local color scale over available adjacent colors\
  \ around the interval, specifically S_loc,b=median(|m_0\u2212m_1|, |m_1\u2212m_2|,\
  \ |m_2\u2212m_3|, |m_3\u2212m_4|)+1e-6; clip R_b to [\u22128,8]. Add interval-confidence\
  \ C_b=clip(1\u22122\xB7|\u0394t_b\u22120.5|, 0, 1) so C_b downweights placements\
  \ near band boundaries; generate miss_b, boundary_b=(C_b<0.2), and regime flags\
  \ lya_regime=(z\u0303\u2208[1.9,6.5]), balmer_regime=(z\u0303\u2208[0,1.3]). Output\
  \ deterministic features per break: raw jump J_obs,b, normalized residual R_b, confidence-weighted\
  \ jump J_obs,b\xB7C_b, confidence-weighted residual R_b\xB7C_b, and miss/border/regime\
  \ flags. Build competition features: Break_balance=((R_1216\xB7C_1216)\u2212(R_4000\xB7\
  C_4000)), Break_abs_diff=|R_1216\xB7C_1216|\u2212|R_4000\xB7C_4000|, and sign-consistent\
  \ variants that suppress invalid breaks by multiplying with (1\u2212miss_b)."
expected_signal: "Because quasars at suitable redshift should show strong positive\
  \ 1216 \xC5-break residuals with weak competing 4000 \xC5 structure while low-redshift\
  \ galaxies usually show opposite balance and stellar SEDs remain smoother across\
  \ both windows, these confidence-weighted cross-break residual contrasts should\
  \ separate the three classes in a regime-aware, redshift-consistent manner and reduce\
  \ dependence on raw color magnitude alone."
risk: The feature signal is sensitive to redshift-dependent regime assignment, so
  objects near band-edge transitions or with systematic redshift offsets can misplace
  breaks and distort residuals; broad-band filters and emission-line features can
  mimic continuum jumps, and the scheme may be less stable for intrinsically smooth
  or noisy SEDs where local slopes are poorly defined despite clipping.
