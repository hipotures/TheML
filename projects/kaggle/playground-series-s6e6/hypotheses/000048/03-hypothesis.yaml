title: Reliability-weighted luptitude flux geometry
group_name: luptitude_regime_flux_features
family: asinh_flux_domain
summary: Re-express the five SDSS-like asinh magnitudes as calibrated flux-shape descriptors
  with explicit reliability gates for bands near the luptitude softening floor, so
  color, slope, curvature, and concentration signals remain usable for faint or noisy
  objects.
depends_on: []
strategy: 'Use only per-row photometric predictors u,g,r,i,z, with no target-derived
  statistics. Create corrected magnitudes m_corr using fixed SDSS-style offsets u_corr=u-0.04,
  z_corr=z+0.02, and g_corr=g, r_corr=r, i_corr=i; if provenance validation later
  shows offsets are inappropriate, this group should be generated from the same formulas
  with zero offsets as an ablation, not mixed row-wise. Use softening constants b={u:1.4e-10,g:0.9e-10,r:1.2e-10,i:1.8e-10,z:7.4e-10}
  and compute maggy-normalized inverse-luptitude flux f_b=2*b_b*sinh(-(ln(10)/2.5)*m_corr,b-ln(b_b)).
  For numerical stability clip the sinh argument to a finite implementation-safe range,
  set eps=1e-12, and define absf_b=abs(f_b). Build reliability variables q_b=absf_b/(absf_b+2*b_b+eps),
  floor_b=1(absf_b<=2*b_b), ultra_floor_b=1(absf_b<=0.2*b_b), neg_b=1(f_b<0), soft_count=sum(floor_b),
  ultra_floor_count=sum(ultra_floor_b), floor_frac=soft_count/5, neg_flux_count=sum(neg_b),
  min_q, mean_q, and reliability_weight=1-floor_frac. Define signed soft-clipped flux
  ftilde_b=sign(f_b)*max(absf_b,b_b), with sign(0)=1, and log_abs_flux v_b=log10(abs(ftilde_b)+eps).
  Create adjacent flux-color coordinates flux_color_ab=-2.5*(v_a-v_b) for ug,gr,ri,iz,
  matching the magnitude-color sign convention; also compute raw magnitude colors
  mag_color_ab=m_corr,a-m_corr,b and mismatch_ab=mag_color_ab-flux_color_ab. Add second
  differences over adjacent flux colors, including curvature_ugr=flux_color_ug-flux_color_gr,
  curvature_gri=flux_color_gr-flux_color_ri, curvature_riz=flux_color_ri-flux_color_iz,
  and a broad curvature contrast curvature_blue_red=curvature_ugr-curvature_riz. Fit
  log_abs_flux against centered log wavelength x_b=log10(lambda_b)-mean(log10(lambda))
  for lambda=[3551,4686,6165,7481,8931] using both unweighted least squares and reliability-weighted
  least squares with weights max(q_b,0.05), extracting intercept, slope, and quadratic
  curvature from X=[1,x,x^2]. Compute residual summaries from the weighted fit: max_abs_residual,
  mean_abs_residual, and blue_vs_red_residual=resid_u+resid_g-resid_i-resid_z. From
  absolute soft-clipped flux shares p_b=abs(ftilde_b)/(sum_abs_ftilde+eps), create
  max_share, min_share, l2_share=sum(p_b^2), entropy_share=-sum(p_b*log(p_b+eps)),
  blue_share=p_u+p_g, red_share=p_i+p_z, and center_share=p_r. Add sign-pattern summaries
  neg_flux_count, sign_changes_across_bands over u-g-r-i-z, and sign_entropy from
  positive versus negative band counts with eps smoothing. Finally create regime-gated
  variants for the main shape descriptors, multiplying weighted slope, weighted curvature,
  each mismatch_ab, entropy_share, and max_share by reliability_weight and by floor_frac,
  so the model can learn separate high-reliability and floor-dominated behavior.'
expected_signal: 'Balanced accuracy should benefit because this group separates astrophysical
  spectral-shape information from luptitude floor artifacts: galaxies, quasars, and
  stars can have similar raw colors in parts of color-redshift space, but reliability-weighted
  flux slopes, curvature, residual structure, and floor/negative-flux flags expose
  whether those colors are physically coherent or dominated by low-signal measurement
  behavior.'
risk: The constants and AB offsets assume SDSS-like asinh photometry, so incorrect
  provenance can bias every derived feature; log, sinh, and ratio-style operations
  require strict clipping and eps handling; the descriptors are correlated with ordinary
  colors and may overfit without regularized models or validation; and weighted polynomial
  fits add compute cost across the full train and test tables.
