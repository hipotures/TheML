title: Regime-gated luptitude flux geometry descriptors
group_name: luptitude_regime_flux_features
family: asinh_flux_domain
summary: This feature family reconstructs each object's five-band spectral shape in
  luptitude-derived flux space while explicitly modeling the asinh softening regime
  so that slope and curvature cues used for class separation are preserved when measurements
  sit near the photometric floor.
depends_on: []
strategy: "For each row use u, g, r, i, z and apply SDSS asinh photometric offsets\
  \ before inversion with fixed defaults u_corr = u - 0.04 and z_corr = z + 0.02,\
  \ while g_corr = g, r_corr = r, i_corr = i (all offsets are constants to be toggled\
  \ by data provenance). Use b = {u:1.4e-10, g:0.9e-10, r:1.2e-10, i:1.8e-10, z:7.4e-10}\
  \ and compute inverse-luptitude flux proxies in maggy-normalized units as f_b =\
  \ 2*b_b*sinh(-(ln(10)/2.5)*m_corr,b - ln(b_b)). Use eps=1e-12 and define absf_b=|f_b|.\
  \ Define floor regime flags floor1_b = 1(absf_b <= 2*b_b) and floor2_b = 1(absf_b\
  \ <= 0.2*b_b), then soft_count = \u03A3 floor1_b, floor_frac = soft_count/5, ultra_floor_count\
  \ = \u03A3 floor2_b, neg_flux_count = \u03A3(f_b<0), and soft_regime_weight = floor_frac.\
  \ Define soft-clipped flux f\u0303_b = sign(f_b)*max(absf_b, b_b). Build safe log\
  \ flux coordinates v_b = log10(abs(f\u0303_b) + eps) and adjacent luptitude-flux\
  \ colors d\u0302_ug = v_u-v_g, d\u0302_gr = v_g-v_r, d\u0302_ri = v_r-v_i, d\u0302\
  _iz = v_i-v_z. Compute weighted spectral geometry by fitting v_b against log10(\u03BB\
  _b) with X=[1,t,t^2], t_b in \xC5 = [3551,4686,6165,7481,8931], weights w_b = 1\
  \ + 0.5*floor1_b: fit v = \u03B20 + \u03B21*t + \u03B22*t^2 to obtain slope=\u03B2\
  1 and curvature=\u03B22. Also compute a pure finite-difference curvature proxy \u03BA\
  \ = d\u0302_ug - 2*d\u0302_gr + d\u0302_ri and second-order finite-difference on\
  \ adjacent bands analogously. For each adjacent pair (u,g),(g,r),(r,i),(i,z), define\
  \ mag_color_ab = m_corr,a - m_corr,b and flux_color_ab = 2.5*(log10(abs(f_a)+eps)-log10(abs(f_b)+eps));\
  \ mismatch_ab = mag_color_ab - flux_color_ab, and mismatch\u0303_ab computed using\
  \ f\u0303_b similarly. Add shape-summary descriptors from the signed-safe shares\
  \ p\u0303_b = abs(f\u0303_b)/(\u03A3 abs(f\u0303)+eps): max_share, entropy_sh =\
  \ -\u03A3 p\u0303_b log(p\u0303_b+eps), l2_share = \u03A3 p\u0303_b^2, and gini-like\
  \ concentration = 1 - l2_share; include sign entropy from the binary sign histogram\
  \ across bands with eps smoothing. Create regime-interacted variants slope_hi =\
  \ slope*(1-floor_frac), slope_lo = slope*floor_frac, curvature_hi, curvature_lo,\
  \ and mismatch_hi/mismatch_lo with the same gating so models can separate high-SNR\
  \ and floor-dominated behavior."
expected_signal: Replacing raw magnitude-space colors with luptitude-flux shape features
  and explicitly gating them by floor regime should reduce sensitivity to low-SNR
  nonlinearity and negative-flux noise, giving more stable SED slope, curvature, and
  mismatch indicators for borderline objects where STAR, QSO, and GALAXY occupy overlapping
  photometric regions, which is exactly where balanced_accuracy on rare-class boundaries
  is usually lost.
risk: The inversion constants assume SDSS-style asinh calibration; if the dataset
  uses a different photometric zero-point or nonstandard preprocessing, flux reconstruction
  can be biased and degrade all dependent features, and many engineered descriptors
  overlap existing color-based variables so overfitting or collinearity is possible
  without strong regularization and validation; ratio and log operations also need
  strict epsilon/clipping to avoid instability when flux values are extremely close
  to zero.
