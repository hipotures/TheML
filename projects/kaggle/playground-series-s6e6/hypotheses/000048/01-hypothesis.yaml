title: Luptitude regime-aware flux re-parameterization
group_name: luptitude_regime_flux_features
family: asinh_flux_domain
summary: "Transform SDSS asinh magnitudes into a flux-domain representation that explicitly\
  \ models the low-signal linear regime and AB calibration idiosyncrasies, then describe\
  \ each object\u2019s spectral shape and color behavior with regime-aware flux-based\
  \ descriptors to stabilize class clues near the photometric detection floor."
depends_on: []
strategy: 'Apply the SDSS u-band AB correction u_ab = u - 0.04 first. Convert each
  band magnitude m_b in {u_ab,g,r,i,z} to linear flux proxy f_b with the inverse Luptitude
  relation f_b = 2*b_b*sinh(-0.4*ln(10)*m_b - ln(b_b)), using SDSS softening constants
  b_u=1.4e-10, b_g=0.9e-10, b_r=1.2e-10, b_i=1.8e-10, b_z=7.4e-10 (f0 normalized to
  1). For each band define a reliability regime flag s_b = 1(|f_b| <= 10*b_b), and
  a soft-clipped flux \tilde f_b = sign(f_b)*max(|f_b|, b_b). Build features from
  \tilde f_b: flux-log colors for adjacent bands, second-order differences across
  log10 wavelength order, and a least-squares slope/curvature of log(\tilde f) along
  {u,g,r,i,z}; compute magnitude-vs-flux color mismatch for each adjacent pair, e.g.
  delta_c_ug = (u_ab-g) - log(\tilde f_u/\tilde f_g), similarly for other pairs. Add
  shape summary features on soft-clipped normalized flux allocation (sum abs \tilde
  f, max share, entropy-like concentration, L2 concentration), and regime descriptors
  per row: soft_count = sum(s_b), soft_fraction = soft_count/5, negative_flux_count
  = sum(f_b<0), and a soft_regime_weight = 1 - soft_fraction. Interact slope/curvature
  features with (1-soft_fraction) and soft_fraction to separate high-SNR and low-SNR
  regime behavior. For all divisions include epsilon-safe clipping to avoid instability.'
expected_signal: By replacing noisy magnitude-domain colors with physical flux-domain
  structure near the asinh linearization break, the group can better preserve true
  SED ordering for faint objects and explicitly flag when color geometry is dominated
  by measurement floor effects, which should help disentangle quasars, galaxies, and
  stars in overlapping color-redshift regions and reduce ambiguity-driven boundary
  errors.
risk: "The transformation is SDSS-specific and tied to published b constants and u-band\
  \ offset, so performance can degrade if the dataset\u2019s photometry comes from\
  \ different processing or zero-point conventions; clipping and ratio construction\
  \ can still amplify noise for extreme values, the feature set may overlap with prior\
  \ flux/locus groups, and additional nonlinear operations add some compute overhead\
  \ for very large tables."
