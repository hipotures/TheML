title: Train-anchored local manifold codimension diagnostics
group_name: local_manifold_codimension
family: manifold_geometry
summary: Characterize each object by whether its photometry and redshift lie on a
  dense, locally low-dimensional neighborhood structure or in a sparse extrapolative
  region whose geometry is likely to differ across stellar classes.
depends_on: []
strategy: 'Create colors c_ug=u-g, c_gr=g-r, c_ri=r-i, and c_iz=i-z, then build three
  Euclidean spaces: S_color_z=[c_ug,c_gr,c_ri,c_iz,redshift], S_color=[c_ug,c_gr,c_ri,c_iz],
  and S_mag=[u,g,r,i,z]. For each space, fit robust train-only medians and IQR scales
  per column, clipping scales below 1e-6, and transform train and test with these
  fixed values. For every row and every space, find k=64 nearest train neighbors excluding
  the row itself for train rows; test rows query only against train. Compute both
  a full-pool neighborhood and, when at least 128 eligible train rows exist, a category-conditioned
  neighborhood restricted to matching spectral_type and galaxy_population; otherwise
  set conditioned_missing=1 and reuse the full-pool metrics for the conditioned slot.
  For each neighborhood, compute centered neighbor covariance Sigma with shrinkage
  Sigma = (1-rho)cov + rho*trace(cov)/d*I, using rho=0.05 and d as the space dimension.
  Eigen-decompose Sigma into sorted eigenvalues lambda_1>=...>=lambda_d and eigenvectors.
  Emit stable local shape metrics: top2_share=(lambda_1+lambda_2)/(sum_lambda+1e-12),
  top3_share when d>=5, effective_dim=(sum_lambda^2)/(sum(lambda_j^2)+1e-12), dim95=smallest
  m with cumulative eigen share >=0.95, log_anisotropy_12=log((lambda_1+1e-12)/(lambda_2+1e-12)),
  log_anisotropy_23 when d>=3, and tail_share=lambda_d/(sum_lambda+1e-12). Compute
  point-to-manifold diagnostics using the row''s offset v=x-mu from neighbor centroid:
  mahalanobis_shrunk=v^T Sigma^{-1} v, residual2=||v - V2 V2^T v||^2/(sum_{j=3..d}
  lambda_j+1e-12), residual3 analogously when d>=5, and signed_top1_projection=v dot
  first_eigenvector divided by sqrt(lambda_1+1e-12). Compute support metrics from
  neighbor distances: d_1, d_8, d_32, d_64, median_distance, mean_distance, density_log=-log(median_distance+1e-12),
  radius_ratio=d_64/(median_distance+1e-12), and neighbor_distance_z=(distance_to_centroid
  - median_neighbor_centroid_distance)/(MAD_neighbor_centroid_distance+1e-6). Add
  coordinate support metrics: fraction of dimensions where x lies inside neighbor
  [5th,95th] percentiles, mean percentile rank of x within neighbor marginal distributions,
  and maximum outside-envelope normalized excess. If fewer than 16 valid neighbors
  are available after self-exclusion, replace eigen and residual metrics with train-derived
  global median values for that space and set sparse_flag=1; otherwise sparse_flag=0.
  Concatenate all metrics across the three spaces and both neighborhood modes, then
  add cross-space contrasts for matched full-pool metrics such as absolute differences
  between S_color_z and S_color, and between S_color_z and S_mag, for top2_share,
  effective_dim, residual2, density_log, and fraction-in-envelope.'
expected_signal: Balanced accuracy may improve because stars should usually follow
  compact low-dimensional color manifolds, while QSOs and some galaxies are more likely
  to have larger manifold residuals, weaker local support, or geometry that changes
  sharply when redshift or raw magnitude information is included; these diagnostics
  can especially help recover minority or boundary cases that are not cleanly separated
  by global photometric thresholds.
risk: The feature group is computationally expensive and sensitive to approximate-nearest-neighbor
  settings, robust-scaling choices, and covariance conditioning; category-conditioned
  neighborhoods can create sparsity artifacts or encode dataset-specific auxiliary-column
  behavior, while using train-neighbor geometry for both train and test must be implemented
  without including the target label or test points in fitted scalers, fallback statistics,
  or train-row neighborhoods.
