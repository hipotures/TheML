title: Adaptive local manifold codimension and support diagnostics
group_name: local_manifold_codimension
family: manifold_geometry
summary: The core idea is to characterize each object by how well it sits on a locally
  linear, high-support manifold in standardized photometric space versus how much
  it departs into sparse, high-curvature regions, using that geometric mismatch as
  a class-sensitive signal beyond global color patterns.
depends_on: []
strategy: "Compute color features c1=u-g, c2=g-r, c3=r-i, c4=i-z. Build two numeric\
  \ spaces: S1=[c1,c2,c3,c4,redshift] and S2=[u,g,r,i,z]. For each numeric column\
  \ in each space, fit robust scaling on train only with median m and MAD s, with\
  \ s clipped below 1e-6, then transform x <- (x-m)/s. Set k=64 and for each row define\
  \ neighbor budget k_i=min(k,|P|-1), where P is candidate pool in train. Candidate\
  \ pool is first filtered by exact spectral_type and galaxy_population; if |P|<2k_i\
  \ fall back to full train for that row. For each space separately, query k_i nearest\
  \ neighbors using a fixed-seed ANN/Euclidean index (test points only query against\
  \ train, not vice versa) and then compute centroid \u03BC, covariance \u03A3 on\
  \ centered neighbors, then \u03A3\u21900.5(\u03A3+\u03A3^T)+1e-6 I_d. If eigenvalue\
  \ rank<d or trace<=1e-12, use global fallback covariance/eigen stats and set degenerate=1.\
  \ Sort eigenvalues \u03BB1\u2026\u03BBd and top2 eigenvectors V2. Emit: r2=(\u03BB\
  1+\u03BB2)/sum(\u03BB), residual2=(x-\u03BC)^T(I\u2212V2V2^T)(x-\u03BC)/(\u03BB\
  3+\u2026+\u03BBd+1e-12), a12=log((\u03BB1+1e-12)/(\u03BB2+1e-12)), a23=log((\u03BB\
  2+1e-12)/(max(\u03BB3,1e-12))), tail=\u03BBd/sum(\u03BB) where d is dimensionality\
  \ of the space, and dim95=min m with cumulative \u03BB1..\u03BBm /sum(\u03BB) >=0.95.\
  \ For neighborhood support, compute distances to each neighbor, then r_k=max distance,\
  \ r_med=median distance, r_mean=mean distance, density_proxy=1/(r_med+1e-12), r_ratio=r_k/(r_med+1e-12),\
  \ and frac_in_box = mean over dimensions of x_j being within per-dimension [5th,95th]\
  \ percentile of neighbor values. Add local asymmetry stats: median absolute deviation\
  \ of x from neighbor median (and its ratio to neighbor MAD). Concatenate the same\
  \ feature set from S1 and S2, and add absolute deltas between matched metrics across\
  \ spaces (e.g., |r2_S1-r2_S2|, |residual2_S1-residual2_S2|, |density_S1-density_S2|).\
  \ Use a second-pass guard for very sparse regions: if k_i<6 replace distance/eigen\
  \ metrics with fallback quantiles from global train neighborhoods and keep sparse_flag=1."
expected_signal: Stars are expected to occupy dense, low-curvature local manifolds
  aligned with the main photometric loci, while quasars and many galaxies should present
  as local geometric outliers with higher codimension residuals or weaker support,
  especially where class boundaries are blurred; these local shape-and-support descriptors
  can therefore raise recall on minority classes without sacrificing GALAXY separation,
  improving balanced accuracy.
risk: High computational cost and ANN approximation error at full train-plus-test
  scale can add variance to metrics, and conditioning-dependent eigen-ratio features
  may be unstable in very sparse or duplicated neighborhoods; restricting neighborhoods
  by auxiliary categories can help homogeneity but may overfit or create sparsity
  artifacts, and fallback substitution must be carefully fixed to avoid leakage and
  distribution-sensitive behavior.
