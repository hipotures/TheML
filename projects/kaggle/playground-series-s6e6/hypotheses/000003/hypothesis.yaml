title: Galactic Sightline Context
group_name: galactic_sightline_context
family: sky_position
summary: Use the object's sky location to express whether the line of sight passes
  through Milky Way-dominated regions or cleaner extragalactic fields.
depends_on: []
strategy: 'From equatorial coordinates alpha and delta in degrees, first create a
  unit-sphere representation to remove the alpha wraparound: x = cos(delta_rad) *
  cos(alpha_rad), y = cos(delta_rad) * sin(alpha_rad), z = sin(delta_rad). Then convert
  the same position to Galactic coordinates using the standard J2000 equatorial-to-galactic
  rotation matrix and derive Galactic longitude l and latitude b in degrees. Build
  the group from: raw b and |b|; sin(l), cos(l), sin(b), cos(b); angular distance
  to the Galactic plane as |b|; angular distance to the Galactic center and anticenter
  via great-circle separation from (l,b) = (0,0) and (180,0); and angular distance
  to the north and south Galactic poles via separation from (0,90) and (0,-90). Add
  coarse spatial regime indicators by binning |b| into [0,10), [10,20), [20,35), [35,50),
  [50,70), [70,90] degrees and l into 12 equal 30-degree sectors, plus the crossed
  regime label of |b|-band with l-sector. Edge handling: convert degrees to radians
  before trig, keep alpha modulo 360, clip any cosine argument used in arccos to [-1,1],
  and treat boundary values with left-closed/right-open bins except the final bin
  which includes 90 degrees.'
expected_signal: Balanced accuracy can benefit because stars are concentrated toward
  the Galactic plane while galaxies and QSOs are more common in high-latitude sightlines,
  so this group may especially improve STAR recall without relying on target encoding.
  The trigonometric and distance-based features also express smooth spatial structure
  better than raw alpha and delta, which can help separate physically different observing
  directions.
risk: These features can partially learn survey footprint and observing-selection
  artifacts rather than pure astrophysics, so they may overfit if train and test sky
  coverage differ. They may also be redundant when photometry already strongly identifies
  classes, limiting incremental gain.
