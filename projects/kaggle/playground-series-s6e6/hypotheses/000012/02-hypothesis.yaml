title: Robust Soft-Wedge Margin Stack
group_name: faint_blue_galaxy_wedge_margins
family: blue_galaxy_selection
summary: This feature group encodes how strongly each object lies inside, near, or
  outside a deterministic faint-blue color-magnitude envelope by combining interior
  depth and violation-count signals so class boundaries between galaxies, stars, and
  quasars are expressed more explicitly than raw broadband features alone.
depends_on: []
strategy: 'For each object compute ug = u - g, gr = g - r, ri = r - i, iz = i - z,
  and clamp ug to [-0.60, 3.20] only for line-based wedge calculations. Define signed
  color margins m_c = [m1=gr-(0.40+0.60*ug), m2=(1.70-0.10*ug)-gr, m3=ug+0.50, m4=3.00-ug,
  m5=ri+0.50, m6=1.80-ri, m7=iz+1.00, m8=1.50-iz] and magnitude margins m_m = [n1=u-18.0,
  n2=24.0-u, n3=g-18.0, n4=21.5-g, n5=r-17.8, n6=19.5-r, n7=i-16.5, n8=20.5-i, n9=z-16.0,
  n10=20.0-z]. Replace any non-finite derived value with 0, then clip every margin
  to [-10, 10]. Normalize color margins by [0.35,0.35,0.50,0.50,0.35,0.35,0.35,0.35]
  and magnitude margins by [3.0,3.0,2.0,2.0,1.7,1.7,1.4,1.4,1.4,1.4] to equalize scale.
  Create deterministic features: color_depth_min=min(m_c_norm), color_depth_q20=20th
  percentile of m_c_norm, color_depth_soft = -logsumexp(-8*m_c_norm)/8, color_viol=sum(m_c_norm<0).
  For magnitudes: mag_depth_min=min(m_m_norm), mag_depth_q20=20th percentile of m_m_norm,
  mag_depth_soft = -logsumexp(-8*m_m_norm)/8, mag_viol=sum(m_m_norm<0). Create a combined
  score = 0.60*color_depth_soft + 0.40*mag_depth_soft - 0.25*color_viol - 0.10*mag_viol.
  Add a bounded sampling-intensity term s = clip(exp(0.1411*(gr-(0.40+0.60*ug))),
  0, 10) and include both a color-only version of score and the full score + s as
  final engineered signals.'
expected_signal: Replacing single hard boundaries with clipped, normalized depth/violation
  statistics stabilizes the wedge signal for near-boundary objects, preserves a graded
  notion of membership, and helps recover galaxy-like patterns where stars and quasars
  leak into similar broad color space by adding explicit magnitude-constrained support
  information.
risk: "The wedge constants remain tied to legacy SDSS-style cuts and may not perfectly\
  \ match this dataset\u2019s exact photometric system, and any percentile/softmin\
  \ summarization can shift emphasis toward the dominant class regions unless tuned\
  \ and validated under balanced-accuracy splits."
