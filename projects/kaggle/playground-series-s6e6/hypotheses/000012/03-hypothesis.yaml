title: Calibrated Faint Blue Wedge Margins
group_name: faint_blue_galaxy_wedge_margins
family: blue_galaxy_selection
summary: Encode graded membership in a faint blue galaxy color-magnitude selection
  envelope by measuring normalized interior depth, boundary proximity, and directional
  violations against galaxy-targeting cuts.
depends_on: []
strategy: 'Compute colors ug=u-g, gr=g-r, ri=r-i, iz=i-z. Use ug_line=clip(ug,-0.60,3.20)
  only in sloped gr boundary formulas, while using raw ug for explicit ug lower and
  upper bounds. Define signed color margins where positive means inside: gr-(0.40+0.60*ug_line),
  (1.70-0.10*ug_line)-gr, ug+0.50, 3.00-ug, ri+0.50, 1.80-ri, iz+1.00, 1.50-iz. Define
  signed magnitude margins: u-18.0, 24.0-u, g-18.0, 21.5-g, r-17.8, 19.5-r, i-16.5,
  20.5-i, z-16.0, 20.0-z. Replace nonfinite margins with 0, clip raw margins to [-10,10],
  then create both raw directional margin features and normalized summaries. Normalize
  color margins by [0.35,0.35,0.50,0.50,0.35,0.35,0.35,0.35] and magnitude margins
  by [3.0,3.0,2.0,2.0,1.7,1.7,1.4,1.4,1.4,1.4]. For color and magnitude subsets separately
  compute minimum normalized margin, 20th percentile margin, soft minimum -logsumexp(-8*m)/8,
  mean positive interior margin, total negative violation count, and total violation
  depth sum(max(0,-m)). Add combined_wedge_depth = 0.65*color_softmin + 0.35*mag_softmin,
  combined_wedge_penalty = combined_wedge_depth - 0.20*color_violation_count - 0.08*mag_violation_count
  - 0.15*color_violation_depth - 0.05*mag_violation_depth, and binary indicators for
  all-inside-color, all-inside-magnitude, and all-inside-full. Include bounded sloped-boundary
  intensity proxy clip(exp(0.1411*(gr-(0.40+0.60*ug_line))),0,10) plus log1p of that
  proxy.'
expected_signal: Balanced accuracy may improve because these features give the model
  an explicit, smooth galaxy-selection geometry with directional information about
  which boundary failed, helping separate faint blue galaxies from quasars and stars
  in regions where raw colors and magnitudes alone overlap.
risk: The fixed wedge constants are external survey-style cuts and may be partly redundant
  with raw photometry, spectral_type, and galaxy_population; hard thresholds and hand-chosen
  normalizers can misrepresent this dataset near boundaries or bias the model toward
  the majority galaxy region if not validated with stratified balanced-accuracy folds.
