title: Survey Manifold Rarity
group_name: survey_manifold_rarity
family: density_rarity
summary: Estimate how typical or unusual each object is inside the unlabeled survey
  manifold formed by coarse redshift regime, catalog tags, and broad photometric energy
  allocation, so the model can use rarity itself as a class cue.
depends_on: []
strategy: 'For each object, convert ugriz magnitudes to pseudo-fluxes f_b = 10^(-0.4*m_b),
  compute normalized band shares p_b = f_b / sum(f), then derive three survey-manifold
  coordinates: blue_balance = (p_u + p_g) - (p_i + p_z), flux_concentration = max(p_u,p_g,p_r,p_i,p_z),
  and total_brightness = -2.5*log10(sum(f)). Build bins from train.csv only: redshift
  bins with fixed edges [-inf, 0.002, 0.01, 0.05, 0.2, 0.6, 1.2, 2.5, inf], plus decile
  bins for blue_balance, flux_concentration, and total_brightness; if quantile edges
  collapse because of ties, merge duplicate edges and use the resulting ordered bins.
  Form a joint cell from (redshift_bin, spectral_type, galaxy_population, blue_balance_bin,
  flux_concentration_bin, total_brightness_bin). From train.csv only, compute Laplace-smoothed
  counts with alpha = 1 for the full joint cell, for the tag-regime block (redshift_bin,
  spectral_type, galaxy_population), and for the photometric block (blue_balance_bin,
  flux_concentration_bin, total_brightness_bin). Output one coherent rarity group
  consisting of: joint_log_density = log((count_joint + 1) / (N + K_joint)), rarity_score
  = -joint_log_density, and interaction_surprise = log((count_tag_regime + 1) * (count_photo_block
  + 1)) - log((count_joint + 1) * N), where N is the train row count and K_joint is
  the number of observed-or-possible joint cells under the constructed bins. Apply
  the same train-derived bin edges and smoothed lookup tables to test rows; values
  outside the train range fall into the nearest end bin, and any unseen categorical
  level would map to an UNK bucket before lookup.'
expected_signal: QSO examples often occupy sparse or cross-inconsistent regions of
  the survey manifold, while many STAR and GALAXY objects cluster in denser loci,
  so explicit rarity and interaction surprise can improve per-class separation and
  help balanced accuracy rather than only overall majority fit.
risk: If the joint grid is too sparse, these features can become noisy and effectively
  memorize idiosyncratic train cells; they may also be partially redundant with existing
  color- and redshift-based groups and can drift if the test distribution populates
  different density regions.
