title: Adaptive Deconvolved Locus Offsets in Redshift-Brightness Cells
group_name: error_deconvolved_locus_tube_residuals
family: error_aware_locus_geometry
summary: Model local one-dimensional color-manifold tubes in two adjacent color domains
  with redshift- and brightness-conditioned, robust noise-corrected orthogonal offsets
  and directional side information so that high-confidence in-locus objects are centered
  while outlying quasar/galaxy-like objects receive stable, comparable anomaly scores.
depends_on: []
strategy: "Compute colors c1=u-g, c2=g-r, c3=r-i, c4=i-z for every row. Build two\
  \ 3D color tubes A=(c1,c2,c3) and B=(c2,c3,c4). Bin rows on redshift and i-band\
  \ with fixed, deterministic edges: Z=[-0.01,0.15,0.30,0.50,0.80,1.20,1.80,2.40,3.00,3.80,4.70,5.60,7.05]\
  \ and I bins of width 0.5 from 10.0 to 26.0. For each (z,i) cell and each tube,\
  \ if n<180, iteratively expand to adjacent i bins, then at most \xB11 adjacent redshift\
  \ bin; if still n<120, replace the cell model with the nearest populated cell by\
  \ L1 distance in (z,i) bin indices, and if absent fall back to the global training\
  \ median and principal direction. Inside each resolved cell: (i) center by component-wise\
  \ median m and MAD scale q_j=1.4826*MAD_j, (ii) whiten coordinates x'=(x-m)/q, (iii)\
  \ fit PCA to x' and extract unit vectors v1 (largest variance axis) and v2 (second\
  \ axis), (iv) compute orthogonal tube distance d=||x'-(x'\xB7v1)v1||2 for each row,\
  \ and geometry spread s=1.4826*MAD(d)+1e-6, (v) estimate error floor n_i by 5-nearest-neighbor\
  \ median absolute distance in the same cell (raw tube units), then define cell floor\
  \ n_cell=median(n_i) with floor max(n_cell,0.15*s); if 5-NN is impossible, set n_cell=0.15*s.\
  \ Deconvolved score is t=max(d-n_cell,0)/(s), and signed score is ts=sign(x'\xB7\
  v2)*t. Output per row: A_abs=t_A, A_signed=ts_A, B_abs=t_B, B_signed=ts_B. Add context-aware\
  \ interaction features only as deterministic gating by redshift: g_2_4_3_0=abs((A_abs+B_abs)/2)\
  \ * I(2.4<=redshift<3.0), g_3_5_plus=abs((A_abs+B_abs)/2) * I(redshift>=3.5). Clip\
  \ absolute scores to [0,10] and signed scores to [-10,10], and replace any unresolved\
  \ missing cell outputs with nearest backfilled cell values from step 1."
expected_signal: By separating true manifold distance from expected local broadening,
  this group should preserve weak but stable deviations at bright regimes while preventing
  spurious separation from faint-noise inflation, which is expected to improve class
  discrimination for boundary cases where quasar/compact-galaxy objects deviate from
  the stellar locus.
risk: Adaptive bin merging and sparse-cell backfilling can smooth away true local
  structure at extreme redshift or very faint magnitudes, 5-NN error estimates may
  mix subpopulations within a bin and bias the deconvolution, and the derived signed-distance
  features may remain redundant with other color-derived signals if they are already
  present in the model.
