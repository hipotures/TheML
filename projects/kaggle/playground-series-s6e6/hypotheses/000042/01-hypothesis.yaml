title: Error-deconvolved locus tube residuals
group_name: error_deconvolved_locus_tube_residuals
family: error_aware_locus_geometry
summary: "Model local narrow stellar-like color tubes in the ugri and griz spaces\
  \ as a function of redshift and apparent brightness, then encode each object\u2019\
  s statistically corrected signed distance outside those tubes so quasar/galaxy outliers\
  \ are separated from noise-broadened locus members more cleanly."
depends_on: []
strategy: "Construct colors c1=u-g, c2=g-r, c3=r-i, c4=i-z. Build two 3-D color cubes\
  \ A=(c1,c2,c3) and B=(c2,c3,c4). Bin rows by redshift (e.g. [-0.01,0.2,0.5,1.0,1.5,2.2,3.0,4.5,5.5,7.05])\
  \ and i-band magnitude (0.4-mag bins). In each (redshift, i) cell, fit a robust\
  \ 1-D ridge in cube A and cube B using PCA: centroid \u03BC and dominant eigenvector\
  \ v1; residual d = ||(x-\u03BC)-((x-\u03BC)\xB7v1)v1||2 for x in the cell. Estimate\
  \ per-cell geometric spread s = 1.4826 * median(|d-median(d)|) and an uncertainty\
  \ floor u from robust local color jitter (median absolute pairwise color residual\
  \ at scale 5-nearest-neighbor in color space after median-centering; fallback to\
  \ global if the cell has <120 rows). Create deconvolved scores d' = max(d-u,0)/(s+\u03B5\
  ) for both cubes, and signed versions using v2 sign in each cube to keep which side\
  \ of the locus is occupied. Optional overlap-aware context features are produced\
  \ by intersecting these deconvolved distances with redshift windows 2.4-3.0 and\
  \ z>3.5 (without any class labels) to retain ambiguous regions as explicit features.\
  \ Clamp all outputs to finite ranges and backfill missing bin values from nearest\
  \ populated neighboring bins."
expected_signal: Quasar and galaxy candidates often deviate from the main stellar
  locus in color space, while stars and low-redshift compact galaxies cluster near
  it; this group converts that into a redshift- and magnitude-aware, uncertainty-corrected
  outlier measure so that weak but reliable deviations are preserved at bright S/N
  and expected noise broadening at faint levels is discounted.
risk: Ridge estimation can be unstable in sparse bins, especially at the highest redshift
  and faintest magnitudes, and inferred noise from neighbor residuals is only an approximation
  because explicit photometric errors are unavailable, which can over-correct distances
  in heavy class-overlap regimes.
