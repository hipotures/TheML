title: Regularized Redshift Manifold Geometry Residuals
group_name: photoz_trajectory_geometry
family: trajectory_consistency
summary: Represent each object by how its SDSS color vector deviates from the smooth
  empirical color-redshift manifold and from the manifold local direction and curvature,
  making class-specific departures from physically plausible redshift trajectories
  explicit.
depends_on: []
strategy: Using train predictors only, define colors c=[u-g,g-r,r-i,i-z] and fit a
  class-agnostic trajectory over redshift. Build K=180 redshift knots from train quantiles
  between the 0.5th and 99.5th percentiles. At each knot q_k, compute Gaussian-kernel
  weights w_i=exp(-(z_i-q_k)^2/(2h_k^2)) with initial h_k=0.06; increase h_k by 1.5x
  until the effective sample size (sum w)^2/sum(w^2) is at least 1200, capped at h_k=0.8.
  Estimate a weighted Huber mean mu_k for the 4 colors and a weighted robust covariance
  Sigma_k from Huber-clipped residuals. Regularize covariance as Sigma_k=0.9*Sigma_k+0.1*I*trace(Sigma_k)/4,
  then floor eigenvalues at 1e-5. Smooth each color mean over knots with a cubic smoothing
  spline or penalized B-spline using q_k as x and effective sample size as weight;
  derive v(z)=dmu/dz and a(z)=d2mu/dz2 from the smoothed curve. Interpolate covariance
  by linearly interpolating neighboring regularized covariance matrices and applying
  the same shrinkage/eigenvalue floor after interpolation. For each row, clip z to
  the knot range, interpolate mu(z), v(z), a(z), and Sigma(z), then compute r=c-mu(z).
  Whiten with L=chol(Sigma(z)), y=L^{-1}r, t=L^{-1}v(z), u=t/(||t||+1e-8), and aw=L^{-1}a(z).
  Emit signed tangent residual T=y dot u, orthogonal squared distance O=max(0,||y||^2-T^2),
  total whitened distance D=||y||^2, curvature residual C=(y dot aw)/(||aw||+1e-8),
  and normalized versions T/sigma_T(z), O/sigma_O(z), C/sigma_C(z), where sigmas are
  robust MAD scales estimated from train residual projections in the same local weighted
  neighborhoods and smoothed over knots. For z below 0.01, multiply T and C by z/0.01
  while leaving O and D unchanged; for clipped tails outside the knot range, set a(z)=0
  and damp T and C by exp(-distance_outside/0.05). Clip all emitted features to the
  train 0.1st and 99.9th percentiles before modeling.
expected_signal: Balanced accuracy may improve because the features normalize color
  behavior by redshift and separate objects that are close in raw magnitudes but differ
  in whether their colors follow the dominant smooth trajectory, move along it, or
  sit off it; this should especially help recover minority QSO and STAR cases that
  occupy distinctive residual geometry despite overlap in simple color-redshift space.
risk: 'The trajectory is sensitive to redshift quality and smoothing choices: undersmoothing
  can encode noise and unstable derivatives, oversmoothing can erase useful local
  QSO curvature, and covariance whitening can amplify artifacts in sparse redshift
  regions. The features are also computationally heavier than simple color ratios
  and may be redundant with strong tree models using raw colors and redshift directly.'
