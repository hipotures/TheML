title: Catalog-Conditioned Rank and Frequency Context
group_name: aide_catalog_rank_frequency_context
family: aide_catalog_context
summary: Create unsupervised catalog-context features that describe how common each
  object's metadata tags are and how unusual its photometric and redshift values are
  globally and within comparable catalog groups.
depends_on: []
strategy: 'Build a reusable encoder using predictor columns only. For validation,
  fit all statistics inside each training fold and transform the held-out fold; for
  final submission, refit on all labeled training predictors and transform test. Encode
  spectral_type, galaxy_population, and their crossed pair with smoothed normalized
  counts: freq=(count+1)/(N+K), plus log_freq=log(freq), using the global smoothed
  minimum for unseen categories. For numeric context, use u, g, r, i, z, redshift_clip,
  and redshift_log, where redshift_clip=clip(redshift, 0, train_99_5_percentile_redshift)
  and redshift_log=log1p(redshift_clip). For each numeric feature, compute global
  empirical percentile rank from the fitted rows with average ties and map new rows
  by search-sorted train values, clipped to [0,1]. Also assign a quantile-bin id from
  up to 12 equal-frequency train quantile bins; duplicate quantile edges are collapsed,
  and each row receives the empirical fitted-row frequency and log-frequency of its
  final bin. Repeat percentile-rank mapping within spectral_type, within galaxy_population,
  and within the crossed pair, requiring a minimum fitted group size of 30; smaller
  or unseen groups fall back to the corresponding global percentile rank and receive
  a binary fallback indicator. Add compact row summaries over the seven numeric features:
  mean, standard deviation, minimum, maximum, and range of global ranks; mean absolute
  difference between global rank and each available group-conditioned rank family;
  mean quantile-bin frequency; and count of numeric features whose bin frequency is
  below the fitted 10th percentile of bin frequencies. Concatenate these context features
  with the raw predictors without using class labels.'
expected_signal: Balanced accuracy can benefit because rare catalog tags, rare tag
  combinations, and objects that are photometrically or redshift-wise atypical within
  their catalog context may correspond to underrepresented STAR or QSO regions that
  raw values and simple categorical splits do not isolate cleanly.
risk: The features are highly correlated with raw magnitudes, redshift, and each other,
  so weakly regularized models may overfit; fold-inconsistent fitting can inflate
  validation scores; small crossed groups can produce noisy conditional ranks, requiring
  minimum-size fallback indicators; and train-test distribution shift can make fitted
  quantiles and frequencies less calibrated on the test set.
