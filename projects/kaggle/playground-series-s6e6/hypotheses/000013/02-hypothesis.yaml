title: Redshifted Emission-Line Passband Resonance Contrast
group_name: emission_line_bandpass_resonance
family: line_filter_geometry
summary: Create features that capture how redshifted strong galaxy and quasar emission-line
  systems align with SDSS ugri z passbands and whether those aligned bands show local
  broadband flux departures from adjacent continuum, preserving an explicit physical
  interpretation of line-driven color shifts.
depends_on: []
strategy: "For each row, compute flux proxies f_b = max(10^{-0.4 m_b}, 1e-12) for\
  \ b in {u,g,r,i,z}, then set y_b = log(f_b) and center each row by y'_b = y_b -\
  \ median(y_u, y_g, y_r, y_i, y_z) to remove distance scale effects. Use fixed SDSS\
  \ effective passband centers \u03BB_b = {3551,4686,6166,7480,8931} \xC5. Use fixed\
  \ SDSS spectro1d line wavelengths in vacuum with separate class-specific importance\
  \ sets: quasar lines (non-zero weight): {Ly\u03B1 1215.24, N V 1240.81, Si IV+O\
  \ IV 1399.8, C IV 1549.48, C III]1908.734, Mg II 2799.117, [O II] 3727.092, H\u03B2\
  \ 4862.68, [O III] 5008.240, H\u03B1 6564.614}, galaxy lines (non-zero weight):\
  \ {[O II] 3727.092, H\u03B4 4102.89, H\u03B3 4341.68, H\u03B2 4862.68, [O III] 4960.295,\
  \ [O III] 5008.240, H\u03B1 6564.614, [N II] 6585.27, [S II] 6718.29, [S II] 6732.67}.\
  \ For each line \u03BB0 with redshift z, compute \u03BB_obs = \u03BB0(1+z); if z\
  \ < 0 or \u03BB_obs not in [3000,10000], set that line\u2019s contribution to zero\
  \ for all bands. Otherwise, for each band define a resonance kernel k_{b,l} = exp[-0.5*(ln(\u03BB\
  _obs/\u03BB_b)/\u03C3_b)^2] with fixed \u03C3_b = 0.06 in log-wavelength; optionally\
  \ zero out k_{b,l} < 1e-4 for numerical sparsity. Compute local continuum residuals\
  \ e_b on the row-centered log-flux scale: for interior bands interpolate linearly\
  \ in log \u03BB using neighboring points, and for edges use the closest two interior\
  \ bands (u uses g and r; g uses u and r; r uses g and i; i uses r and z; z uses\
  \ i and r). Define e_b = y'_b - y\u0302_b. Build deterministic class summaries:\
  \ T_qso = \u03A3_l w_qso(l) \u03A3_b k_{b,l}, T_gal = \u03A3_l w_gal(l) \u03A3_b\
  \ k_{b,l}; E_qso = \u03A3_l w_qso(l) \u03A3_b k_{b,l} * e_b, E_gal = \u03A3_l w_gal(l)\
  \ \u03A3_b k_{b,l} * e_b; peak band indices B_qso = argmax_b \u03A3_l w_qso(l)k_{b,l},\
  \ B_gal = argmax_b \u03A3_l w_gal(l)k_{b,l}; peak strengths S_qso = max_b \u03A3\
  _l w_qso(l)k_{b,l}, S_gal = max_b \u03A3_l w_gal(l)k_{b,l}; margin features M_t\
  \ = T_qso - T_gal, M_e = E_qso - E_gal, M_s = S_qso - S_gal. Add four-way binning\
  \ for each class of strongest-resonant band among u,g,r,i,z and an outside-coverage\
  \ bin when all k_{b,l}=0. All quantities are computed purely from input columns\
  \ without target-derived fitting."
expected_signal: Redshifted emission lines produce class- and redshift-dependent bumps
  that move through SDSS filters in a physically deterministic way; this gives the
  classifier a stable signal where quasars and star-forming/AGN-like galaxies depart
  from smooth continuum colors, especially in overlap regions where raw color features
  can blur distinctions.
risk: This group may over-trust the provided redshift and can create spurious signals
  when redshift is noisy or systematically wrong for some classes, especially for
  stars with catalog-like values; fixed central wavelengths and Gaussian log-kernels
  approximate real throughput and line profiles and ignore equivalent width variation,
  while added class-specific resonance features may duplicate existing color/continuum
  features and encourage redshift-bin overfitting without regularization.
