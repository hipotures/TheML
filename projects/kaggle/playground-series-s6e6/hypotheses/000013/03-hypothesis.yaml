title: Normalized Emission-Line Passband Resonance Contrast
group_name: emission_line_bandpass_resonance
family: line_filter_geometry
summary: Encode how physically important rest-frame emission lines for quasars and
  galaxies redshift into SDSS ugriz passbands and whether the matched bands show local
  broadband excesses relative to a smooth adjacent continuum.
depends_on: []
strategy: 'Use only input columns and fixed astrophysical constants. Convert magnitudes
  to positive relative flux proxies f_b = max(10^(-0.4*m_b), 1e-12) for bands b in
  u,g,r,i,z, then work on log flux y_b = log(f_b) centered per row by subtracting
  median(y_u,y_g,y_r,y_i,y_z). Use fixed SDSS effective passband centers lambda_b
  = {u:3551,g:4686,r:6166,i:7480,z:8932} Angstrom. Define two fixed rest-frame emission-line
  templates: a quasar template with Ly-alpha 1215.24, N V 1240.81, Si IV/O IV 1399.8,
  C IV 1549.48, C III] 1908.734, Mg II 2799.117, [O II] 3727.092, H-beta 4862.68,
  [O III] 5008.240, and H-alpha 6564.614; and a galaxy template with [O II] 3727.092,
  H-delta 4102.89, H-gamma 4341.68, H-beta 4862.68, [O III] 4960.295, [O III] 5008.240,
  H-alpha 6564.614, [N II] 6585.27, [S II] 6718.29, and [S II] 6732.67. Assign deterministic
  nonnegative line weights reflecting broad relative importance, then normalize weights
  to sum to one within each template so quasar and galaxy totals are comparable rather
  than dominated by template length. For each row, line, and band, compute lambda_obs
  = lambda_rest*(1+redshift); if redshift < 0 or lambda_obs is outside [3000,10000]
  Angstrom, set that contribution to zero. Otherwise compute k_{b,l} = exp(-0.5*(ln(lambda_obs/lambda_b)/0.08)^2),
  optionally truncating values below 1e-4 to zero. Estimate local continuum residual
  e_b on centered log flux: for g,r,i interpolate linearly in log wavelength between
  the adjacent bands; for u use the g-r slope extrapolated to u; for z use the r-i
  slope extrapolated to z. Define e_b = centered_y_b - continuum_hat_b and clip e_b
  to a reasonable fixed range such as [-5,5] to limit extreme magnitude artifacts.
  Create summary features for each template: total geometric resonance T = sum_l w_l
  sum_b k_{b,l}, residual-weighted resonance E = sum_l w_l sum_b k_{b,l}*e_b, positive-excess
  resonance E_pos using max(e_b,0), negative-residual resonance E_neg using min(e_b,0),
  peak band strength S = max_b sum_l w_l*k_{b,l}, and strongest band as one categorical
  value among u,g,r,i,z,outside where outside is used when S=0. Add contrast features
  T_qso - T_gal, E_qso - E_gal, E_pos_qso - E_pos_gal, and S_qso - S_gal. All bins
  and weights are fixed before training and no label, fold, or test-target statistics
  are learned.'
expected_signal: Balanced accuracy can benefit if minority QSO and STAR/GALAXY boundary
  cases are separated by redshift-dependent broadband bumps that ordinary color differences
  treat as smooth variation; these features give the model compact, physically aligned
  summaries of when quasar-like or galaxy-like emission lines should perturb specific
  SDSS bands.
risk: The signal depends heavily on the reliability of the provided redshift and may
  create misleading resonance patterns for stars or objects with noisy catalog redshifts;
  fixed filter centers, approximate Gaussian kernels, and fixed line weights ignore
  true throughput curves, equivalent widths, absorption, and photometric uncertainty,
  so the features may be redundant with colors or encourage redshift-pattern overfitting
  if the downstream model is too flexible.
