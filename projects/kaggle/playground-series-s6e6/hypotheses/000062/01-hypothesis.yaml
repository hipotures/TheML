title: Noise-Scale Color Decisiveness
group_name: noise_scale_color_decisiveness
family: photometric_uncertainty_geometry
summary: Represent whether each object's ugriz color pattern is physically decisive
  or noise-ambiguous relative to canonical SDSS photometric precision, making borderline
  star, galaxy, and quasar color overlaps explicit without using labels.
depends_on: []
strategy: 'Use only the five observed magnitudes. Adopt a fixed per-band noise scale
  of 0.03 mag from the SDSS quasar catalog description of typical five-band photometric
  accuracy (https://heasarc.gsfc.nasa.gov/w3browse/all/sdssquasar.html), with color
  noise sigma_color = sqrt(2) * 0.03; for adjacent colors u-g, g-r, r-i, i-z and all
  ten pairwise band differences, compute signed noise-normalized margins color / sigma_color
  clipped to [-30, 30]. Derive one coherent set of uncertainty-margin summaries: counts
  of strongly positive, strongly negative, and ambiguous color comparisons using absolute
  margins <= 1, between 1 and 3, and > 3; minimum, median, maximum, and mean absolute
  margin over adjacent and all-pair colors; robust sign-change count after setting
  ambiguous adjacent colors to zero; and a bounded confidence score such as tanh(abs(margin)
  / 3) aggregated across colors. Treat all input values as finite, use the same rules
  for train and test, and do not fit any statistics from labels or target distributions.
  SDSS asinh magnitude behavior provides additional context for interpreting faint-band
  magnitudes as noise-sensitive measurements (https://www.sdss4.org/dr14/algorithms/magnitudes/).'
expected_signal: Raw colors encode direction and size, but not whether the differences
  are large enough to be trusted at survey precision; this group can help balanced
  accuracy by separating decisive continuum shapes from noise-scale color ties, especially
  where quasars and compact galaxies are photometrically similar to stars as noted
  in photometric quasar-selection background (https://arxiv.org/html/2605.18218).
risk: The fixed 0.03 mag scale is an approximation because row-level photometric errors
  are absent, so the features may be partly redundant with existing color and ordering
  groups or may overemphasize synthetic precision artifacts if the competition data
  do not follow real SDSS noise behavior.
