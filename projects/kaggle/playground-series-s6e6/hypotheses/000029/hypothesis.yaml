title: Lyman-break dropout geometry across redshifted bands
group_name: redshifted_lyman_discontinuity
family: restframe_discontinuity
summary: Create features that quantify where and how strongly the broadband SED drops
  across the rest-frame Lyman-limit and Lyman-alpha edges as they sweep through ugriz
  bands, giving direct physically interpretable dropout geometry for class separation.
depends_on: []
strategy: "Use the fixed SDSS effective wavelengths [u,g,r,i,z] = [3551, 4686, 6165,\
  \ 7481, 8931] \xC5 and each object's redshift z to evaluate two breaks B in {912\
  \ \xC5, 1216 \xC5}. Convert ugriz magnitudes to linear flux proxies f_b = 10^{-0.4\
  \ m_b}. For each break B, compute \u03BB_rest = \u03BB/(1+z) for all five bands\
  \ and let idx = first index where \u03BB_rest[idx] >= B. If idx == 0 or idx == 5,\
  \ mark edge_available_B = 0 and emit neutral defaults (jump_B = 0, local_B = 0,\
  \ phase_B = 0); else set edge_available_B = 1, define phase_B = clip((B - \u03BB\
  _rest[idx-1]) / (\u03BB_rest[idx] - \u03BB_rest[idx-1]), 0, 1), jump_B = log10((mean(f[idx:])\
  \ + eps)/(mean(f[:idx]) + eps)), and local_B = m[idx-1] - m[idx], with eps = 1e-12.\
  \ Add a compact positional encoding break_band_B = idx (0..5 or one-hot bins: below\
  \ u, u-g, g-r, r-i, i-z, above z) and optionally interaction terms jump_B * break_band_B\
  \ and local_B * edge_available_B to stabilize extreme edges."
expected_signal: "These features should capture physically motivated absorption/continuum-break\
  \ behavior that is not fully represented by global color slopes, especially for\
  \ high-redshift quasars and galaxies where the blue-to-red flux jump around Ly\u03B1\
  /Lyman-limit is a strong discriminator, while neutralizing to near-zero for low-redshift\
  \ objects where breaks are outside ugriz coverage."
risk: Dependence on provided redshift introduces sensitivity to redshift errors and
  can create unstable boundary assignments when z is noisy; u-band sensitivity and
  calibration variation can also generate spurious jump magnitudes, and some information
  may overlap with other break/line-geometry families so gains may be incremental
  if those are already strong.
