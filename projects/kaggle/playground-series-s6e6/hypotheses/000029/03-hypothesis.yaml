title: Robust phase-weighted Lyman dropout geometry
group_name: redshifted_lyman_discontinuity
family: restframe_discontinuity
summary: Create rest-frame broadband features that describe whether the Lyman-limit
  and Lyman-alpha discontinuities fall inside the observed ugriz window and how strongly
  the SED changes across the corresponding blue and red passbands.
depends_on: []
strategy: "Use fixed ugriz effective wavelengths \u03BBobs = [3551, 4686, 6165, 7481,\
  \ 8931] \xC5 and magnitudes m = [u, g, r, i, z]. Set z_eff = max(redshift, 0) to\
  \ avoid unstable behavior from small negative redshifts, and for each Lyman break\
  \ B in {912, 1216} \xC5 compute the observed break wavelength \u03BBB = B * (1 +\
  \ z_eff). Let j = searchsorted(\u03BBobs, \u03BBB), so bands < j are blueward of\
  \ the break and bands >= j are redward. If j == 0 or j == 5, set edge_available_B\
  \ = 0, phase_B = 0, edge_quality_B = 0, break_bin_B to the corresponding outside\
  \ bin, and all contrast/slope features to 0. Otherwise set edge_available_B = 1\
  \ and encode the interval bin j in {1:u-g, 2:g-r, 3:r-i, 4:i-z}. Define phase_B\
  \ = clip((\u03BBB - \u03BBobs[j-1]) / (\u03BBobs[j] - \u03BBobs[j-1]), 0, 1), boundary_distance_B\
  \ = min(phase_B, 1 - phase_B), and edge_quality_B = clip(2 * boundary_distance_B,\
  \ 0, 1), giving highest confidence when the break is centered between adjacent filters\
  \ and lowest confidence near a filter center boundary. Compute local_color_B = m[j-1]\
  \ - m[j]. Compute short-window baselines m_blue_B = mean(m[max(0, j-2):j]) and m_red_B\
  \ = mean(m[j:min(5, j+2)]), then broad_jump_B = m_blue_B - m_red_B. Also compute\
  \ flux-ratio contrast using f = 10^(-0.4 * m): flux_jump_B = log10((mean(f[j:min(5,\
  \ j+2)]) + 1e-12) / (mean(f[max(0, j-2):j]) + 1e-12)). Add local log-wavelength\
  \ slope slope_B = (m[j] - m[j-1]) / (log(\u03BBobs[j]) - log(\u03BBobs[j-1])). Return\
  \ raw contrasts plus quality-weighted versions broad_jump_B * edge_quality_B, local_color_B\
  \ * edge_quality_B, flux_jump_B * edge_quality_B, and slope_B * edge_quality_B,\
  \ along with one-hot break interval indicators and outside-window flags for each\
  \ B."
expected_signal: The features isolate high-redshift dropout geometry that is expected
  for quasars and some galaxies but generally absent for stars, giving the classifier
  class-specific evidence beyond ordinary color indices while the phase and availability
  terms help tree or linear models treat in-window, edge-adjacent, and outside-window
  cases differently.
risk: The group is highly dependent on the provided redshift and may overfit redshift-derived
  class structure if validation is not representative; the contrasts can be noisy
  when u or g photometry is weak, and the information may be partly redundant with
  existing color, redshift, or rest-frame break features, so regularization and feature
  importance pruning may be needed.
