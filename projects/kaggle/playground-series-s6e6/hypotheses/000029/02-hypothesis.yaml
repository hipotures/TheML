title: Phase-weighted Lyman dropout geometry in rest-frame ugriz
group_name: redshifted_lyman_discontinuity
family: restframe_discontinuity
summary: Engineer deterministic rest-frame features that encode where the Lyman-limit
  and Lyman-alpha breaks fall across the ugriz bands and how sharply the continuum
  changes across that location, so the model can exploit physically grounded dropout
  geometry rather than only global color trends.
depends_on: []
strategy: "For each object, define observed central wavelengths \u03BBobs = [3551,\
  \ 4686, 6165, 7481, 8931] \xC5 and magnitudes m = [u, g, r, i, z]. Use z_t = max(redshift,\
  \ 0) and compute rest-frame centers \u03BBrest = \u03BBobs / (1 + z_t). For each\
  \ break B in {912, 1216} \xC5: let j = np.searchsorted(\u03BBrest, B). If j = 0\
  \ or j = 5, set edge_available_B = 0 and emit jump_B = 0, local_B = 0, phase_B =\
  \ 0, edge_quality_B = 0, and all break-bin flags = 0. Otherwise set edge_available_B\
  \ = 1, phase_B = (B - \u03BBrest[j-1]) / (\u03BBrest[j] - \u03BBrest[j-1]) clipped\
  \ to [0, 1], and encode break position with break_bin_B in {0,1,2,3,4,5} where 1=u\u2192\
  g, 2=g\u2192r, 3=r\u2192i, 4=i\u2192z (0 and 5 are outside cases). Add edge confidence\
  \ edge_quality_B = clip(1 - 2 * abs(phase_B - 0.5), 0, 1) to downweight boundaries\
  \ (phase near 0 or 1). Compute blue-side magnitude baseline m_blue = mean(m[max(0,\
  \ j-2):j]) and red-side baseline m_red = mean(m[j:min(5, j+2)]). Define jump_B =\
  \ m_blue - m_red, local_B = m[j-1] - m[j], and optional local log-wavelength slope\
  \ slope_B = (m[j] - m[j-1]) / (log(\u03BBrest[j]) - log(\u03BBrest[j-1])). Return\
  \ interaction terms jump_B * edge_quality_B and local_B * edge_quality_B (plus optional\
  \ slope_B * edge_quality_B and one-hot/binary indicators for break_bin_B) so features\
  \ are deterministic, continuous near boundaries, and muted when redshifted break\
  \ placement is uncertain."
expected_signal: By tying break location directly to redshifted passband geometry,
  this group captures high-redshift UV dropout behavior that is strongly class-discriminative
  for quasars and galaxies but weak for most stars, while quality-gated phase and
  bounded averaging make the signal more stable than a single hard color-difference
  feature and reduce noise when the break is near filter edges or outside the optical
  window.
risk: The approach is sensitive to redshift errors and can become unstable when B
  lies very near a band boundary, and it may remain redundant with other redshift-dependent
  break/line geometry signals; errors in u-band photometry can also dominate these
  contrast features for low-SNR objects, so regularization or feature pruning may
  be required.
