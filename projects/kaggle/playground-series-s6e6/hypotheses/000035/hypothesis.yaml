title: eBOSS PTF c1/c3 contamination-aware color geometry
group_name: eboss_ptf_c1_c3_geometry
family: color_plane_selection_geometry
summary: Compute rotated SDSS color-plane geometry used by eBOSS-style quasar targeting
  to separate true quasar candidates from stellar and low-redshift contaminant manifolds
  using only ugriz colors, then encode both boundary distance and explicit bright-object
  rejection-pocket proximity.
depends_on: []
strategy: "Build adjacent colors c_ug = u - g, c_gr = g - r, c_ri = r - i, c_iz =\
  \ i - z. In each row, clip each color to a safe finite range (for example [-10,\
  \ 10]) before projection. Compute c1 = 0.95*c_ug + 0.31*c_gr + 0.11*c_ri and c3\
  \ = -0.39*c_ug + 0.79*c_gr + 0.47*c_ri. Compute boundary margins d1 = (1.4 - 0.55*c1)\
  \ - c3 and d2 = (0.3 - 0.1*c1) - c3; output signed core score S = min(d1, d2), plus\
  \ upper-violation magnitudes V1 = max(-d1, 0), V2 = max(-d2, 0), and S_abs = |S|.\
  \ Add a bright rejection-pocket indicator using the same coordinates: P = 1 if (r\
  \ < 20.5 AND 0.85 <= c1 <= 1.35 AND c3 > -0.2), else 0; also output pocket distances\
  \ R1 = max(0.85 - c1, 0, c1 - 1.35) and R2 = max(-c3 - 0.2, 0) to encode how far\
  \ from the forbidden pocket. Optionally produce two binned versions of S (e.g.,\
  \ quantiles q1<0, q2\u22480, q3>0 and a signed ternary bin in {below/near/above})\
  \ to stabilize tree partitioning."
expected_signal: Quasars typically sit away from the stellar/low-z continuum manifold
  in this rotated space while many stars and unresolved galaxies cluster near or inside
  the reject pocket, so these signed distances and pocket flags can provide strong
  class-separation information independent of absolute brightness and help resolve
  ambiguous color overlap.
risk: "Constants are drawn from SDSS-era target-selection conventions and may be sensitive\
  \ to photometric-system offsets or magnitude-type mismatch, so the margins can drift\
  \ and over-prune valid objects if this survey\u2019s preprocessing differs; this\
  \ transform is also partially redundant with other quasar-selection-surface geometry\
  \ features and may saturate marginal gain when combined."
