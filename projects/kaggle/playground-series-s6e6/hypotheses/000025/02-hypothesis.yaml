title: AIDE auxiliary distribution distance with robust circular sky geometry
group_name: aide_aux_reference_distribution_distance
family: aide_auxiliary_reference
summary: Construct robust outlier-style signals by comparing each test object against
  an external reference population in overlapping sky, photometric, and redshift predictor
  space, using stable marginal and joint distance statistics to capture how typical
  or atypical its profile is.
depends_on: []
strategy: "Load the auxiliary reference table and restrict to predictor columns in\
  \ the overlap set {alpha, delta, u, g, r, i, z, redshift}; reject any other fields\
  \ from distance computation. Clean numeric predictors deterministically: values\
  \ <= -9000 in u, g, r, i, z are set to missing, and redshift < 0 is clipped to 0.0001.\
  \ Convert alpha to radians and create two deterministic positional components sin_alpha\
  \ = sin(2*pi*alpha/360) and cos_alpha = cos(2*pi*alpha/360); keep delta as a linear\
  \ feature. For each used column j, compute reference median m_j and scale s_j from\
  \ MAD; if MAD is zero, fall back to IQR/1.348, and if still zero, replace with the\
  \ median positive fallback scale across all columns. For each row x, compute per-column\
  \ robust z value z_j=(x_j-m_j)/s_j with clipping to [-8,8] when finite, empirical\
  \ CDF rank p_j using 1-indexed rank ordering on complete reference values (p_j=(rank+1)/(n_ref+1)\
  \ and clipped to [1/(n_ref+2), 1-1/(n_ref+2)]), and median distance a_j=|x_j-m_j|.\
  \ Emit a per-feature missing flag and maintain missing_count and available_ratio\
  \ over overlap columns. Aggregate marginal features as mean_abs_z, max_abs_z, mean_rank_shift\
  \ = mean(|p_j-0.5|), and mean_abs_median_delta = mean(a_j), each computed over available\
  \ columns only. Build a joint standardized vector w from [sin_alpha, cos_alpha,\
  \ delta, u, g, r, i, z, redshift] after excluding unavailable coordinates per row;\
  \ estimate reference covariance on complete rows after centering and clipping z-like\
  \ standardized values to [-6,6], then regularize with ridge \u03C4 = 1e-6 * trace(C)/d\
  \ if d>=2 or if covariance rank is deficient. Compute Mahalanobis squared distance\
  \ d2 = w^T * inv(C_reg) * w, Mahalanobis distance d = sqrt(max(d2,0)), and inlier\
  \ score s = log1p(d2); if row-wise completeness is insufficient for joint computation,\
  \ use deterministic row-level fallback by shrinking to available components and\
  \ a missingness-aware mean distance, but keep availability flags. If auxiliary data\
  \ is missing or effective overlap is below three usable numeric columns, return\
  \ explicit neutral constants for all distance features plus full missing/unavailable\
  \ indicators; never use target labels and never train a downstream classifier in\
  \ this hypothesis."
expected_signal: This feature group provides a calibrated notion of how likely each
  object is under a broad external population; class boundaries are often separable
  by how far objects move from the joint photometric/redshift manifold (e.g., unusual
  color-redshift combinations or sky-position concentration), so these robustness-stabilized
  marginal and Mahalanobis-derived distances add strong discriminative structure for
  balanced multiclass scoring.
risk: Potential distributional shift between auxiliary and competition data (calibration,
  selection, or footprint bias) can introduce systematic ordering errors, and aggressive
  clipping/regularization may obscure subtle class structure; joint distance estimates
  are sensitive to low-variance features and incomplete rows, so missingness and fallback
  paths are essential but may add redundancy or noisy proxies.
