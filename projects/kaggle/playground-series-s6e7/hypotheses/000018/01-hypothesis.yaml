title: Ordinal self-report health polarity
group_name: self_report_health_polarity
family: ordinal_categorical_composite
summary: Represent each student's subjective lifestyle reports as a compact polarity
  profile that captures whether their stated habits consistently lean protective,
  adverse, neutral, or internally mixed.
depends_on: []
strategy: Use only categorical lifestyle fields with natural health direction and
  exclude gender. Map stress_level as low=1, medium=0, high=-1; sleep_quality as good=1,
  average=0, poor=-1; physical_activity_level as active=1, moderate=0, sedentary=-1;
  smoking_alcohol as no=1, occasional=0, yes=-1; diet_type as balanced=1, veg=0, non-veg=-1.
  For each row, ignore missing values rather than treating them as neutral, then derive
  signed_sum, signed_mean over observed mapped fields, protective_count, adverse_count,
  neutral_count, observed_count, consensus_margin=abs(protective_count-adverse_count)/observed_count,
  mixed_polarity_count=min(protective_count,adverse_count), and all_protective/all_adverse
  flags when observed_count>=3 and all observed nonneutral signs are on one side.
  If observed_count is 0, set ratios and signed_mean to 0 and all flags to 0. This
  follows ordered-categorical representation ideas from https://dotdata.com/blog/feature-engineering-for-categorical-attributes/
  and domain evidence linking college-student sleep, stress, and activity patterns
  from https://www.frontiersin.org/journals/public-health/articles/10.3389/fpubh.2025.1640974/full
  and https://www.cdc.gov/pcd/issues/2025/25_0118.htm.
expected_signal: The target may separate rare fit and unhealthy rows partly through
  consistent stacks of self-reported protective or adverse behaviors, so compact polarity
  and consensus features can expose class-balanced signal that is diluted when each
  category is considered independently.
risk: The imposed ordering is partly heuristic, especially for diet_type and occasional
  smoking_alcohol, and the group may be redundant with raw categorical columns or
  broad lifestyle-burden features if the labels depend more on numeric physiology
  than reported habits.
