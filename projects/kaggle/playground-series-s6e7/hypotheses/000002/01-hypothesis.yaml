title: Activity-Normalized Cardio Strain
group_name: activity_normalized_cardio_strain
family: physiological_efficiency_ratios
summary: Represent whether a student's cardiovascular and energy signals look elevated
  relative to their movement and exercise output, capturing strain per unit of activity
  rather than absolute lifestyle levels.
depends_on: []
strategy: 'For each row, create NaN-preserving activity-normalized ratios from heart_rate,
  step_count, exercise_duration, and calorie_expenditure: 1000 * heart_rate / step_count,
  heart_rate / (exercise_duration + 1), 1000 * calorie_expenditure / step_count, calorie_expenditure
  / (exercise_duration + 1), and step_count / (exercise_duration + 1); create one
  residual contrast equal to train-only robust-z(1000 * heart_rate / step_count) minus
  train-only robust-z(1000 * calorie_expenditure / step_count), after clipping both
  component ratios to their train-only 0.5th and 99.5th percentiles; add a three-level
  heart-rate-per-step band using cutpoints low <= 0.0081, medium <= 0.0147, high >
  0.0147, with unknown when heart_rate or step_count is missing; leave ratios missing
  when required numerators or step_count are missing, and use +1 only for exercise_duration
  because zero reported exercise is valid.'
expected_signal: Heart-rate-per-step style measures have been reported as more informative
  than heart rate or steps alone for cardiovascular fitness and disease associations
  (https://www.health.harvard.edu/blog/counting-steps-is-good-is-combining-steps-and-heart-rate-better-202504173095,
  https://www.acc.org/about-acc/press-releases/2025/03/20/09/58/a-smarter-way-to-track-heart-health-with-your-smartwatch),
  so this group may distinguish fit students with efficient activity patterns from
  at-risk or unhealthy students whose heart rate or calorie burn is disproportionate
  to movement.
risk: Ratios can amplify reporting noise and missingness, external DHRPS cutpoints
  may not transfer cleanly to a student-style dataset, and calorie expenditure may
  already be partly derived from activity measures, making some columns redundant
  with raw inputs.
