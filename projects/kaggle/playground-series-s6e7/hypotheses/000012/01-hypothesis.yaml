title: Substance Use Buffering Context
group_name: substance_use_context_buffer
family: behavioral_risk_context
summary: Represent whether substance-use risk is buffered or amplified by the surrounding
  lifestyle context, separating students whose smoking/alcohol pattern co-occurs with
  protective habits from those where it clusters with broader health-risk behavior.
depends_on: []
strategy: 'Map smoking_alcohol to an ordinal substance burden: no=0, occasional=1,
  yes=2, missing=-1. Build a protective_context_score as the count of satisfied supports:
  diet_type in {balanced, veg}, physical_activity_level in {moderate, active}, sleep_quality=good,
  stress_level=low, 7 <= sleep_duration <= 9, step_count >= 8000, exercise_duration
  >= 30, 18.5 <= bmi < 25. Build an adverse_context_score as the count of satisfied
  risks: stress_level=high, sleep_quality=poor, physical_activity_level=sedentary,
  diet_type=non-veg, sleep_duration < 6 or sleep_duration > 9.5, step_count < 5000,
  exercise_duration < 10, bmi < 18.5 or bmi >= 30, heart_rate >= 90. Missing values
  do not satisfy protective or adverse conditions, except smoking_alcohol missing
  receives the explicit missing burden code. Derive substance_buffer_gap = adverse_context_score
  + substance_burden - protective_context_score when substance_burden >= 0, otherwise
  null. Derive substance_amplification = substance_burden * adverse_context_score
  and substance_buffering = substance_burden * protective_context_score, with nulls
  when substance_burden is missing. Add one categorical context bucket: missing_substance,
  clean_supported for no use with protective_context_score >= 5 and adverse_context_score
  <= 1, non_substance_lifestyle_risk for no use with adverse_context_score >= 4, buffered_use
  for occasional/yes with protective_context_score >= 4 and adverse_context_score
  <= 2, compounding_use for occasional/yes with adverse_context_score >= 4, and mixed_context
  otherwise.'
expected_signal: Student health literature and AHA lifestyle guidance support that
  substance use, activity, diet, sleep, BMI, and stress cluster as joint risk patterns,
  so this group may sharpen balanced accuracy by distinguishing fit-like protective
  profiles, at-risk buffered-use profiles, and unhealthy compounding-risk profiles
  using only observed features.
risk: This may be partly redundant with broad lifestyle-burden features, and fixed
  clinical-style cutoffs can be unstable if the competition labels were generated
  from different thresholds or if smoking_alcohol combines smoking and alcohol in
  a way that weakens the ordinal assumption.
