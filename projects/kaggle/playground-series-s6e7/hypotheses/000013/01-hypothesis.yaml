title: Activity Modality Balance
group_name: activity_modality_balance
family: activity_composition
summary: Capture whether a student's movement pattern is primarily structured exercise,
  incidental daily ambulation, broadly active, or behaviorally inconsistent with their
  stated activity level.
depends_on: []
strategy: 'Use step_count, exercise_duration, calorie_expenditure, and physical_activity_level
  only. Fit train-only unsupervised reference points: medians, IQRs, and tertile cut
  points for the numeric activity fields. For each row, impute numeric inputs for
  calculations with train medians and use a small positive denominator guard. Create
  robust quantile scores for steps, exercise minutes, and calorie expenditure; derive
  activity_volume as the mean of step and exercise quantiles, modality_delta as step
  quantile minus exercise quantile, structured_share as exercise_duration divided
  by exercise_duration plus step_count/1000 plus 1, ambulatory_share as step_count/1000
  divided by the same denominator, calorie_intensity_residual as calorie quantile
  minus activity_volume, and self_report_gap as ordinal physical_activity_level minus
  activity_volume where sedentary=0, moderate=0.5, active=1, and missing=0.5. Add
  one compact modality bucket from step/exercise tertiles: low_both, walk_dominant,
  exercise_dominant, high_both, or mixed_mid. Background used: https://www.cdc.gov/pcd/issues/2025/25_0118.htm,
  https://www.cdc.gov/healthyschools/professional_development/e-learning/cspap/page04.html,
  https://link.springer.com/article/10.1186/s44167-024-00045-9.'
expected_signal: Balanced accuracy may improve because fit students may show coherent
  high-both or well-aligned active patterns, unhealthy students may concentrate in
  low-both or overreported-activity patterns, and at-risk students may appear as one-sided
  or inconsistent movement styles that raw steps and exercise minutes do not separate
  cleanly.
risk: This may be redundant with existing activity-related raw features and prior
  density or strain groups; unsupervised quantile cut points can shift if train and
  test activity distributions differ, and the modality bucket is coarse enough to
  lose signal near tertile boundaries.
