title: At-Risk Corridor Occupancy
group_name: at_risk_corridor_occupancy
family: deterministic_health_staging
summary: Represent each student by whether their observable lifestyle and physiology
  signals cluster in a transitional middle-health corridor versus clearly fit-like
  or unhealthy-like extremes, making the at-risk state explicit instead of compressing
  wellness into one linear burden.
depends_on: []
strategy: 'Convert each eligible domain into a three-stage code where -1 means fit-like,
  0 means transitional at-risk corridor, and 1 means unhealthy-like, leaving missing
  values as unknown. Use fixed public-health-style bins: sleep_duration is -1 for
  7 to 9 hours, 0 for 6 to <7 or >9 to 10, 1 for <6 or >10; bmi is -1 for 18.5 to
  <25, 0 for 16 to <18.5 or 25 to <30, 1 for <16 or >=30; heart_rate is -1 for 50
  to 72, 0 for >72 to 88, 1 for >88, with <50 treated as 0 because it is ambiguous
  without athlete context; exercise_duration is -1 for >=30 minutes, 0 for 10 to <30,
  1 for <10; step_count is -1 for >=8000, 0 for 4000 to <8000, 1 for <4000; water_intake
  is -1 for 2.0 to 3.5, 0 for 1.0 to <2.0 or >3.5 to 4.5, 1 for <1.0 or >4.5; calorie_expenditure
  is staged by train-only quantiles as -1 for the 40th to 85th percentile, 0 for the
  20th to <40th or >85th to 95th percentile, and 1 for below the 20th or above the
  95th percentile. Map categorical domains as stress_level low/medium/high to -1/0/1,
  sleep_quality good/average/poor to -1/0/1, physical_activity_level active/moderate/sedentary
  to -1/0/1, smoking_alcohol no/occasional/yes to -1/0/1, and diet_type balanced/veg/non-veg
  to -1/0/1. Exclude gender. From the non-missing stage codes, derive fit_stage_count,
  corridor_stage_count, unhealthy_stage_count, known_stage_count, the corresponding
  shares, signed_stage_margin = fit_share - unhealthy_share, corridor_dominance =
  corridor_share - max(fit_share, unhealthy_share), extreme_polarization = min(fit_share,
  unhealthy_share), mean_stage, max_stage, min_stage, and stage_entropy over the three
  counts. If all staged domains are missing, set counts to 0, shares and summary statistics
  to 0, and entropy to 0.'
expected_signal: The middle class is likely defined by broad moderate patterns rather
  than only severe risk or strong protection, so explicitly measuring corridor occupancy
  can separate consistently at-risk rows from both clearly fit rows and unhealthy
  rows with concentrated adverse evidence.
risk: Hand-chosen thresholds may be imperfect for this synthetic population, the group
  may partially overlap with existing threshold-burden features, and categorical assumptions
  such as diet ordering could add noise if the source generator used different semantics.
