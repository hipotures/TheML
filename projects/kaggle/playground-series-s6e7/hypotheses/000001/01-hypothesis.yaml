title: Guideline Deviation Health Burden
group_name: guideline_deviation_burden
family: domain_threshold_risk_index
summary: Create a compact lifestyle-health burden representation by translating each
  measured or reported habit into distance from broadly accepted healthy ranges and
  aggregating the cumulative deviation pattern.
depends_on: []
strategy: 'For each row, derive deterministic risk points from available raw fields
  only: BMI uses adult bands underweight <18.5 = 1, healthy 18.5 to <25 = 0, overweight
  25 to <30 = 1, obese >=30 = 2; sleep duration uses <6 = 2, 6 to <7 = 1, 7 to 9 =
  0, >9 = 1; heart rate uses 60 to 100 = 0, 50 to <60 = 1, >100 = 2; step count uses
  <4000 = 2, 4000 to <7000 = 1, 7000 to <10000 = 0, >=10000 = 0; exercise duration
  uses 0 = 2, >0 to <30 = 1, >=30 = 0; water intake uses gender-aware reference shortfall
  with male target 3.7 L, female target 2.7 L, other or missing gender target 3.2
  L, scoring >=target = 0, 70% to <100% target = 1, <70% target = 2; diet_type scores
  balanced = 0 and veg or non-veg = 1; stress_level scores low = 0, medium = 1, high
  = 2; sleep_quality scores good = 0, average = 1, poor = 2; physical_activity_level
  scores active = 0, moderate = 1, sedentary = 2; smoking_alcohol scores no = 0, occasional
  = 1, yes = 2. Emit the per-domain point columns plus aggregate burden_sum, burden_mean
  over non-missing components, severe_deviation_count for point value 2, healthy_alignment_count
  for point value 0, and burden_available_count; if an input is missing, leave its
  component missing and exclude it from aggregate denominators, with aggregate means
  missing only when no components are available. Threshold anchors are generalized
  from public guidance and evidence: CDC BMI https://www.cdc.gov/bmi/adult-calculator/bmi-categories.html,
  CDC sleep https://www.cdc.gov/sleep/about/index.html, CDC activity https://www.cdc.gov/physical-activity-basics/guidelines/adults.html,
  Mayo heart rate https://www.mayoclinichealthsystem.org/hometown-health/speaking-of-health/know-your-numbers-heart-rate,
  JAMA steps https://jamanetwork.com/journals/jamanetworkopen/fullarticle/2783711,
  and National Academies water intake https://www.nationalacademies.org/news/report-sets-dietary-intake-levels-for-water-salt-and-potassium-to-maintain-health-and-reduce-chronic-disease-risk.'
expected_signal: The target classes likely reflect cumulative wellness rather than
  any single raw measurement, so a normalized burden score and its aligned-versus-severe
  counts can make fit, at-risk, and unhealthy profiles more separable while preserving
  interpretable nonlinear thresholds.
risk: Public health thresholds may not match the synthetic label-generation rules
  or the units of some fields, especially exercise duration and water intake, so this
  group could add redundant or slightly miscalibrated transforms of already informative
  raw variables.
