title: Gendered Stress Buffer Margin
group_name: gender_stress_buffer_margin
family: stress_lifestyle_moderation
summary: Represent whether a student's perceived stress is paired with enough gender-contextual
  healthy lifestyle buffers or instead clusters with low-support habits and physiological
  load.
depends_on: []
strategy: 'Create a five-component healthy-lifestyle buffer score from sleep, activity,
  diet, substance use, and body-mass status using source-informed deterministic thresholds:
  sleep is the average of duration in 7-9 hours and sleep-quality ordinal score good/average/poor
  = 1/0.5/0; activity is the average of step_count at or above the train-only gender-specific
  60th percentile with global fallback, exercise_duration >= 30 minutes, and physical_activity_level
  active/moderate/sedentary = 1/0.5/0; diet_type balanced/veg/non-veg = 1/0.75/0.25;
  smoking_alcohol no/occasional/yes = 1/0.5/0; BMI 18.5-24.9, 16-18.5 or 25-29.9,
  and >=30 = 1/0.5/0. Missing numeric or categorical inputs contribute 0.5 neutral,
  unseen categories map to 0.5, and numeric values are clipped to train min/max before
  scoring. Map stress_level low/medium/high/unknown to 0/1/2/1, then derive buffer_count,
  buffer_mean, stress_buffer_gap = buffer_mean - stress_score/2, stress_unbuffered_load
  = (stress_score/2) * (1 - buffer_mean), gender-specific versions of the gap and
  load for female, male, other, and unknown gender indicators, and one categorical
  cell combining gender, stress level, and buffer band low <0.4, mixed 0.4-0.75, high
  >=0.75. Source anchors: https://www.heart.org/en/healthy-living/healthy-lifestyle/lifes-essential-8,
  https://www.who.int/europe/news-room/fact-sheets/item/everyday-actions-for-better-health-who-recommendations,
  https://sites.bu.edu/nutritionalepilab/files/2019/03/Badger_Quatromoni_Morrell_Stress-and-Healthy-Lifestyle-Factors-in-College_HBPR_2019.pdf'
expected_signal: Stress alone may blur the three classes, while stress that is either
  buffered by protective routines or amplified by clustered weak habits can separate
  fit, at-risk, and unhealthy profiles more cleanly, especially if the synthetic source
  encodes gender-specific stress-lifestyle patterns seen in student-health research.
risk: This can be redundant with prior stress-recovery and gender-context groups,
  may encode spurious demographic effects because the supporting literature reports
  sex-specific associations while the dataset uses reported gender categories, and
  the fixed thresholds or gender-specific activity quantiles may be unstable if train
  and test behavior distributions shift.
