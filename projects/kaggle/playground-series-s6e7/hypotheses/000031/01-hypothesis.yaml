title: Gender-context lifestyle typicality
group_name: gender_lifestyle_category_typicality
family: peer_context_categorical_typicality
summary: Represent whether a student's reported lifestyle categories are common or
  unusual among students with the same reported gender, treating demographic moderation
  of health behaviors as a compact context signal.
depends_on: []
strategy: 'Use the original categorical lifestyle fields diet_type, stress_level,
  sleep_quality, physical_activity_level, and smoking_alcohol, with gender as the
  peer context. Convert missing gender and missing lifestyle values to explicit tokens.
  Fit unsupervised smoothed frequency tables on training feature rows only, excluding
  the target: for each lifestyle field compute p(value | gender) and p(value) with
  additive smoothing alpha=1 over all observed levels plus the missing token. For
  each row derive per-field conditional surprise -log(p(value | gender)), overall
  surprise -log(p(value)), and gender log-lift log(p(value | gender)) - log(p(value)).
  Return one coherent group of aggregates across the five lifestyle fields: mean conditional
  surprise, maximum conditional surprise, sum conditional surprise, count of fields
  where p(value | gender) is below 0.20, mean gender log-lift, sum absolute gender
  log-lift, and summed conditional log probability. For unseen values or gender contexts,
  fall back to the smoothed overall probability for that field; missing values are
  handled as their own category rather than imputed.'
expected_signal: Published student-health and physical-activity literature emphasizes
  that lifestyle patterns and their health associations can differ by gender, so same-gender
  categorical typicality may reveal risk-relevant behavior context that raw category
  labels alone do not express, especially for minority health_condition classes.
risk: This may be redundant with raw categorical variables, broader co-occurrence-density
  features, and existing gender-relative numeric context; if the synthetic data generation
  makes lifestyle categories nearly independent of gender, the features will add little
  signal and could introduce small distribution-instability noise.
