title: Auxiliary temporal stability affinity
group_name: external_temporal_stability_affinity
family: external_temporal_behavior
summary: Represent each static train/test row by how closely its observable profile
  resembles auxiliary-source students with stable versus erratic longitudinal health
  and lifestyle routines, using the external timestamped repeated observations as
  a source-only behavioral regularity reference.
depends_on: []
strategy: 'From data/student_health_dataset_50k.csv.gz only, parse timestamp, sort
  by student_id and time, and for each student compute source-only temporal instability
  statistics: numeric IQR divided by the source-column IQR, standard deviation divided
  by source-column IQR, and median absolute successive change divided by source-column
  IQR for sleep_duration, heart_rate, bmi, calorie_expenditure, step_count, exercise_duration,
  and water_intake; for diet_type, stress_level, sleep_quality, physical_activity_level,
  smoking_alcohol, and gender compute normalized categorical entropy and successive
  switch rate. Average these components into one per-student instability score after
  clipping each component to [0, 5], then split source students into low, middle,
  and high instability tertiles. For each tertile, build a centroid over the shared
  train/test feature space using source medians for numeric columns and category frequencies
  for categorical columns, with numeric scaling by source IQR plus a small epsilon.
  For every train/test row, compute observed-dimension normalized distance to each
  tertile centroid: squared scaled numeric differences plus categorical mismatch distance
  equal to 1 minus the centroid frequency of the row category, ignoring missing dimensions
  and dividing by the number of observed components. Convert distances to similarities
  with exp(-distance), add the similarity-weighted expected instability score, the
  high-minus-low stability contrast, and an observed-feature coverage fraction. If
  a row has no observed shared features, emit neutral tertile similarities, the global
  source mean instability, zero contrast, and zero coverage. Background used: https://arxiv.org/html/2503.08002v1,
  https://www.nature.com/articles/s41591-024-03155-8, https://www.c4tbh.org/predicting-stress-in-first-year-college-students-using-sleep-data-from-wearable-devices/.'
expected_signal: The target may reflect not only a one-time health state but also
  the kind of routine stability that generated it; external longitudinal evidence
  links changes or irregularity in sleep and related biometric measures with stress
  and chronic health outcomes, so source-derived stable/unstable routine affinities
  can expose a risk axis absent from static raw values while avoiding train/test label
  leakage.
risk: The auxiliary timestamped source may encode temporal behavior patterns that
  were weakened or removed in the synthetic train/test distribution, making the affinities
  noisy; it also partially overlaps with other external support ideas and can add
  redundant distance-style columns if the source instability tertiles have very similar
  centroids.
