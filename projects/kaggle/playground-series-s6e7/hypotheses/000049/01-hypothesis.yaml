title: Cumulative habit ladder fit
group_name: cumulative_habit_ladder_fit
family: psychometric_response_scaling
summary: Represent each record as a cumulative healthy-habit ladder pattern, measuring
  whether stronger protective signals appear on top of the easier lifestyle foundations
  that usually precede them rather than only counting total healthy evidence.
depends_on: []
strategy: 'Create binary healthy-endorsement items from all available lifestyle and
  physiology domains using fixed, interpretable cutoffs: adequate sleep window, favorable
  reported sleep quality, low stress, non-sedentary or active activity report, moderate
  and high step-count tiers, moderate and high exercise-duration tiers, no smoking/alcohol
  exposure, balanced or vegetarian diet, adequate and high hydration tiers, normal
  BMI range, non-elevated and low resting pulse tiers, and non-low daily energy-expenditure
  tier; for each item, estimate its pass prevalence on training feature columns only,
  order items from easiest to hardest by prevalence, and compute observed-only ladder
  features: prevalence-weighted pass score as sum(pass_i * -log(pass_rate_i + 1e-6))
  divided by observed item count, raw pass fraction, hardest passed item rank percentile,
  easiest failed item rank percentile, easy-foundation fail rate among items easier
  than the hardest passed item, hard-tail pass rate among items harder than the easiest
  failed item, and inversion count/rate for failed-easy versus passed-hard item pairs;
  missing inputs produce missing item states that are excluded from denominators,
  with all ladder rates set to neutral 0 and observed count 0 when no item can be
  evaluated. Background used: Guttman cumulative scaling concept from https://www.surveymonkey.com/learn/survey-best-practices/how-to-use-the-guttman-scale-in-your-survey/,
  latent-trait/item difficulty framing from https://www.publichealth.columbia.edu/research/population-health-methods/item-response-theory/,
  and lifestyle-pillar scoring context from https://irp.cdn-website.com/ed4c1384/files/uploaded/Lifestyle_Medicine_Health_Behavior_Scale_Scoring_1.22.25.pdf.'
expected_signal: Fit students should more often pass both easy and hard healthy-habit
  items with few hierarchy inversions, unhealthy students should fail even common
  foundation items, and at-risk students may show mixed or inconsistent ladders, giving
  balanced-accuracy-relevant separation beyond a flat wellness count.
risk: The group may overlap with existing aggregate lifestyle scores, cutoff choices
  may not match the synthetic target rule, prevalence ordering can drift between train
  and test, and inversion features can become noisy for rows with many missing item
  states.
