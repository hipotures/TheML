title: Nonexercise Fitness Reserve
group_name: nonexercise_fitness_reserve
family: physiology_capacity_proxy
summary: Estimate latent cardiorespiratory capacity from body context, pulse, reported
  activity, and substance exposure, then express whether observed daily activity demand
  appears well supported by that capacity.
depends_on: []
strategy: 'Use non-target training feature medians or modes for missing values, and
  winsorize numeric inputs at training 1st and 99th percentiles before calculations.
  Map gender to sex_code as male=1, female=0, other/missing=0.5; smoking_alcohol to
  exposure as no=0, occasional=0.5, yes=1, missing=0.5; physical_activity_level to
  pal_base as sedentary=0, moderate=2, active=4, missing=2. Build objective_activity_points
  from step_count and exercise_duration: add 1 each for >=7500 steps, >=10000 steps,
  >=30 minutes exercise, and >=60 minutes exercise, clipped to 0-4; use 2 when both
  inputs are missing. Let pa_index be the clipped average of pal_base and objective_activity_points.
  Compute ecrf_met_proxy = 18.07 + 2.77*sex_code - 0.17*bmi - 0.03*heart_rate + pa_index
  - 0.6*exposure, adapting published non-exercise cardiorespiratory fitness components
  such as sex, BMI, resting heart rate, physical activity, and smoking status from
  https://link.springer.com/article/10.1186/1471-2458-10-59 and https://academic.oup.com/eurheartj/article/34/10/750/496115.
  Add ecrf_z using training mean/std, ecrf_band using training tertiles, activity_capacity_gap
  as objective_activity_points minus the tertile rank of ecrf_met_proxy, and binary
  flags for high-demand-low-capacity and low-demand-high-capacity using top/bottom
  tertiles.'
expected_signal: The target classes may separate students whose activity, pulse, body
  status, and exposure pattern jointly look fit-capable from those whose physiology
  suggests low reserve, while keeping transitional at-risk profiles in the middle
  rather than relying on any single raw activity or heart-rate value.
risk: The proxy omits age and assumes heart_rate behaves like resting heart rate,
  so the adult-population coefficients may be imperfect for synthetic student data
  and may partly duplicate existing BMI, pulse, and activity interactions.
