title: Health Evidence Uncertainty Envelope
group_name: health_evidence_uncertainty_envelope
family: missingness_uncertainty
summary: Represent how narrow or wide each student's plausible health-risk state remains
  when unanswered lifestyle and physiology fields are treated as bounded uncertainty
  rather than filled with one assumed value.
depends_on: []
strategy: 'Create a deterministic protective score in [0,1] for each non-demographic
  health feature: sleep_duration scores 1 in [7,9], linearly falls to 0 at <=5 or
  >=10; heart_rate scores 1 at <=70 and linearly falls to 0 at >=100; bmi scores 1
  in [18.5,24.9] and linearly falls to 0 at <=16 or >=34.82; calorie_expenditure scores
  1 inside the training 25th-75th percentile band and linearly falls to 0 at the 1st
  and 99th percentiles; step_count scores 0 at <=2000 and 1 at >=10000; exercise_duration
  scores 0 at 0 and 1 at >=45; water_intake scores 1 in [2.0,3.5] and linearly falls
  to 0 at <=0.75 or >=4.72; diet_type maps balanced=1, veg=0.8, non-veg=0.5; stress_level
  maps low=1, medium=0.5, high=0; sleep_quality maps good=1, average=0.5, poor=0;
  physical_activity_level maps active=1, moderate=0.6, sedentary=0; smoking_alcohol
  maps no=1, occasional=0.5, yes=0. For observed fields compute observed mean score;
  for missing health fields compute worst_case_score by assigning 0, best_case_score
  by assigning 1, midpoint_score, interval_width, observed_evidence_fraction, numeric_missing_uncertainty_share,
  and categorical_missing_uncertainty_share. Exclude gender from the health score
  but add a neutral gender_known flag. Unknown categorical values are treated as missing;
  if every scored field is missing, set observed mean to 0.5, worst case to 0, best
  case to 1, and observed fraction to 0. Web background used: https://medinform.jmir.org/2025/1/e79307
  and https://www.publichealth.columbia.edu/research/population-health-methods/missing-data-and-multiple-imputation.'
expected_signal: This may separate rows whose observed evidence already strongly supports
  fit or unhealthy from rows that remain compatible with several classes only because
  high-impact fields are absent, which can clarify minority-class boundaries under
  balanced accuracy.
risk: The hand-built bounds may duplicate parts of prior missingness and guideline-deviation
  signals, and the assumed best/worst health scale can be unstable if the competition's
  missingness mechanism is synthetic or not behaviorally meaningful.
