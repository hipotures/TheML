schema_version: 1
algorithm_id: default
kind: branch_add_algorithm

description: >
  Greedy score-based branch expansion. Select the highest-scoring eligible
  parent node and add the highest-scoring root source that contributes at
  least one new component and does not recreate an existing composition.

score:
  mode: active
  profile: active
  status: complete
  order: desc
  # Absolute threshold:
  # epsilon: 0.0001
  # Relative threshold:
  # epsilon: "0.1%"
  epsilon: 0.0001

selection:
  parent_kinds:
    - root
    - branch
  source_kinds:
    - root

limits:
  max_children: 10

deduplication:
  unit: component
  component_key:
    - source_type
    - source_id
    - mode
    - file
    - code_hash
  require_new_component: true
  reject_existing_composition: true

tie_breakers:
  parent:
    - score_desc
    - kind_order
    - id_asc
  source:
    - score_desc
    - kind_order
    - id_asc

dry_run:
  show_rejected_candidates: true
