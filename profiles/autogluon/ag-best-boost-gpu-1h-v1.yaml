  - device: cuda
    tree_method: hist
    ag_args:
      priority: 999
    ag_args_fit:
      num_gpus: 1
  GBM:
  - device: cuda
    ag_args_fit:
      num_gpus: 1
  CAT:
  - task_type: GPU
    devices: '0'
    gpu_ram_part: 0.8
    ag_args_fit:
      num_gpus: 1
fit_args: {}
