schema_version: 1
profile_id: ag-full-boost-gpu-ens-v1
source_profile: aideml.full_boost_gpu_ens
mode: autogluon
included_model_types:
- XGB
- GBM
- CAT
presets: medium_quality
time_limit: 600
use_gpu: true
validation_strategy: holdout
hyperparameters:
  XGB:
  - device: cuda
    tree_method: hist
    ag_args:
      priority: 999
    ag_args_fit:
      num_gpus: 1
  GBM:
  - device: cuda
    ag_args_fit:
      num_gpus: 1
  CAT:
  - task_type: GPU
    devices: '0'
    gpu_ram_part: 0.8
    ag_args_fit:
      num_gpus: 1
fit_args:
  save_space: true
  fit_weighted_ensemble: true
  auto_stack: false
