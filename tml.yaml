schema_version: 1
defaults:
  project_kind: kaggle
  download_data: true
  root_mode: autogluon
  prompt_output: tmp
  probe_output: tmp
external:
  enabled: true
env:
  TML_WIDE_TERMINAL: 80
active_project:
  kind: kaggle
  slug: playground-series-s6e6
active_run: null
root:
  active_profiles:
    autogluon: ag-s6e6-boost-gpu-ens-v1
    legacy: legacy-root-start-v1
rerun:
  autogluon: ag-s6e6-boost-gpu-best-ens-stack-1h-v1
models:
  metadata:
    provider: codex
    model: gpt-5.4
    effort: low
    timeout_seconds: 30
  hypothesis:
    provider: codex
    model: gpt-5.3-codex-spark
    effort: xhigh
    timeout_seconds: 600
  materializations:
    provider: codex
    model: gpt-5.3-codex-spark
    effort: xhigh
    timeout_seconds: 900
  review: mock
  bugfix: mock
providers:
  mock:
    kind: mock
  openai:
    kind: openai
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_BASE_URL
  ollama:
    kind: openai_compatible
    api_key_env: OLLAMA_API_KEY
    base_url_env: OLLAMA_BASE_URL
    default_base_url: http://127.0.0.1:11434/v1
  vllm:
    kind: openai_compatible
    api_key_env: VLLM_API_KEY
    base_url_env: VLLM_BASE_URL
  llama_cpp:
    kind: openai_compatible
    api_key_env: LLAMA_CPP_API_KEY
    base_url_env: LLAMA_CPP_BASE_URL
  codex:
    kind: codex_app_server
    sandbox: read_only
    summary: concise
    web_search: live
    isolated_home: true
    home_dir: tmp/codex-home
    work_dir: tmp/work-dir
    project_doc_max_bytes: 0
    log_event_deltas: false
    log_raw_jsonl: false
    log_raw_notifications: false
    disable_features:
      - apps
      - browser_use
      - computer_use
      - multi_agent
      - plugins
      - shell_snapshot
      - skill_mcp_dependency_install
      - tool_suggest
      - workspace_dependencies
